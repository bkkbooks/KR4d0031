body:
  text: 鐔津集卷九宋釋契嵩撰書萬言書上仁宗皇帝年月日杭州靈隱永安蘭若沙門臣契嵩謹昧死上書皇帝陛下某聞窮不忘道學者之賢也亡不忘義志士之德也於此有人雖非賢德而未始忘其道義也今欲究其聖人之法之微此所謂不忘道也今憂虧損陛下之政治是所謂不忘義也某其人也某嘗以古今文興儒者以文排佛而佛道浸衰天下其為善者甚惑然此以關陛下政化不力救則其道與教化失故山中嘗竊著書以諭世雖然亦冀傳奏陛下之丹墀而微誠不能上感嘗恐老死巖壑與其志背今不避死亡之誅復抱其書趨之轂下誠欲幸陛下察其謀道不謀身為法不為名發其書而稍視雖伏斧鑕無所悔也若今文者皆曰必拒佛故世不用而尊一王之道慕三代之政是安知佛之道與王道合也夫王道者皇極也皇極者中道之謂也而佛之道亦曰中道是豈不然哉然而適中與正不偏不邪雖大略與儒同及其推物理而窮神極妙則與世相萬矣故其法曰隨欲曰隨宜曰隨對治曰隨苐一義此其教人行乎中道之謂也若隨欲者姑勿論其所謂隨宜者蓋言凡事必隨其宜而宜之也其所謂隨其對治蓋言其善者則善治之惡者則惡治之是二者與夫王法以慶賞進善以刑罰懲惡豈逺乎哉但佛心大公天下之道善而已矣不必已出者好之非已出者惡之然聖人者必神而為之而二帝三皇庸知其非佛者之變乎佛者非二帝三皇之本耶詩曰神之格思不可度思矧可射思是蓋言神之所謂不可測也苟有以其所宜而宜之陛下乃帝王之真主也宜善帝王之道也今陛下專志聖斷益舉皇極以臨天下任賢與才政事大小必得其所號令不失其信制度文物不失其宜可賞者賞之可罰者罰之使陛下堯舜之道德益明益奮則佛氏之道果在陛下之治體矣經曰治世語言資生業等皆順正法此之謂也此推聖人之逺體不止論其近迹耳然逺體者人多不見近迹者僧多束執惟陛下聖人逺近皆察幸陛下發其逺體使儒者知之諭其近迹使僧者通之夫迹者屬教而體者屬道非道則其教無本非教則其道不顯故教與道相須也昔唐德宗欲慕其道而不奉其教非知道也懿宗泥其教而不體其道非知教也武宗蔑佛蓋不知其教道者也某竊窺陛下讚誦佛乘之文陛下可謂大明夫佛氏教道者也而學者乃有不諭陛下聖德如此何其未之思也洪範曰會其有極歸其有極此總謂之皇建其有極之意明王道唯以大中為準必無黨無偏無反無側其合會其有中道者同歸其中道耳春秋之法尊中國而卑夷狄其時諸侯雖中國或失其義亦夷狄之雖夷狄者苟得其義亦中國之是亦孔子用其大中之道也故傳曰君子之於天下也無適也無莫也義之與比義者理也聖人唯以適理為當豈不然乎而學者胡不審洪範春秋之旨酌仲尼之語以為議論何其取捨與聖人之法相盩徒欲苟三代而無佛耶夫三代之時其民初宜一教治之故獨用其一教也三代之後其民一教將不暇治或曰天以佛教相與而共治之乎夫天下之不可欺莫甚乎天人之際也今欲明此不若以天人而驗之佛教傳之諸夏垂千載矣舉其法必天地鬼神順之人民從之深感而盛化者益以多矣其事古今之所聞見者皆可以條對而籌數也凡所謂教者皆古聖人順天時適民所宜而為之以救世治者也然聖人之心宜與天心相同但在於逐人不陷惡而巳矣豈局其教之一二乎書豈不曰為善不同同歸乎治也今論者不探其所以為教之深逺者苐見其徒不事事在家逃脫外形骸不躬衣食以為詭異與俗相逺而切深譏之徒惡黑黧為患而不見脈患之深也黑黧不過變其皮膚矣脈患至深則絶人性命也今聖人導之剸情愛委身世表欲其全性命之至本以治生死之大病所謂治其出世者也猶老氏曰吾所以有大患者為吾有身及吾無身吾有何患矣今人不稍謝其能與天下療其大病乃輒比世教而譏是亦其所見之未達也抑又聞凡事造形者則易見在理者則難覩蓋形之者灼然而理之者幽微也若今之佛教宏益天下之事甚多但其為理幽奧而學者寡能見之某雖不足與知今試推其大槩者歟端以進之陛下冀陛下垂之以諭天下學者則其死生之大幸也某聞佛法者大要在人正其心其心果正則其為道也至為德也盛蓋其所説情性辨而真妄審也若今陛下以太和養誠以仁恩禮義懷天下雖其盛美巳效苟以佛法正心則其為道德益充益茂矣經曰妙淨明心性一切心此之謂也昔唐明皇初引釋老之徒以無為見性遂自清淨從事於熏修故開元之間天下大治三十年蔚有貞觀之風而天子之夀七十八歲享國四十五載是庸知非因佛法助其道德如此也歟梁武帝齋戒修潔過於髙僧亦享垂五十年而江表小康其夀特出於長夀此亦佛法助治之驗也使唐不溢情梁不過卑知人任人其為德皆慎始終也豈不盡善盡美乎然此陛下素所留意其密資陛下之睿聖者乃陛下自知而自得也豈藉芻蕘之言乎然此必陳之云云者蓋欲幸陛下詔以示學者使其知佛之法有益於帝王之道德者如此也某又聞佛之法以興善止惡為其大端此又最益陛下之教化者也請試校之若今天下國家州置庠序邑置學校以興起教化者也詩書禮義之説習民欲其為善日益而冀其姦惡不萌於心官師者又資以宣政化而文儒之昌盛雖三代兩漢無以過也然而里巷鄉墅之家其人猶有耳未始聞詩書之音口不道禮義之詞如此者何限蓋又習聞佛説為善致福為惡致罪罪則通於鬼神福則通於生死其人下自男女夫婦之愚上抵賢哲之倫鮮不以此而相化克己齋戒縱生而止殺或日月年或修其身者稱頌佛經天下四海之內幾遍乎閭里營戍也然其間悛心改行為仁為慈為孝為廉為恭為順為真為誠其意亦不少也乃今古耳目之所常接耳脫若家至户到而接之如此者恐不啻半天下也雖其趨習之端與儒不同至於入善成治則與夫詩書禮義所致者何異乎所謂最益陛下之教化者此其是也唐書曰雖其異方之教無損理原蓋此之謂也抑又聞佛氏之法以五戒十善為教導世俗者謂五戒修也所以成人十善修也所以生天二端皆不治之而縱心乎十惡者不惟不至乎天人而後陷其神於負處也今天下之人以五戒十善而自修者固以多矣大凡循善則無惡無惡則不煩刑罰今以戒善而不煩陛下之刑法者天下豈謂無有益也蓋不按而自覺矣而天下郡邑其刑有時而省其獄有時而空庸知其非因隂助而然也宋之何尚之謂其君曰能行一善則去一惡去一惡則息一刑一刑息於家萬刑息於國則陛下之言坐致太平是也然佛法能與陛下省其刑獄又如此也抑又聞佛者其人神靈睿哲古云大不測人也死生變化自若而死生不能變化蓋其所得之道大妙妙乎天地鬼神而天地鬼神嘉之其為聖人也亦與世之所謂聖人異也范煜西域論曰靈聖之所降集賢懿之所挺生裴休亦曰知佛為大聖人其教有不可思議之事是二者始知佛之所以為聖人也故其為法為言乃能感天地而懷鬼神幽冥要其法欽其言而古人嘗發於巫覡卜祝接於夢寐者固亦多矣河海方波濤洶湧其舟欲沒人之欲溺及投佛之經則波清水平民得無害民欲暘若以其法而禱之天地而天地暘民欲雨若以其法而禱之鮮不之效然其遺風餘法與天下為福為祥而如此此又人耳目之所常接者也與陛下禋天地祀社稷禱乎百神而與民為福者何以異乎祭法曰法施於民則祀之能禦大災能捍大患則祀之若今佛法也上則密資天子之道德次則與天下助教化其次則省刑獄又其次則與天下致福却禍以先王之法裁之可斥乎可事乎然儒者以佛道為異端惡其雜儒術以妨聖人之道行乃比楊墨俗法而排之是亦君子之誤也而佛老與孔周自古帝王並用其教以治其世俗幾乎百代是佛之教巍巍然關乎天地人神豈以楊墨為比蓋論者未思其所以相妨之謂也大凡其事異而意異者鮮能濟事意同而事不同者鮮不濟事夫於事不濟乃謂相妨而濟事豈謂相妨乎今佛者其教固同導人而為善雖其所作者而有前後蓋以前後而相資也孰謂有妨聖人之道乎若夫儒經有與佛經意似者數端含而藴之若待佛教而發明之然意密且逺而後儒注解牽於教不能逺見聖人之奧旨豈非傳所謂夫子之文章可得而聞也夫子之言性與天道不可得而聞也今試較之亦幸陛下垂之學者若中庸曰自誠明謂之性自明誠謂之教是豈不與經所謂實性一相者似乎中庸但道其誠未始盡其所以誠也及乎佛氏演其所以誠者則所謂彌法界遍萬有形天地幽鬼神而常示而天地鬼神不見所以者此言其大略耳若其重玄疊妙之謂則羣經存焉此疑若與聖人廣其誠説而驗之乎孔子曰質諸鬼神而無疑而百世以俟聖人而無惑其意豈非如此也又曰惟天下至誠能盡其性能盡其性則能盡人之性盡人之性則盡物之性以至與天地參耳是蓋明乎天地人物其性通也豈不與佛教所謂萬物同一真性者似乎中庸雖謂其大同而未發其所以同也及佛氏推其所以同則謂萬物其本皆一清淨及其染之遂成人也物也乃與聖人者差異此所謂同而異異而同者也明其同所以使其求本以修迹趨乎聖人之道也明其異所以使其修迹而復本不敢濫乎聖人之道德也其又曰至誠無息不息則久久則徵徵則悠逺以至悠久所以成物博厚配地髙明配天悠久無疆如此者不見而章不動而變無為而成天地之道可一言而盡矣豈不與佛所謂法界常住不增不減者似乎中庸其意尚謙未踰其天地者也及佛氏所論法界者謂其廣大靈明而包褁乎十方者也其謂博厚髙明豈止與天地相配而已矣經曰不知色身外洎山河大地虛空咸是妙明真心中物豈不然乎而孔子未發之者蓋尊天地而欲行其教也其所謂悠久所以成物是亦可求其包含之意耳其又曰其為物不二則其生物不測天地之道博也厚也髙也明也悠也久也今夫天斯昭昭之多及其無窮也日月星辰繫焉萬物覆焉以至夫地一撮土之多云云者是豈不與佛教所謂世界之始乃有光明風輪先色界天其後有安住風輪成乎天地者似乎中庸雖尊其所以生而未見其所以生也及佛氏謂乎天地山河之所以生者其本由夫羣生心識之所以變乃生此諸有為之相耳故經曰想澄成國土知覺乃衆生孔子所謂其為物不二其生物不測者似此而不疑亦以分明者也若洪範五福六極之説者此儒者極言其報應者也嘗竊考之其意微旨若關乎佛氏所云其三界者也注疏者亦牽於教不復能逺推之豈為然也其一曰凶短折夀其五曰惡惡醜也若其殤子者才生則死豈亦惡政所加而致凶短折耶蓋人生其相狀妍醜者乃父母所生其形素定豈必謂當世惡政而致之乎然聖人含其意而未發者豈不以人情便近而昧逺未即以他生語之疑其亦有所待者也及乎佛教謂人生之美惡適以其往世修與不修致如此也此世修與不修則其美惡之報復在其後世耳用此以求孔子之意可盡也若繫辭曰原始要終故有死生之説精氣為物遊魂為變是故知鬼神之情狀是豈不與佛氏所謂生死者皆以神識出沒諸趣者似乎孔子略言蓋其發端耳及佛氏所明夫生死變化者非謂天地造化自然耳蓋生死者各以其業感為人為鬼神為異類而其生死變化之所以然者于此不亦益明乎詩曰神之格思不可度思矧可射思書曰兹致多生先哲王在天是不唯聖人但欲致敬於鬼神耳亦意謂人之精明不滅不可不治之也此與佛教人人為德為善資神以清升者何以異乎孔子但不顯説耳及佛氏則推而盡之矣晉書王坦之與竺法師相約報驗之事其亦明矣佛教其言不虛多此類也而如此數説者皆造其端於儒而廣推效於佛豈聖人自以冥數濳通不使人而輒識乎不爾何其道理之相貫如此也漢書曰蓋遵俗無方適物其會取諸同歸指諸疑説則大道通耳豈不然乎而列子亦謂孔子嘗曰西方之人有聖者焉不治而不亂不言而自信不化而自行蕩蕩乎民無能名焉然列子之説雖不載於五經六籍蓋尊中國聖人以立教或雖有其言而不宜書之諸子得以誚之耶此儒佛不可相非又益明矣抑又聞佛謂於其道未有了者謂之權教於其道了然者謂之實教實者受人以頓權者受人以漸所謂人天乘者蓋言其漸之漸者也今以儒五常之教較之正與其五教十善人天乘者同也豈儒之聖人不亦以佛之權者而教人以漸乎佛經所謂孔子乃是昔儒童聖人焉或其然也故傳曰可與適道未可與權權者不亦甚而不易知乎然佛法播此故亦已久矣見重於人君臣之聖賢者胡可勝數而陛下之聖祖宗奉其法而張之其又過於古之天子也先皇帝至聖最知其然雖作崇釋論廣之今陛下明聖又悉究其道妙天下方向風慕德欲因陛下而以佛為善也世之學者何其未知信也然惟大公之世可以顯大道大明之人可以斷大疑今陛下聖人誠大明也陛下盛世誠大公也而正夫儒佛二聖人之道斷天下之疑豈不屬陛下今日耳某幸陛下出其書與公卿詳之苟其説不甚謬妄願垂天下使儒者儒之佛者佛之各以其法贊陛下之化治如前所論遺為萬世定鑑而後制絶其相訾之説俾佛法而更始自陛下聖朝是不唯佛之徒之幸抑亦天下生靈之幸豈唯生靈之幸亦天下鬼神之大慶也抑又聞陛下存佛教於天下者必欲其與生為福之效天下之人以為其徒者必欲行其教法也欲其教行則必欲以其法而導人為善也如此則天下為善為福誠繫于其法法行與否誠繫於其徒也是以天下務其徒而為急苟存其法而其徒不得其人其法亦何以為效也易曰苟非其人道不虛行豈不然哉然則得人在制其徒及其時而學習之使成其器及其時則其學習易成人過其時則其教諭難入也昔佛制使人年盈二十乃使得受具足戒出家則聽以其沙彌從事沙彌者蓋容以其童子而出家也其意以後世其人根器益鈍而頓解者鮮必資其早教少習及其心未濫而漸之於道也二十乃得受具足戒者蓋以習性已成志慮已定可使守戒而行道也其自既爾必能推之以善於人也故謂三寶之間相承而續佛慧命者唯藉於僧寶耳其出家之制在律部最為定法不可輒踰也昔進言於陛下者曰其人未年二十者不得聽之出家何其與佛制大相戾耶二十而出家者姑使其預僧勝緣可也苟欲其大成器行道而與陛下導人為善恐其未然也此可自驗夫二十而始出家者使其稍聰且明誦一經矻矻不暇他習三四年僅就及其試之一舉而得者百不一二其次五六年乃誦一經其次暗鈍者或十年而僅能誦之苟其如此幸得納戒而為僧其人年不三十巳四十矣就使其人三十五六而使預大戒猶恐其扞格而不勝其學習也况以三四十者而欲其通明練習其所謂禪者講者律者戒定慧者他教聖人之道異方殊俗之言語者此又恐其不能也必爾使其二十而始出家者不亦誤乎進言又以其少預僧倫加於耆宿之上為嫌乃謂制之然此以僧坐列之法而律成之可也夫僧坐列之法亦有以聲德而相推上下者也不止其年臘髙者須上有名德而年少者必下也今以其坐列髙下而遂定其出家制豈謂得其事宜耶夫佛制出家之律蓋其徒所生之本源耶苟汩其源而欲其流之清是亦惑矣大凡人知道而有所守者其為非則鮮矣其不知道而無所守者其作過必多矣若近世僧輩以過而觸陛下刑禁者蓋其習學不正罔有所守而致然耶某竊恐其徒而今而後益無所守頻觸刑禁并其教道而辱之又憂其法益不得其人而聖人之法微而遂滅矣用此常寢不安食不甘實欲陛下復其舊制遵行先帝之法務與佛制而相近也出家則不限年之少壯其業稍精則宜廣之其心益誠則宜正之如此庶幾萬一得其人也又幸陛下精其師率者宜勸之正其正者而廣之如此亦庶幾其徒萬一軌道而鮮過也所謂其師率者今天下主禪之衆者主其講之衆者所謂置正者今郡國之僧正者也果不以其僥幸為誠能張其教法者幸少加以禮服脫以其公而失之亦將宥之察吏誣而無屈陷之刑如此可以使其徒而慕之尚之也是亦勸誘之一道也其徒苟欲求師訪道千里之逺有司不以慿由而阻之使人無迫戚之心往來裕如也然慿由之制本用防惡及其小吏侮之而返更防善此又在百執事而宜深察之若某委於山谷不數數於世亦巳久矣方其著書欲出山中而耆舊者抱袂而相留曰爾以道自勝於山林可謂得矣乃一旦而輒動何不自重其去就且留某謂其人曰吾佛法實聖賢之道源天下之善本今其人不知乃相與譏佛而沮法吾憂其損天下之善本欲往賴吾帝而勸誘之亦欲資其治世也神明在上實聞斯語非如他術衒鬻僥幸欲有求也然平生為法不為已不亦重乎而某一介守死豈足自為輕重也其人又曰吾帝以寺廟與爾徒布諸四海豈不盛矣亦云何哉某又謂之曰爾屬知其一不知其二夫聖人之道在正不在盛也而某區區螻蟻之志其實如此儻陛下垂天地之察則其幸爾契嵩之書其前後臣之其中名之者亦有所云也夫君臣之謂蓋聖人以定在公者尊卑也自古唯衣冠縉紳者歟今為僧祝髮隳形儀範與人間雖異而輒與衣冠所稱相濫不乃失其事宜耶孔子曰必也正名乎僧人預其人臣之謂其名豈為正哉儒有上不臣天子下不事諸侯昔王霸嚴光不臣不名於漢豈其然也僧本蹈道世外又敢冒其人臣之稱也然僧而臣之者善出近世不稽之例也以其書前後稱臣者表始終不敢違例其中名之者表不敢果以非其所宜者以見陛下也干冒天威不任皇恐之至不宣沙門臣契嵩昧死上書此書恂和尚收𢎞明集中今得其本較正補刋入本集以便觀覽元貞乙未改元佛誕日比丘慧芳謹書契嵩嘉祐之辛丑歲十二月六日以此正宗輔教編進明年三月十七日先皇帝賜入大藏使與經律偕傳蓋留于政府七十一日丞相諸巨公躬屈詳閲佛教光賁雖振古未有如此者也契嵩佛子輩豈不榮且幸宜何以報其大賜還吳之三年吳郡人有曰曹仲言苐玘仲彛者樂聞其勝事乃募工于其明之萬夀禪院施財鏤板仰贊國家之鴻休也傳法覺初守堅知一詳較善慧宗遇治平改元甲辰四月十一日題出正宗論再書上仁宗皇帝十二月日杭州靈隱寺永安蘭若沙門賜紫臣僧某謹昧死上書皇帝陛下臣聞事天者必因於山事地者必因於澤然所因髙深則所事者易至也若陛下之崇髙深大則與夫山澤相萬矣適人有從事其道者舍陛下而不即求之雖其渠渠終身絶世烏能得其志也抑又聞佛經曰我法悉已付屬國王大臣者此正謂佛教損益弛張在陛下之明聖矣如此則佛之徒以其法欲有所云為者豈宜不賴陛下而自棄于草莽乎臣忝佛之徒實欲扶持其法今者起巖穴不逺千里抱其書而趨闕下願幸陛下大賜以成就其志也臣嘗謂能仁氏之垂教必以禪為其宗而佛為其祖祖者乃其教之大範宗者乃其教之大統大統不明則天下學佛者不得一其所詣大範不正則不得質其所證夫古今三學輩競以其所學相勝者蓋由宗不明祖不正而為其患矣然非其祖宗素不明不正也特後世為書者之誤傳耳又後世學佛者不能盡考經論而校正之乃有束教者不知佛之微旨妙在乎言外語禪者不諒佛之所詮槩見乎教內雖一圓顱方服之屬而紛然自相是非如此者古今何嘗稍息臣自不知量平生竊欲推一其宗祖與天下學佛輩息諍釋疑使百世知其學有所統也山中嘗力探大藏或經或傳校驗其所謂禪宗者推正其所謂佛祖者其所見之書果繆雖古書必斥之其所見之書果詳雖古書必取之又其所出佛祖年世事迹之差訛者若傳燈之類皆以衆家傳記以其纍代長厯校之修之編成其書垂十餘萬言命曰傳法正宗記其排布狀畫佛祖相承之像則曰傳法正宗定祖圖其推會宗祖之本末者則曰傳法正宗論總十有二卷又以吳縑繪畫其所謂定祖圖者一面在臣愚淺自謂吾佛垂教僅二千年其教被中國殆乎千歲禪宗傳乎諸夏僅五百年而乃宗乃祖其事迹本末於此稍詳可傳以補先聖教法萬分之一耳適當陛下以至道慈德治天下天地萬物和平安裕而佛老之教得以毗贊大化陛下又垂神禪恱彌入其道妙雖古之帝王更百代未有如陛下窮理盡性之如此也是亦佛氏之徒際會遭遇陛下之一時也臣所以拳拳懇懇不避其僣越冒犯之誅輒以其書與圖上進欲幸陛下垂于大藏與經律偕傳臣螻蟻之生已及遲暮於世固無所待其區區但欲其教法不微不昧而流播於無窮人得以資之而務道為善則臣雖死之日猶生之年也非敢僥幸欲沗陛下雨露之渥澤耳其所證據明文皆出乎大經大論最詳其所謂傳法正宗論與其定祖圖者儻陛下天地垂察使其得與大賜願如景德傳燈録玉英集例詔降傳法院編入大藏即臣死生之大幸不惟臣之大幸抑亦天下教門之大幸也如陛下睿斷允臣所請乞以其書十有二卷者特降中書施行其傳法正宗記與其定祖圖兼臣舊著輔教編印本者一部三策其書亦推會二教聖人之道同乎善世利人矣謹書上進干黷冕旒臣不任激切屏營之至臣誠惶誠恐謹言鐔津集卷九
