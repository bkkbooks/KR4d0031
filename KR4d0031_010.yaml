body:
  text: 鐔津集巻十宋釋契嵩撰書啓上韓相公書前後四書月日沙門某謹北嚮伏揖獻書于集賢相公閤下某聞古之聖人立極以統天下天下謂之至公夫至公者惟善者與之惟惡者拒之與善無彼此治而巳矣拒惡無親疎亂而已矣有本云治之而已亂之而已是盖聖人之心也及其親親尊尊國有君臣家有父子必親必疎必近必逺三綱五常不可奪其序此乃聖人之教也夫教貴乎修也而心貴乎通也教也者聖人之經制也心也者聖人之逹道也天下必知達道始可以論至公苟不達道或無達道二字見聖人之心雖修教必束教而失乎天下之善道也某雖固陋其學平生自謂得聖人之心長欲推此以資乎王公大人之所為道德者今乃老弊于山谷白首龍鍾而卒無所遇慨然太息惟恐其虚與草木偕生偕死而不得稍發之也方今竊聽閤下以寛博仁厚之德而宰輔天下天下論至公之道者謂適得之於閤下也某喜且大幸故不逺數千里進其說發明其所謂平生所得聖人之心者然非齷齪自喜慕名而榮身耳誠欲推其教道以導天下之為善也願幸閤下無忽某佛氏者也竊患其教於今甚衰其徒不能偕修以振其道士大夫乃不知其所以然或議而譏之者紛然使君子卑之小人疑之然其法播於諸夏垂千載矣所更君臣之聖賢者不可勝數皆尊奉之使與儒並化天下盖用大公之道而取之以其善世有益於生靈毗政治廣教化者也猶書曰㑹其有極歸其有極又曰為善不同同歸于治彼非有大合乎聖人立極之道者自古聖賢豈存而敬之迄於今日也不惟聖賢之不存而天下亦厭之乆矣若今天下興起學校用聖人之所由道德之說習乎諸生盖欲其宣傳國家之教化也雖然其仁義蔚然以敷于天下而天下之男女夫婦豈人人盡預乎五常之訓邪及其聞佛所謂為善有福為惡有罪損爾身累爾神閭里胥化而慕善者幾徧四海苟家至户到而按之恐其十有七八焉前所謂助政治廣教化此其是也其法又能與人正心窮神而極化内益乎聖賢之為道德者又其至矣而世之學者奈何不求古之聖賢興善之心不以至公之道裁而取之者耶苐見其徒混漶不軌其道而遂詆其法然其徒由在國家正其源流擇其綱紀旌其善者而勸之耳其法何沗乎孔子曰不以人而廢言此之謂也伏冀閤下俯為政治教化者主而張之則天下生靈之幸甚也抑又聞屋危者不扶則顛水壅者不䟽則潰聖人之道既微且昧苟不推而明之亦幾其息矣某方憂其師法之衰山中嘗竊著書曰輔教編者僅三萬餘言以推原本教白其聖人為教之意萬一以救其將墜之勢始欲奏之天子而幽陋踈逺不克上逹又欲進諸閤下亦又不能通之既而因人輒嘗布之京國其意亦欲傳聞於閤下之聽覽今復一歲而其浮沉不決而所憂之心如蹈水火急欲其援故不避其僣越之誅乃冒進其所謂輔教編者印本一部三策幸閤下論道經邦之暇略賜覽之苟不甚謬可以資閤下留神于吾聖人之道則某平生之志不為沗也如閤下之大賢至公拒而委之則佛氏之法漠然無復有所賴也巳矣今又以嘗著皇極論一篇寫者一策隨此貢之是乃少時行道餘暇所為粗明乎治世聖賢之道也謹因闗主簿投諸下執事塵凂台明不勝悚懼之至不宣沙門某謹白再上韓相公書月日沙門某謹伏揖獻書昭文相公閤下某幽人也伏山林竊聆閤下以至公宰天下與人為善廓然無所不容故昔年嘗以其書曰輔教編因闗主簿㬌仁投于下執事者逮今自抱其書西趨而來願進諸天子至京逾月誠欲先見大君子幸教其去就可否之宜且疑闗君之書浮乎沉邪果塵閤下之聽覽乎懣然久不自決忽然輒進恐閤下不知其所來之志謂有所求不進則其事稽滯故復書其意萬一幸閤下稍詳之然某之出山也盖欲貢其所著之書十餘萬言其書乃補其教法之闕正吾佛氏之乃祖乃宗賴天子垂于經藏之間以息乎學佛者疑諍使百世知其所統也其意止于是矣非傚他輩自為身名之僥倖欲有所求也閤下儻不以為非且謬引而與語則其所來之意得伸矣不惟自得伸其志矣亦恐于閤下性命真奥之極際而有所資焉豈獨資其性命之說抑亦稍補閤下聖賢治政皇極之法也塵冒大丞相尊嚴罪無所逃不宣某謹白重上韓相公書月日沙門某謹伏揖再獻書于昭文相公閤下某近者以書西來進之天子誠以閤下當國至公盡善其心方西趨之日汲汲惟恐後時及幸見之閤下温然以禮接之其後奏書垂之政府而閤下面奬特比之史筆當此大幸謂其平生為善之勤果遭遇而得其發揚矣又其後竊聞閤下益以其文與諸公稱之於館閤而士大夫聞者有曰大丞相真公與人為善矣若某者乃異教方外之人耳其道方少有可觀乃特與公卿譽之如此天下學者竊當自患其為道不專也何慮乎朝廷賢賢之不至邪然某學佛之餘粗事乎翰墨欲發揮其本教耳豈有髙文逺識當乎公相大賢所稱奬耶此可謂大幸大沗也然其預閤下之賜不為不大其區區之志不為不得此固宜翻然便還山林今猶徘徊京師未即去者盖其所來之意未盡未果奉閤下尊留之命故敢不避其干冒之誅乃益進說於閤下之左右也幸閤下寛而念之某山林著書討論内外經書不啻數千巻積數十年頗亦焦勞其神形又不逺千里賫來而奏之者非苟如他輩僥倖欲其私有所求耳其實患乎本教之宗祖不明古今學佛輩不見其大統妄相勝負殊失吾先聖人之意故其拳拳懇懇乃務正之仰慿朝廷垂於藏中者百世之為佛教立勝事也庶其學者遵為定斷又欲自效身為佛子其微為善者也方其出山中之日道屬耆舊輩皆以某識心為法莫不祝之願成其事而返今其書既奏待命巳六十餘日而未有所聞其中頗自疑之或其書尚有所謬不足大賢之所取耶或閤下當國大事殷未暇盡其是非乎都邑浩壤久留則弊其風塵拂衣林薄而其本末之志未遂惟恐負其道屬所祝之意不惟負其所祝之意亦恐其平生所存無效而其教法祖宗萬世終不復正也以故益欲幸閤下大惠重念其為法不為身為道不為名或云為人不為身為其教道萬世之必正不為其身而要國家一時之恩渥耳神明在上實聞斯語某又聞佛法者神妙不測固通於天地神明其為勝縁乃妙乎無窮也今所謂其宗者乃其教之大統也所謂其祖者乃其法之大範也方今天子聖明而閤下賢哲公正佛法祖宗苟得預閤下執政之中斷而定之使後世學佛仰而信之曰在大宋天子相國韓公嘗裁而定之矣其徒之三學者不敢胥亂而佛法更明果有天地神明隂為其助則景福勝縁豈不歸於天子與閤下乎某沗閤下之惠愛稱奬若前之所云如此願幸閤下始終其大賜使早施行無令疾忌之徒得輙以生横議以成就其平生區區之志幸及春水東歸山林乃其大幸甚矣當决勵精誠竭思行道以報閤下之德惠顒顒恭俟嘉命于旦夕也不宣某惶恐謹白又上韓相公書此繫東歸後復致此書也月日沙門某謹北望伏揖獻書昭文相公閤下某昔者以禪書幸朝廷賜與秘藏為佛法之教萬世耿光天下其徒莫不且喜且慶此是閤下鈞造與成其事而又稱道其文乃播諸賢士大夫迄今天下莫不知其辱閤下見知之深也受賜于閤下之厚也光賁山林之多也平日欲思獻一言以報閤下之德而未果然適以其書而通於下執事者乃效其素志耳然閤下輔相功烈冠絶于古今者盖閤下善用堯舜禹湯文武周公孔子孟軻荀况之道而然也今有人著書深切著明以推衍彼十聖賢之道而正乎世之治亂其極深研幾自謂不沗乎賈誼董仲舒之為書也是可資乎閤下雄才逺識萬分之一二耳伏念某放浪世外其迹與世雖異輒著其書慮俗無知嫉而忽之故祕之自謂潜子不敢顯其名也今閤下至公與天下之人而為善也不區域其華野顯晦者天下服之乃不逺千里寓其書而投之苟有可觀其說不妄萬一果有所資賛則某也少報閤下之嘉德而得以展其微效也其漂蕩江湖拘潔獨立與俗不合而其憫者非者相半儻或閤下賜之一字褒而揚之此又慰安其平生守藴光賁其幽獨之大惠也仰黷盛命干冒台明罪無所逃不宣某謹白上富相公書月日沙門某謹北嚮伏揖獻書昭文相公閤下某聞昔有野人或以美食芹或以九九之算獻其國君者夫食芹與九九之算鄙事烏足使王侯資焉然其心善務其君也適某不逺千里而來進其說於吾相君誠與乎食芹九九之算不殊而其心志亦幸閤下詳之而不忽也某佛氏也其法業能與人正心洗濯其煩亂持本而寧中某故欲以此待閤下論道經邦之遑潔静以頥養其靈明之源乃安其極也夫所謂正心者非世之所謂正也盖事外清浄至正者也心至正則神明神明則氣和氣和則體静順是四者以治其身而心益治也太史公曰不先定其神而曰我有以治天下何由哉此言近之矣然其道又能與生人原始而要終示其神爽往來根萬物之所因而决施報之所果然是又深且逺矣閤下大賢卓識謂此果足以留神巳乎若今儒者曰性命之說吾中庸存焉老者曰吾道德存焉而奚必曰佛耶而謭謭自執矣然是佛者皆聖人之謂也宜有漸之深之邇之逺之者也焉可槩論請為閤下詳之夫中庸者乃聖人與性命之造端也道德者是聖人與性命之指深也吾道者其聖人與性命盡其圓極也造端聖人欲人知性命也指深聖人欲人詣性命也圓極聖人欲人究其性命㑹於天地萬物古今變化無不妙於性命也然其使人覩道真盡化本覺其外物之為妄休息其精神之勞弊者而佛氏其道尤驗也其為道乎既博而其說亦汗漫故世之學者益隨亦謾之而不探其要嗟乎學道者不審也昔楊司徒綰在唐號為賢相嘗以此著王開先生傳以推廣於天下盖知其道之統要而然也今閤下輔相之道德器過於楊公逺矣苟不以佛為無謂而稍取之乃天下之幸也然其道復能使人去惡而為善今天下翕然而與儒並勸是不惟内有益於聖賢之道德亦將外有助於國家之教化此又宜閤下之垂意也方今其教甚衰其徒不擇譏而毁之者紛然某竊憂其道自是而微且息矣燈燭不繼其然其明亦遂滅矣溪澗江河不䟽導其源其流亦遂絶矣聖人之教道亦猶是矣不扶救則遂亡矣故竊嘗著書曰輔教編以發明扶持其道凡三萬餘言始欲奏之天子而微誠不能上達又欲進之閤下又不克通之已而乃因人姑布之京國亦意其欲傳聞於閤下聽覽又逾年而浮沉不決其所憂之心若在水火急欲其援以成就其生平之志乃不避其沗冒之誅輒以其書塵浼大丞相尊嚴萬一幸閤下憫其勤勞為教與道非敢如常流者屑屑苟榮其身與名而巳謹以其所著輔教編一部三册印者又以皇極論一首寫成者然此論乃少時行道之餘暇所屬雖其文字淺俗而粗明乎治世聖賢之法仰託闗主簿投諸下執事者不任瞻望台慈皇恐悚越之至不宣某謹白上張端明書月日沙門某謹撰書寄獻于省主端明侍郎閤下某以幽鄙無狀幸閤下憫念其來久矣昔者嘗以弊文因故侍郎郎公輙塵聽覽而辱之褒曰不惟空宗通亦乃文格髙故沗此大賜感之懐之迨今八載矣自謂委于深山窮谷雖欲一接大君子之威儀固不可得也然而每欲建一善事推一善言報閤下恤念之盛德以廣閤下興善之勝縁充然故嘗存之於心近者竊著其廣原教次為三帙曰輔教編吳人模印務欲傳之敢以幸於閤下執事者以畢其區區之志然其書大抵世儒不知佛為大聖人其道大濟天下生靈其法隂資國家教化特欲諭其疑者解其譏者而所以作也然吾佛常以其法付諸國王大臣而聖君賢臣者盖吾教損益之所繫也今欲救其法之衰微扶其教之不振乃以其說而求于閤下又其宜矣伏惟閤下以髙才大學冠首賢科以重德能名為朝純臣藹藹然負天下台輔之望而益有深知逺識不局世教超然特留意佛教妙理探索其聖人性命之真奥此又宜佛氏者以其道而倚賴也閤下仁明儻念其憂道不憂身為法不為名寛其僣越之誅以其書稱於聖賢傳於君子得天下不沮其為善之心國家不失其教化之助不直某之幸也亦吾佛之法得其所傳也傳或寄字輔教編一部三册謹因崔太博輒通呈於左右干黷台慈不任皇恐之至不宣某謹白上田樞密書月日沙門某謹撰書寄獻于樞密侍郎閤下某世外幽人也乃敢以其書而輒求於朝廷聖賢者豈宜然哉然憂其道之將毁必護其本教亦烏得泥其所守而不知其變邪夫朝廷聖賢者乃吾道損益之所屬也不往而伸之吾聖人之法殆廢且滅矣此亦經所謂佛法付諸國王大臣之意也幸閤下仁明憫其憂在道法不為身名寛其僣冒之誅而稍取其說不惟斯人之幸亦其教道之光輝也不直其教道之光輝抑亦天下生靈之大幸也某嘗以今文人之文排佛殊甚是亦世之君子者不窺深理不究逺體不考其善天下𢎞益之驗徒以目接其淺近之事與儒不同乃輒非之夫佛氏之教播於諸夏垂千載矣舉天下而化之其亦盛矣是必有大幽功隂德合天地通神明益教化善風俗者也不然天厭人惡久矣竊恐論者不巳後生不悟益斆而為之不惟弊聖人之大道亦乃沮天下為善之心損國家教化之助也故孜孜勉其愚瞑輒著書以發明吾佛之所為教者欲諭勸於世之賢人君子而自視退然力不足言未信非資乎朝廷之聖賢有髙明之勢力有際天之識度洞達聖人之深理逺體者則其書何以傳也適㑹吳人以其所著之書曰輔教編者模印方就敢不逺千里望風以投于閣下之門伏惟閣下以髙才博學登踐大科以善德能名榮處右密藹然負天下宰輔之望又益有深知逺識洞達聖人性命真奥是宜夫佛氏者以其法而倚賴之也儻為不腆之文末沗大賜以之傳布于朝廷賢人君子則某千萬死生之幸甚也抑亦吾佛以法付之適得其寄也其所獻之書十部三十册封題謹因崔太博以通于下執事者塵浼台嚴不任惶恐之至不宣某謹白上曽參政書月日沙門某謹撰書寄獻于參政給事閤下某聞佛教也嘗繫乎政治而闗乎教化者也其有人欲正其法之損益救其教之衰削而不求于宰教化司政治者其人雖盡心竭誠汲汲於巖壑間至老且死必不能得遂其志也今天下宰教化司政治惟天子宰相與閤下參預大政聖君賢臣者也故某不逺千里以其書因人而求於閤下者盖亦有意於教道矣伏惟閤下以大公為心取衆善為治不忽其幽陋之人不廢其荒唐之言而稍垂采聽不直斯人之幸抑亦西聖之道而増其光明耳其嘗謂佛教之為善世也固其廣大悉備矣其所謂施之於善人而益善施之於不善人而亦為善古今吾教之所勸不及刑法之所禁不得隂謀心欺雖匹夫匹婦之愚聞其所謂為善有福為惡有罪罕不減惡遷善矣苟家至戶到而按之恐十有八九而天下若此也後世益薄而其亂遂少孰知非因佛教隂助而然也故唐書曰雖謂異方之教無損為理之源向所謂闗乎教化者盖此之謂也夫以其道安天性而知神明之所以往來修身治心以通乎聖人之至德至道者古今其又多矣今論者以文而排佛謂無益於治世此亦世之君子不知深理不達逺體不見佛教之所以然也愚以此為其憂恐論者不巳後生末學習而為之不惟虧於國家教化之助亦乃損其隂德之祐山中嘗竊著書推明佛法要㫖將以諭勸學者而自念幽獨無其勢力終不遂其事傳其書於天下非有髙明特達大雅清勝君子則不能成其志業故輒欲幸閤下同以此道稱之於聖賢布之於君子也又念佛教之在天下也弛張其法増損其徒一出於朝廷之處置乃向所謂繫乎政治者此其是也今以正其損益之說而求閤下之門亦其宜矣閤下髙才重德天下具瞻寛仁大明朝廷推伏苟以其憂道不憂身為法不為名憫其志收其書推而布之使天下知佛之所以為教君子資之以廣其善小人資之以悛其不善不惟某之幸抑亦天下生靈幸甚也矣其書曰輔教編者一部三册封題謹因崔太博以通於下執事者塵浼台慈不任慚懼之至不宣某謹白上趙内翰書月日沙門某謹撰書寄獻於百司内翰閤下某嘗聞吾佛昔以其法付諸王大臣者其實意欲資王臣之勢以正其損益也故聖君賢臣乃吾道萬世所倚而賴之者也後世之徒如憂其法救其衰而欲有所云為者不可舍乎朝廷之聖賢者也若某不逺千里以其書而求于閤下之門者固亦以為其法而若此也伏惟閤下為德有逺量立朝有大節以文章為詞臣之宗地近官顯日接天子之寵光又特注意佛理力探聖人性命之奥妙是益宜佛氏者以其道而從之也某嘗以今天下儒者不知佛為大聖人其道德頗益乎天下生靈其教法甚助乎國家之教化今也天下靡然競為書而譏之某故嘗竊憂其譏者不惟沮人為善而又自損其隂德乃輒著書曰輔教編發明佛道欲以諭勸于世之君子者然自念其深匿逺棄力不能遂振之徒終夕太息乃冒其僣易之誅敢以其書仰藉閤下髙明以聞傳于諸聖賢君子苟得其萬一反心識佛知其教法之所以然廣其為善而不損夫隂德是亦仁賢用心之一道也其為勝縁當世世奉閤下同之天地神明實聞斯語儻閤下不忽少垂尊意則某萬萬幸甚矣其輔教編者模印一部三册并書因崔太博納諸下執事者干黷台慈不任惶恐之至不宣某謹白上吕内翰書月日沙門某謹撰書寄獻于内翰吕公閣下某嘗以卑論幸閤下善之其後雖欲益進其說以始終閤下聽覽德義之貺念某棄匿山林不能果耳比聞詔還益用大手之筆或無手之二字發揮天子制命此不可不勵已以求達其志也幸閤下不忽其幽陋而少留意焉某聞善其理者天下至公之謂也今天下所謂聖人之教者至焉雖其名不類考其理而皆欲人趨善則其理未始異然猶日月年數雖其近逺差異而其成歲之功一也故少壯之時皆讀其書求其意得其意則嘗以告之人曰是皆可從而不可拒也既告之人又患其不廣乃以之為書欲其大勸所著之書雖積十餘萬言而名微身晦不能傳之欲資之聖賢而相與振之乃卒無所遇及其老弊於山谷弟子輩恐其書與其師偕没固請以刻木刻已又請致之士大夫初避要名之誚而不從其請余自謂之曰自古至人皆以救䕶其教法獲譏殞身為逺大者又奚恤流俗之譏耶乃浩然盡發其書致之縉紳先生之徒雖未始識者立使布之其人况沗閤下一言之詧而閤下髙識逺量素以天下之善而為意也而敢不陳之乎謹以其書一部三册所謂輔教編者封題仗僧致之下執事者儻辱閤下諭之於人則其勝縁隂功幽德當奉大君子同之神明在焉實聞斯語塵浼髙明豈勝皇恐之至不宣某謹白上歐陽侍郎書月日沙門某謹伏揖獻書于參政侍郎閤下某聞昔者李膺以名儒為天下風教所繫然其望既髙天下之士不可得而輒交乃目其門曰龍門今天下之士指閤下之門猶龍門也而閤下之門難升又過於李膺矣閤下文章絶世探經術辨治亂評人物是是非非必公必當而天下之士欲遊閤下之門者非有此德焉敢俯仰乎閤下之前不惟不敢事其俯仰亦恐其望風結舌而不敢蹈閤下之閫閾者多矣若某者山林幽鄙之人無狀今以其書奏之天子因而得幸下風閤下不即斥去引之與語温然乃以其讀書為文而見問此特大君子與人為善誘之欲其至之耳其放浪世外務以愚自全所謂文章經術辨治亂評人物固非其所能也適乃得踐閤下之門辱閤下雅問顧平生慚愧何以副閤下之見待耶然其自山林來輒欲以山林之說投下執事者願資閤下大政之餘游思於清閒之域又其山林無事得治夫性命之說復并以其性命之書進其山林之說有曰新撰武林山志一巻其性命之書有曰輔教編印者一部三册謹隨贄獻塵黷髙明罪無所逃皇懼之至不宣某謹白上曽相公書此書繫次富相後再致之書也月日沙門某謹獻書于集賢相公閤下某雖不敏平生輒以護法勸善為已任每求搢紳先生之知圓機通乎天下之至理者相與維持故嘗以其書曰輔教編者因崔黄臣太博而貢于下執事者誠以閤下髙識逺覽知佛博大盛備為古之聖人也欲幸閤下推而勸之尚不知其書果嘗逹閤下之聽覽乎而某今者西来固欲以其禪書祖圖願進之天子至京師日實先欲奉閤下教其去就可不之宜而濡滯不能上進數日前幸得請于閽者值客盈門徒留刺依然而還然閤下相天下事固殷矣恐不暇盡其山林所來之意輒復書此幸閤下垂察然某所來本以吾佛氏之教其祖其宗曖昧不甚明適抱其書曰傳法正宗記十餘萬言與其所謂定祖圖者一面欲賴聖明垂於大藏傳之以正夫吾教三學佛子使其萬世知其所統也其志止于是矣匪斆他輩自為身名之計僥倖欲苟所求耳閤下儻以其誠不謬教而成之不惟自幸而已亦乃天下教門之幸也干冒台明而罪無所逭不宣某謹白謝李太尉啟月日沙門某右某六月二十一日伏蒙特附所賜紫衣牒一道書一緘到杭州日知府唐公見召出山面付前件勅牒并書是盖太尉曲以其無狀薦論而致此恩賜某其日自以其道德虛薄不宜當天子大貺再讓又再讓雖詞意懇切而唐公終不容守其素志又翌日靈隠大衆發命披之章服雖奉此大賁而幽陋無謂沗國家美命辱閤下褒薦而實感且懼矣伏惟太尉才識器韻乃時英豪門閥髙華為帝家至戚猶屈採野老幽人之微善推而賛之預人主之渥澤是不惟樂道人之善抑又忠于國家天下幸甚幸甚如閤下来書曰讀其輔教編之書知其學與存誠有以服人者矣用是言之此亦閤下念其所存之心耳若其有以服人之云豈敢當之然其所操志非欲苟其名榮其身而巳矣請益為閤下言之某始以本教積衰其徒罕能礪精君子不信小人不敬某故憂吾聖人之道晦昧而天下失其為善之本所以決志扶持之耳其書初成誠望上達賴朝廷羣賢君子之盛德其勸易行其傳易廣但其救道之心如蹈水火欲人援之不顧流俗之謂其誇且衒也今於道未有所補勸善無效而輒沗大惠亦宜何為心耶孟子曰雖有鎡基不如待時今果聖賢之時幸閤下留意焉苟吾道益勸君子益信小人益敬資此勝縁以報聖君之賜閤下之知其亦至矣某禪者非敢專以文字自喜盖資之以傳其道耳此又幸閤下察之謹因陸員外行專上啓布謝不任感恩皇恐之至伏惟台慈俯賜鑑念不宣某謹上啓鐔津集巻十
