  text: 欽定四庫全書集部三
  hash: sha256:f07461303fab15c789ad7c1df69e91ba77e3a1645c0ea5d385f94292466f69db
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0031_WYG_000-1a, image: WYG1091/WYG1091-0397a.png}
body:
  text: 鐔津集别集類二宋提要臣等謹案鐔津集二十二巻宋釋契嵩撰契嵩姓李氏字仲靈自號潜子藤州鐔津人七嵗出家通經書章句肆意游覽慶厯間至杭州樂其風土因居靈隠寺皇祐間入京師作萬言書上之仁宗賜號明敎大師尋還山而卒契嵩深通内典鋭然以文章自任嘗作原教孝論十餘篇明儒釋之一貫以與當時排佛者抗又作非韓三十篇以力詆韓愈又作論原四十篇以隂申其援儒入墨之㫖其説大抵偏駁不可信而其筆力雄偉辨論蠭起實能自成一家之言盖亦彼教中之健於文者也是編為明𢎞治已未嘉興僧如巹之所刋凡文十九巻詩二巻附他人所作序贊詩題䟽一巻巻首有陳舜俞所撰行業記稱契嵩所著自定祖圖而下為嘉祐集治平集凡百餘巻盖兼宗門語録言之此集僅載詩文故止有此數王士禎居易録稱其詩多秀句而云集止十三巻是所見篇帙更少不及此本之完備矣乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀鐔津集引吾佛以法付諸王臣盖欲久其傳也自商周流虹貫炎漢夢金人西方大教於是乎東流真丹際遇金輪世主會三教角立焉佛化行乎中國愈久益盛代有其人與像季已還教門削弱日益薄矣盖人與世異故也豈佛法有所損益乎逮宋仁廟時大士嵩禪師者出具爾正眼觀乎人根未可則諭性命之道宜乎人天乗而質之盖沿淺而及邃處故援六經百氏之說絶出至公之論合乎二教乃著是書曰輔教編獻之天子大賜與藏典偕傳時韓丞相當國至公以史筆見稱之深也公卿詳之而不眇忽也明乎大士受西聖之屬而應世與夫王臣扶護宗乗者於其内攝外護而綿歴無窮孰能諒乎今亦昭其馮有以也然𢎞治丁已吾寺為統禪講名僧開士坐厦間而老蔽言于衆曰正法既沒像教陵夷有若一絲懸九鼎乎嘅夫鐔津文集時所尚之誠輔教之書也板將漫滅矣可欲復前人之大業用是重梓而廣傳其殆庶幾乎余槩而言之也卒未知其孰賢禾城之東去一舎地有刹幢曰景徳寺業其中者璠瑩然其人行道布徳士也雖混衆而不羣欲因間隙有請白于我曰爾書圖刻也璠思與衆擎易舉一人何力之有哉曰無貳爾心但行中捨罄已之有可使行檀而助之瑩然心亦有所之也既有以為未備者以其語深難便初學有得㸃句音釋亦或有助也於是往往視予意有所託果然擬之而後言也嘻綆短者不可以汲深然河海不擇其細流故能就其深矣雖然第愧其審克之而未詳則如之何勿思深惟天下之士世之著顯者皆英偉雄傑之才負天下台輔之望盖明乎治世聖賢之道克輔皇明之政治殷何暇眷彼佛乗允通經旨佛氏之徒悉屏文字唯脩静慮若夫二氏之教有異乎而在道必然也於其吐言持論不出乎情見動輙有礙焉得不為之異若是語黙動静不墮落藝境圎融無礙而一趨於大同豈不然乎令時尚竒騁異粘綴成編何太駸駸至于頗僻者無裨於教不若夫丕休哉余寔膚淺嘗讀壇得見大鑒遺意而知明教之心扶樹正宗功何懋焉於是如巹繆承瑩然之志音釋句讀苟又差互不少者當坐愚之無識舊板微有誤䖏則校也時有興聖徳海為書而剞􅕻盡工猶夫佛印所謂印施有盡若書而刻之則無盡巹也固願是書溥海流布日望君子韙之試一披覽何惑結而不自解如轉丸耳盖使人人咸崇佛化同厎于道也如是則隂翊皇度無窮焉大明𢎞治十二年四月八日蔤庵沙門嘉禾如巹引鐔津明教大師行業記宋熈寧五年六月初四日有大沙門明教大師示化于杭州之靈隱寺世壽六十有六僧臘五十有三是月八日以其法茶毗斂其骨得六根之不壊者三頂骨出舎利紅白晶㓗状若大菽者三及常所持木數珠亦不壞於是邦人僧士更相傳告駭歎頂禮越月四日合諸不壞者葬于故居永安院之左其存也嘗與其交居士陳舜俞極談死生之際而已屬其後事兹用不能無述也師諱契嵩字仲靈自號潜子藤州鐔津人姓李母鍾氏七歲而出家十三得度落髮明年受具戒十九而遊方下江湘陟衡廬首常戴觀音之像而誦其號日十萬聲扵是世間經書章句不學而能得法於筠州洞山之聰公慶厯間入吴中至錢唐樂其湖山始稅駕焉當是時天下之士學為古文慕韓退之排佛而尊孔子東南有章表民黄聱隅李泰伯尤為雄傑學者宗之仲靈獨居作原教孝論十餘篇明儒釋之道一貫以抗其說諸君讀之既愛其文又畏其理之勝而莫之能奪也因與之㳺遇士大夫之惡佛者仲靈無不懇懇為言之由是排者浸止而後有好之甚者仲靈唱之也所居一室蕭然無長物與人清談靡靡至於終日客非修㓗行誼之士不可造也時貳卿郎公引年謝歸最為物外之友嘗欲同游徑山有行色矣公亦風邑豪預焉冀其見仲靈而有以尊養之仲靈知之不肯行使人謝公曰從吾所好何必求富而執鞭哉凡其㓗清類如此皇祐間去居越之南衡山未幾罷歸復著禪宗定祖圖傳法正宗記仲靈之作是書也慨然憫禪門之陵遲因大考經典以佛後摩訶迦葉獨得大法眼藏為初祖推而下之至于達磨為二十八祖皆宻相付囑不立文字謂之教外别傳者居無何觀察李公謹得其書且欽其髙名奏賜紫方袍仲靈嘗念幸生天子大臣護道達法之秊乃抱其書以㳺京師府尹龍圖王仲儀果奏上之仁宗覽之詔付傳法院編次以示襃寵仍賜明教之號仲靈再表辭不許朝中自韓丞相而下莫不延見而尊重之留居憫賢寺不受請還東南已而浮圖之講解者惡其有别傳之語而恥其所宗不在所謂二十八人者乃相與造説以非之仲靈聞之攘袂切齒又益著書博引聖賢經論古人集録為證幾至數萬言士有賢而好佛者往往詣而訴其寃久之雖平生厚於仲靈者猶恨其不能與衆人相忘於是非之間及其亡也三寸之舌所以論議是是非非者卒與數物不壞以明之嗚呼使其與奪之不公辯説之不契乎道則何以臻此哉雖然仲靈之所以自得而樂諸已者盖不預於此豈可為淺見寡聞者道耶仲靈在東南最後宻學蔡君謨之帥杭也延置佛日山禮甚厚居數年然言髙而行卓不少假學者人莫之能從也有弟子曰慈愈洞清洞光所著書自定祖圖而下謂之嘉祐集又有治平集凡百餘巻總六十有餘萬言其甥沙門法燈克奉藏之以信後世云熈寧八年十二月五日記尚書屯田貟外郎陳舜俞撰
