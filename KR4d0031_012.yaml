body:
  text: 鐔津集卷十二宋釋契嵩撰叙傳法正宗定祖圖叙與圖上進原夫菩提達磨實佛氏之教之二十八祖也與乎大迦葉乃釋迦文如來直下之相承者也傳之中國年世積逺譜牒差繆而學者寡識不能推詳其本真紛然異論古今頗爾某平生以此為大患適考其是非正其宗祖其書垂出㑹頒祖師傳法授衣之圖布諸天下而學佛者雖皆榮之猶聽瑩未諭上意某幸此竊謂識者曰吾佛以正法要為一大教之宗以密傳受為一大教之祖其宗乃聖賢之道原生靈之妙本也其祖乃萬世學定慧之大範十二部說之真驗也自書傳亂之曖昧漫漶天下疑之幾千百載矣今上大聖特頒圖以正其宗祖然聖人教道必聖人乃能正之是豈惟萬世佛氏之徒大幸也亦天地生靈之大幸也某固不避其僣越愚妄之誅敢昧死引其書之舊事推衍上聖之意仰箋於祖圖亦先所頒祖師傳法授衣之謂也然其始亂吾宗祖熒惑天下學者莫若乎付法藏傳正其宗祖斷萬世之諍者莫若乎禪經禪經之出乃先乎付法傳六十二載始終備載二十八祖已見於晉之世矣付法藏傳乃真君廢教之後闕然但謂二十四世方見魏之時耳適以禪經驗而付法藏傳果其謬也若如來獨以正法眼藏密付乎大迦葉者則見之大涅槃經智度論禪經與其序也以意求之而佛之微㫖存焉上睿性髙妙獨得乎言謂之外是乃天資佛記也故其發揮禪祖雅與經合宜乎垂之萬世永為定斷三學佛子遵之仰之天下不復疑也其圖所列自釋迦文佛大迦葉至於曹溪六祖大鑑禪師凡三十四位又以儒釋之賢其言吾宗祖素有證據者十位列於諸祖左右謹隨其傳法正宗記詣闕上進塵黷宸眷不任惶恐震懼之至謹叙六祖法寶記叙此郎侍郎作附按唐書曰後魏之末有僧號達磨者本天竺國王之子以護國出家入南海得禪宗妙法自釋迦文佛相傳有衣鉢為記以世相付受達磨賫衣鉢航海而來至梁詣武帝帝問以有為之事達磨不說乃之魏隱於嵩山少林寺以其法傳慧可可傳僧粲粲傳道信信傳𢎞忍忍傳慧能而復出神秀能於達磨在中國為六世故天下謂之六祖法寶記蓋六祖之所說其法也其法乃生靈之大本人焉鬼神焉萬物焉遂與其清明廣大者紛然而大異六祖憫此乃諭人欲人自求之即其心而返道也然天下之言性命者多矣若其言之之至詳理之之至當推之之至悉而釋氏得之矣若其示之之至直趨之之至徑證之之至親而六祖之於釋氏又其得之也六祖於釋氏教道可謂要乎至哉今天子開善閣記謂以本性證乎了義者未有舍六祖之道而有能至於此者也是則六祖者乃三界之慈父諸佛之善嗣歟偉乎惟至聖而能知至道也然六祖之說余素敬之患其為俗所增損而文字鄙俚繁雜殆不可考㑹沙門契嵩作壇經贊因謂嵩師曰若能正之吾為出財模印以廣其傳更二載嵩果得曹溪古本校之勒成三卷粲然皆六祖之言不復謬妄乃命工鏤板以集其勝事至和三年三月十九日序明州五峯良和尚語録叙始釋迦文佛經教之外以大三昧命其髙弟弟子大龜氏傳之然非不關經教蓋經教之所明也將以印正一切法門決定為妙覺之宗極及其菩提達磨承大龜氏二十八世方傳諸夏諸夏之至曹溪第六祖益傳之往之時世未習熟諸祖師猶傍經以諭學者未即純以真要示之後世至人觀機而宜之遂直用此發人故其所為人不復以經語故天下之守章句者聽瑩謂其背經立異以非之噫是豈知夫變而通之殊契經也然學者不易至之至之復難繼之繼之復難辨之猶人皆畫龍而未始得其真龍形者逮有以真龍告之而世亦不信蓋天下識龍者寡也今世孰不說道紛然皆傳其所傳至其與否豈能盡得其所辨耶吾故嘗憂其混亂道真為學者大病但愧匿而不能張之也今見吾所知五峯良公善知識也益喜其言良公亦欣然相得遂出其語録示余讀之多其所發殊妙所謂善變而通之者也良公受於慈明圓禪師慈明傳臨際斷際大智大寂之所傳此良公宜禪者師也若其修潔之美而邑人四方盛稱之此不復論武陵集叙慧逺和尚以有道稱於四方在天禧乾興間其名甚振學者無逺近歸之如水沛然就下豫少聞之恨不識其人晚游吳得其語於勤暹二師觀其發演詳悉應對次序語言必文不以凡近雜出雖出入大經大論傍及治世文書老子莊周之說而不疑閒䆒其意義所歸而與佛法奧妙似乎不可以智窮神而明之其庶幾乎始達磨大師以佛心印至中國㑹梁天子耽有為不省其言達磨北入嵩山面壁終日默坐九年華人之疑稍解而達磨之道遂傳矣以故後世傳髙僧者以禪觀定其所傳又後世學者無逺識頗信傳者為然其言亦不思之甚也達磨之道豈止於禪觀而已矣夫禪者靜也觀者觀也聖人教初學者使靜思慮以觀其道也若達磨所傳承於髙足弟子大迦葉昔如來將化以正法眼可以言語發不可言語到故命大迦葉以心相傳所謂正法者也大教之所以出衆經之所以明也得乎此者雖以萬端言之其所言未始雜也不得乎此者雖絶言而守之其所守未始不惑也今和尚之言其得正法之謂也禪觀焉能盡之和尚出於雲門大師三世雲門出於大鑒禪師八世嗚呼去聖人益逺學者疑惑錯謬當其時和尚去雲門大師未百年獨抱正法與其人相望毅然引學者以其正法眼藏以正其傳授學者真若得止以息狂走其於教道而德亦至矣既沒弟子輩緝其言以其所居之地名之曰武陵集慶歷壬午嵗孟冬二十日序原宗集叙或名宗原象郡勤師聚禪學百家之說探而取其言之尤至者次為一家之書繇釋迦如來而下至於雲門摳衣弟子凡三百三十三人其語有六百二十則總一萬八千餘言書成命不腆名而叙之大㫖以不循語言生所解㑹平常簡密而不失其宗者為得之矣故曰原宗勤師證法於德山逺公印可於三角澄公澄逺皆雲門匡真大師之法孫也雲門秉雪峰存禪師雪峯承德山宣鍳德山續龍潭信龍潭嗣天皇悟天皇繼石頭大師石頭紹廬陵思和尚思和尚受法於苐六祖大鍳禪師廣菩提達磨所傳之道故天下學佛者尊其德如孔子承周公而振堯舜之道聖人舉其用所以謂教也大用不可卒究即文字以為詣洎乎種智差别法門萬殊復懼後世多聞者過困學者不及故釋迦如來直以正法授大迦葉雖示有言說而不迹文字菩提達磨去如來二十九代受之東來人始莫曉時皆擯棄及其傳至大鍳世且大信趨學者猶水之沛然就下噫像法之季去聖人益逺學者穿鑿迷失道真勤師長為之太息故楷其宗極庶幾有所正也是嵗康定辛巳孟冬月望日也移石詩叙自此元别為卷移石詩君子之美移石也始其棄於道傍雖其瑰怪偉然可觀而路人不顧無𧦬師思取而顯之乃用工者計不崇朝遂致於户庭巉崒嵌虛若山聳洞壑前瞰清沼後䕃茂樹左右益闢三堂曰石筵曰照古曰禪燕者臨之使人悠然有幽思自是誇者相告觀者趨來石之美一旦遂顯無𧦬復作詩以歌之賢士大夫與方袍能詩者亦從而賦之必欲余為叙然人皆有所嗜之事而有雅有俗有淫有正視其物則其人之賢否可知也若石之為物也其性剛其質固其形靜其勢方方者似乎君子彊正而不苟也靜者似乎君子不為不義而動也固者似乎君子操節而不易也剛者似乎君子雄鋭而能立也然移石之名益美乎是其外峰岠似乎賢人嚴重而肅物也其中空洞似乎至人虛心而合道也今無𧦬以吾道為禪者師以翰墨與儒人游取其石而樹之於庭朝觀夕視必欲資其六者以為道德之外奬操修之默鍳也及讀其詩求其所以為意者則未始與此不合然無𧦬其心如此之逺也而與世俗之虛玩物者固不足相望諸君美而賦詩不亦宜乎其詩凡若干首皆詩之豪者也視之可見豈卑論所能悉評某嵗月日某序法雲十詠詩叙法雲晝上人繕其居之西厦曰翠樾堂以其得山林之美䕃也户其北垣曰陟崖門示其乘髙必履正也始其入林之徑曰嘯月徑髙其所適也疏其泉曰夏凉泉貴其濯熱也表昔僧之塋曰華嚴塔德其人也指其嶺之峻絶者曰樵歌嶺樂野事也名其亭曰映發亭取王子敬山川相映發之謂也目其山之谷音浴曰楊梅塢别嘉果也榜其閣曰清隱閣以其可以靜也就竹闢軒曰修竹軒擬其操也是十詠者舉屬法雲精舍法雲宅大慈山之中與郭相去逮十里北瞰徹浙江南通錢唐湖過重岡復嶺翛然㳂溪涉澗水聲泠泠雲木杳靄校乎垂江瀕湖之山而大慈最為幽深法雲庭宇瀟灑林嶺盤鬱環翠比乎慈山之他寺其又絶出者也昔吏部郎公以侍郎致政還故鄉多優遊名山尤樂此以為髙蹈之佳處也每來則踰旬跨月陶陶而忘反吏部名德熏於天下既好是也人亦斐然從而尚之故法雲勝槩遂逺聞播晝師猶以為未盡其山水之美乃益揭其十景者拳拳引詩人詠之搢紳先生之流與吳中名僧聞皆樂為之賦競出乎竒詞麗句而風韻若出金石鏗然起人清思所謂勝槩者益聞益播將傳之而無窮也然物景出沒亦猶人之懷竒挾異者隱顯窮通必有時數若此十詠之景所布於山中固亦久矣棄置而未嘗稍發今晝師振之衆賢詩而光之豈其數相㑹亦有時然乎故賢者雖終身晦之時命也不足歎之忽然曜之時命也亦不足幸之上人既樂得諸君之詩特屬豫以為序然無謂遂能盡其詩之美也矣法喜堂詩叙好事者刻法喜堂詩將傳而淨源上人預其編次以其事謂潜子曰幸子志之也夫法喜堂乃寶月廣師所居之室也君子善其以法喜自處故作詩而稱之也其詩凡若干篇乃搢紳先生巨公偉人之所為也髙逸殊絶不可得而評也若寶月居心休美寓醫以廣其行章表民叙之詳矣吾不復論也苐發其法喜之謂耳夫法也者道也喜也者恱適也道固天人之正也人而不適道烏乎為心也夫死生人生之大變也非適道不能外其變以至神完也榮辱盛衰人事之變也非適道不能順其變以至分安也愛惡取捨人情之變也非適道不能理其變以至性勝也故謂道無不存一貫乎內外也惟聖賢常以道凝生之不亂死之不汩出之不渝處之不悶貧之不窮富之不淫山林也朝市也惟道所適也俗不顧道而碌碌以其變弊嗟乎古今豈少乎哉寶月杭人也其國樂土風俗以奢侈相髙甫方服之人幾忘道而趨其所尚也寶月廬其市井紛華之間乃翹然獨修法喜之樂是豈惟務其自恱而巳矣其將有所師而勸之乎羣公賦詩而美之是也辛丑仲冬八日潜子序題山茨堂叙南宗智嚴師主慶善精舍而邑人宜之將一年所居已葺白雲堂人亦新之且以書邀其侣契嵩曰吾虛是室以待子㑹豫方專意於習禪著書其年遂來視厥堂控半峯嶷然出其居之後户牖南敞前望連山青嶂邐迤與村疇雲樹而相映帶若見好畫蕭然發人幽思余喜處之經嵗心甚自得而塵事寡日益清淨因思其舊名取義太近輒命以山茨之號更之山茨者蓋取梁之髙僧惠約所居之名也昔約方以德髙見重於天子而汝南周顒乃營山茨寺於鍾山而命之居故顒美之曰山茨約住清風滿世若約者可謂吾徒之有道者也吾徒宜慕之愚何敢跂望其人也取其山茨而名是堂者誠欲警愚之不及也慶歷丁亥孟春之晦日序趣軒叙慈化都僧正所居之北軒者在精舍為窮奧於他牖最虛明靜可以宴安可以休適慈化喜此欲潜子名而揭之潜子謂慈化曰了性師人皆有好而子之好喜近道其殆庶幾乎靜乃正明乃鑑虛乃容深奧所造乃清雖其方丈環堵之室至道則清風浩氣光天地貫古今妙乎人間世而絶出窅然不必在乎青山白雲也寥廓無際不必在乎世表方外也上人其好既有至道之趣而潜子乃以趣軒名其北軒而文之益示慈化志之所尚清勝潜子猛陵之契嵩也山遊唱和詩集叙楊從事公濟與冲晦晤上人訪潜子明日乃邀宿靈隱又明日如天竺遂宿於天竺也三人者遊且詠得詩三十六篇公濟請潜子前叙潜子讓公濟曰吾不敢先朝廷之士公濟曰此山林也論道不論勢潜子叙非忝也潜子曰諾吾叙然公濟與潜子輩儒佛其人異也仕進與退藏又益異也今相與於此蓋其內有所合而然也公濟與冲晦以嗜詩合與潜子以好山水閒適合潜子亦粗以詩與冲晦合而冲晦又以愛山水與吾合夫詩與山水其風味淡且靜天下好是者幾其人哉故吾屬得其合者嘗鮮矣適從容山中亦以此㑹為難得故吻然嗒然終日相顧相謂幾忘其形迹不知孰為佛乎孰為儒乎晉之時王謝許子以樂山水友支道林唐之時白公隱廬阜亦引四釋子為方外之交其意豈不然哉合之道其可忽乎雲與龍貴以氣合風與虎貴以聲合聖與賢貴以時合君與臣貴以道合學者貴以聖人之道合百工貴以其事合昆蟲貴以其類合不相合雖道如仲尼伯夷亦無所容於世也天下烏得不重其所合乎方二君之來也逼嵗除山鬱鬱以春意然代謝相奪乍隂乍晴朝則白雲青靄絢如也晚則餘氷殘雪瑩如也飛泉泠泠若出金石幽林梅香或凝或散樹有啼鳥澗有遊魚而二人者嗜山水則所好益得嗜閒適則其情益樂勝氣充浹而更發幽興優游紆餘吟嘯自若雖傍人視之不知其所以為樂也坐客接之不知其所以為得也獨潜子蒼顔敝履幸其末遊而謂之曰二君之樂非俗之所樂也二君之得非俗之所得也是乃潔靜逍遙乎趨競塵纍之外者之事也終之可也因評其詩曰公濟之詩贍冲晦之詩典如老麗雅健則其氣格相髙焉潜子默者於詩不專雖其薄弱病拙逺不及二君豈謂盡無意於興也山游唱和詩集後叙公濟初與潜子約為詩前後叙潜子不自知量既緒其端公濟乃謙讓不復為之然詩之意所叙未盡始公濟視潜子山中值雪詩愛其孤興獨往謂瀟灑有古人風遂浩然率冲晦䄂詩尋之留山之意極欵曲潜子亦以公濟既相喜好其意非常頗不自拘介樂與游詠潜子禪者罕以思慮亂在吳中二十餘載辱士大夫游從數矣如故侍郎郎公之顧其最厚深郎公又以詩名顯天下而潜子奉其唱和亦不類今恣肆而不自慎也然潜子雖固平生長欲晞於髙簡雅素如支道林廬山逺者為方外人患力不足及之雖然老矣而吾方袍之徒肯相喜而從其游者幾其人乎公濟儒者才俊與豫異教乃相善如此之勤也此不與游且詠而孰與游乎唱和總六十四篇始山中游詠而成者三十七篇其後相别而諸君懷寄賡唱往來者又二十七篇並編之為集嘉祐已亥仲春之五日潜子復題云與月上人更字叙上人名曉月字竺卿余以始字其義不當不可以為訓義以公晦易之名以月者蓋取其髙明之義也然明不可終明必受之以晦日月終明則晝夜之道不成故日晦於隂而月晦於陽也天地日月之至明者也聖賢烏可終勞其明乎聖賢終明則進退動靜之道固不足法於世也故古之聖賢者明於有為而晦於無事也舜明於政治而晦於得人以讓天下文王建箕子明於與九疇而晦於大難周公明於輔相而晦於成功孔子明於春秋六經之文而晦於旅人顔子孟軻子思揚雄皆相望而晦明於後世也故其事業甚大道德益揚作法於世而萬世傳之今上人有器識明於為學知道其將有所晦乎上人吾徒也與世俗事物邈然不相接又益宜晦焉余於上人故人也别去十年果得法自琅琊來㑹於吳中觀其處心空寂能外於身世而不纍其得喪是非真所謂能向晦者也字之以晦抑亦發其藴也一旦以道歸覲其所親索文為别故序其字而贈之云周感之更字叙周君初字感之余以其義未極請用誠之以更之周君名應然萬物莫不以類相應而不能應非其類也惟人誠乃能與天地殊類相應故誠應者應物之公也類應者應物之私也私則寡得而公則寡失君子恥失所於一物是故君子貴以誠應天下也誠也者至正之謂也易曰中孚中孚正也以其柔正乎內而剛正乎外也況下而順乎隂陽之得其道亦推乎人事則可以教大信彖曰乃化邦也豚魚吉信及豚魚也中孚以利貞乃應乎天地也誠之義不亦至矣哉周君始事父母則鄉人稱其孝及仕而廉明歷官品凡一簿一尉其人若緇黃儒素皆喜其仁德此非以誠待物焉能其善之之如是邪而君勞於縣吏積十餘年自不以其濡滯而苟薦於知巳問之則曰命也士病不為政豈汲汲於人知此又見其誠之之至也所謂誠之不亦宜乎既始之而又終之是之謂誠也天地以誠終始所以博厚而髙明聖人以誠終始所以垂法於萬世雖然君子之誠推所自得之苟其富貴也不以驕佚其老也不以耄紛其酒也不以醉亂斷斷乎始於是終乎是則聖賢之道得所傳也周君之德將不虧而得其全也其名聞孰可磨滅余與君皆南人也又特友善其相識知深且詳矣故因字所以序而勉之鐔津集卷十二
