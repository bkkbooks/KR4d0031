body:
  text: 鐔津集卷十四宋釋契嵩撰志記銘題共十篇武林山志其山彌杭西北其道南北旁湖而入南出西關轉赤山逾麥嶺燕脂北出錢唐門躋秦王纜船石過秦望蜻蜓二山垂至駝峴嶺趾左趨入袁公松門抵行春橋橋西通南之支路過行春橋垂二里南北道㑹稍有居民逆旅行人可休益西趨二里入二寺門逼合澗橋過合澗龍迹二橋自丹崕紫微亭緣石門澗趨冷泉亭至于靈隱寺流水清泚崕石環怪如刻削乍覩爽然也自合澗橋南趨更曲水亭並新移澗距天竺寺門西顧山嶂重沓相映若無有窮靈隱晉始寺之禪叢也天竺隋寺之講聚也其山起歙出睦凑於杭西南跨富春西北控餘杭蜿蜒曼衍聮數百里到武林遂播豁如引左右臂南垂於燕脂嶺北垂於駝峴嶺其山峯之北起者曰髙峯冠飛塔而擁靈隱岑然也髙峯之東者曰屏風嶺又東者曰西峯在郡之西又東者曰駝峴嶺俗謂駝宛乃語訛也其高峰之西者曰烏峰又西者曰石笋又西者曰楊梅石門又西者曰西源亦謂西庵支出于西源之右者曰石人其峰南起望之而藹然者曰白猿左出于白猿之前曰香爐益前而垂澗者曰興正右出于白猿之前而雲木森然者曰月桂白猿之東曰燕脂嶺白猿之西者曰師子又西者曰五峰又西曰白雲又西者曰印西南印西向前走迤邐於武林之中者曰無礙又前者曰善住並善住而特起者曰稽留俗謂雞籠乃語訛也其雞留之西者曰蓮華有巖號玉女其蓮華之東者曰飛來峰乃西域異僧惠理所謂此吾國靈鷲小嶺之飛來者也昔多靈仙隱焉乃呼白猿而驗之南屏天竺而北嶂靈隱其巔有天然石梁西跨其中有巖焉洞焉洞曰龍泓曰香林巖曰理公龍泓前者北瞰後者東出謂其潜徹異境絶浙江下過武林然南北根望而起者孱顔大有百峰多無名其名之者唯二十有四與城闉相去十有二里周亦如之秦漢始號虎林以其棲白虎也晉曰靈隱用飛來故事也唐曰武林避諱也或曰青林巖仙居洞亦武林之别號耳然其岪鬱巧秀氣象清淑而他山不及若其雄拔髙極殆與衡廬羅浮異矣其山八九月每夜霽月皎則天雨桂實其壯如梧桐子其水南流者謂之南澗北流者謂之北澗自合澗橋至于白雲峰之趾凡八逾橋其七石也其一木也北澗自龍迹橋至于西源峯之趾凡七逾橋其四石也其三土木也南澗源白雲峰之麓東注㑹他支澗逾苐八橋之西復東注㑹奚家澗入新移澗出閘口曲流北之合澗橋北澗源西源山之腹東注過騰雲塢口稍逼楓樹塢口湍于苐五橋下浸飛來峰趾匯于西塢漾渟于洗耳潭瀦于渦渚東嶼亦謂之暖泉也瀲灔于冷泉亭下經呼猿石門澗濽激于伏龍泓過龍迹橋下東注與合澗又東注越二里過行春橋下出靈隱浦入錢唐湖古所謂錢源泉出武林山此其是也南北之澗雖多多無名然皆㑹二澗其並南澗而入者曰南塢南人謂谷為塢谷音浴也並北澗而入者曰北塢而北益有支塢者六曰靈隱曰巢楊曰白沙曰大同曰騰雲曰西源是六塢者皆有佛氏精舍曰靈隱曰碧泉曰法安曰資嚴曰辨利曰無著曰無量夀曰定慧曰永安曰彌陀曰吉祥曰西庵其精舍凡十有三缺一名其十者在支塢其三者廢其三者宅正塢南亦有支塢或無南字皆有精舍曰天竺曰興聖曰崇夀講聚也曰慶寧曰永清曰金佛曰德澄曰福光曰天竺禪叢也古觀音氏垂象與人乞靈曰永寧其精舍凡十其五在支塢其五廢其五宅正塢諸塢皆有居民錯雜其殷處幾成村墅然無坂墾不牧牛犢羊豕水陸不甚汙其人不事弋釣虞獵以藮荈自業然同其在古潔靜清勝之風未嘗混也其俗在南塢者窮于白雲峰之巔在北塢者至于西源則坡𡊇西趨西溪南通南蕩其泉之南出者曰月桂曰伏犀曰丹井曰永清曰偃松曰聰明曰倚錫凡泉之源七其一月桂在天竺寺其一伏犀在西來峰之巔流液不常其五皆在支塢其泉之北出者曰冷泉曰韜光曰白沙曰石笋曰白公茶井曰無著偃松曰永安北源曰彌陀西源曰騰雲上源西庵也凡泉之源九其一冷泉在澗壖其八在支塢南塢其古人之遺迹若吳葛縣正字避廟諱之葛塢者若晉葛洪之丹井者若宋謝靈運之翻經臺者若隋真觀所標之佛骨塔者若唐道標杜多之草堂者其北塢若漢陸棣之九師堂者若晉葛洪之伏龍石門者若晉許邁之思真堂者若晉惠理之燕寂岩者若晉杜師明之謝客亭者若宋智一之飯猿臺者若呼猿澗者若梁簡文所記之石像者若梁朱世卿之朱墅者若唐白居易之烹茶井者若唐袁仁敬之袁君亭者二塢總十有六事徒古今相傳雖名存而其事頗亡不可按而備書其山無怪禽魗獸唯巢構之樹最為古木松筠藥物果蓏與他山類唯美荈與靈山之所生枇杷桂花發竒香異耳游南屏山記由山之麓而上百步許則東趨抵于霽雲亭西趨則傴僂過小石門抵于積翠亭由霽雲亭益東至于幽居洞洞之東則深林茂草也由積翠亭益西則入于叢竹之間隂隂森森殆不可勝數有石座環布中可函丈由積翠亭西曲折而上抵于發幽亭視錢唐城郭若見諸掌差發幽亭而東至于白雲亭由白雲亭之東厥徑枝分所往皆入乎茂林修竹不知其極矣由發幽亭又曲折而上援蘿蔓陵層崖履危磴至于山之巔一顧四達廓如也吳江越岫儼然在乎眸子其山控鳳凰城之西偏南走湖上高視靈鷲而俯揖胥山大約從麓至頂岩壑皆竒殊形詭狀世所無有如人物禽獸飛走騰踴往往至乎雲氣歘作交相掩映真若神鬼效靈千變萬化眩人心目或聞是山者初棄於莽蒼雖樵蘇豎子莫之肯顧培塿丘垤尚恐不得與之為比一日為好事者所知闢而發之杭人之來視莫不驚怪以為天墜地湧皆恨所以得之太晚游觀者於是推高是山雖瀕湖千巖萬壑莫出其右者至于名聞京邑而賢士大夫皆樂為是游故有來江東者不到南屏山以謂不可余因思天下四方有道之士晦昧于世與俗輩浮沉如南屏之始者抑亦多矣彼有道者必抱竒材異德卓卓絶類使㑹知已者引而振之資其輔相聖人之道而形儀人倫不亦偉乎可觀與夫山石游物又不可同日而語哉余嗜山水之甚者也始見南屏山且喜以謂一遊無以饜吾之心不若栖其隂藪常游其間故今年樂來息肩於此日必䇿杖獨往至其幽處也思慮冲然天下之志通至其曠處也思慮超然天下之事見至其極深且靜處也或無極深且三字冲寞岑寂神與道合乘浩氣沐清風陶然嗒然若在乎萬物之初是故志之以示其將來有慕我而為游者也解獨秀石名名或作志其既名獨秀石章表民以其名為未當且以詩評之更曰獨怪石表民能文其取義必逺然吾獨秀之義亦未始與人語因得論之世俗所謂怪石者必以其詭異形狀類乎禽獸人物者也為之焉如是則屏山之石盈巖溢壑無不如禽獸人物者也何獨一石謂之怪邪夫獨秀石有拔數仞嶷然特立于山之東南隅端莊不與衆石同趨附頗似正人端士抱道自處不以事勢為朋黨大凡物禀秀氣而生成者其所樹立必嶄然超出其羣吾所謂獨秀石者意其鍾得秀氣能自植立不與其類相為附麗要詩人歌以張之蓋欲有所警耳苟以怪石名之彼衆人者自能命之何待不腆而名之耶無已吾請從于獨秀無為軍崇夀禪院轉輪大藏記崇夀精舍轉輪藏成乃因天竺月師遺書故為書之按其書曰崇夀院籍屬無為軍為城中之塽塏也昔沙門義懷于此說法聚徒懷之徒既衆且盛而經教缺然患其無所視覽而清河張拱感是遽相率其邑人出財鳩工謀寫先佛三藏之說而懷師以他命既去復命今沙門淨因往繼之而張拱益與其院僧曰慈願共戮力必成其事既而因師復使僧處仁等募匠氏為轉輪藏以置其經然藏有殿環殿以衆屋總數十楹內置佛像法器金碧照耀皆儼然可觀其用錢凡七百萬夫轉輪藏者非佛之制度乃行乎梁之異人傳翕大士者實取乎轉法輪之義耳其意欲人皆預于法也法也者生靈之大本諸佛之妙道者也諸佛以是而大明羣生以是而大昧聖賢乃推已之明而正人之昧故三藏之取諭者諭于此也五乘之所歸者歸于此也然其理幽微其義廣博殆非衆人槩然而輒得故益其藏而輪之姑使乎扶輪而轉藏者欲其槩衆普得或闕此四字漸染佛法而預其勝緣則于道其庶幾乎是亦至人攝化羣生之一端耳其意逺且大矣今因師從而效之其所存不亦至乎可書也至和三年季夏十日記漳州崇福禪院千佛閣記太常崔禮部發使自通走杭遺書某曰崇福閣成慕仲靈志之某初不敢為徐思崔公名大夫也嘗為我以輔教編布之京闕于我有高義今益以他勝事囑我是豈宜違之耶遂引其事而書之崇福在漳南為大精舍徒衆常五百人聚居申申然尊大比丘顯微為長老微師統此方五年其屋廬大小治之以完初其居之東有隙地微師意其形勝可置之佛閣乃引其州人王文渥謀始居無何客有來謂曰今山中水大漲盡浮其久積之材出乎江涘是足成爾也微師以其感㑹遂大出其寺錢百餘萬王文渥益施二十五萬助之其州之僧者俗者不啻三十人因各相助勸其閭里之樂善者出財合刻賢劫千佛與五百應真之像并彩繪五百應真者始至和甲午仲冬役土木工遒遒日不稍輟明年方秋而其閣成巋然九間陵空跨虛飛橋危亭騫湧旁出其所造之像繪事既竟即迎而內之釋迦彌勒藥師則位乎其中千如來則列于前後左右也閣之下亦以釋迦文殊普賢衆聖之像而位乎其中五百應真與十六大聲聞則列其四向嘉祐初而龍巖人曰楊飾者益于其閣之南為大阿羅漢浴室廊廡環之備法事也然其規模壯麗閩人偉之謂是閣者乃吾閩樓觀之冠也若賢劫千如來者蓋在此劫與吾釋迦文佛相先後而見乎人間世也與夫天地羣靈萬有而為博大勝緣者也然聖人垂像與于天下後世固欲其人天者觀像以性乎無像其次欲其睹像以發其善心其次欲其瞻像以預其勝緣性乎無像近至也發乎善心嚮道也預乎勝緣漸上善也是三者雖于其功小差及其當世後代成德則一也崔公書曰微師高行人能與人為勝事人皆樂從之䝉竒其作佛閣意適合乎聖人垂像之謂則崔氏之所稱驗矣南方之人宜知其心無謂微師徒事土木而誇邁世俗耳彼方袍之後來者有所營為亦宜視法于微也嘉祐四年已亥孟秋之晦日靈隱之永安山舍記泐潭雙閣銘并序大長老曉月字公晦領禪者于泐潭十有五年矣其道既傳益欲治其精廬其徒居晉遂以師之意勸其鄉人裒金起閣于寺庭之左寺亦出財助之復勸乎吕氏之良婦曰胡氏鄒氏施錢十萬起閣于庭之右右者置慈氏之像左者桓鳬氏之鐘又礱密石為涌道與周禮湧道異義也于其閣之前者十餘丈費緡錢凡五十餘萬嘉祐庚子之仲春畢其繪事落成居晉乃因其師遺書求䝉文而志之然吾與公晦雅素相得最厚善而公晦為閣之心吾知之矣公晦之意在道不在閣閣乃寓其意耳夫入道莫先乎見聞今其閣之以像者正人之所見也閣之以鐘者發人之所聞也欲其即見而明妙即聞而頓覺乃不在語言不資文字而挺然獨得與吾教外所傳之宗合公晦之心固如此也不爾吾公晦豈肯徒事其土木也泐潭山水清勝乃昔大禪德道一馬祖遺迹之地一公道在佛氏之教為大至公晦居是有所為又能益推道于人其于一公始有所振也而與夫施者為福為勝利詎可量乎美哉公晦又間治世聖人之書其識精通于今之禪者尤為賢豪故以其閣復為之銘曰惟閣鏗鐘惟閣儼像像正爾見鐘發爾聽惟視惟聽乃正爾性勿謂道逺在爾一瞬勿謂聖逺在爾斯振惟閣惟樹吾有所寓惟鐘惟像乃爾神奬咨爾學者宜知爾師慎爾視聽勿謂徒為清軒銘并序高識上人闢其精舍之南廡盡得夫山川美景而濯濯可視武功蘇子美始名之曰清軒其後賢士大夫多游賞而賦詠之上人乃以其意因命潜子銘之既不得讓乃謂上人曰天地萬物莫不有清濁其氣象皆能感人而為正為亂夫天地之清其感人也肅聖賢之清其感人也莊時世之清其感人也修山川之清其感人也爽天地與時世之清化工吾不得而擬議若夫聖賢山川之清者是可推之以益于世也適上人敞是軒也㑹其山之靜水之清以待來者而賞之者其心開神爽思慮不復淫滯是亦益于人多矣或有開爽其心神而思返乎泰清至靜或云逍遙乎至靜則其為軒之意愈得也潜子因而銘之曰天地萬象有濁有清惟清感人人斯正也惟濁感人人斯亂也惟清惟正乃懋爾德惟濁惟亂乃滋爾慝鑒哉君子擇時所適戒哉君子慎時所玩爾軒惟明爾景惟清有山崇崇可以攄清有水泚泚可以濯纓既潔乃志既清乃神惟清惟潔乃為至適勿陋于軒兹為嘉賞勿謂外物兹為神奬惟清惟軒惟道所假克勤乃意彼上人也元集中不著名可疑也今謂高識者乃寓意耳南軒銘并敘南軒在南屏山之直北其山相去也不數百步倚軒而視草樹雲物秋毫不隱雨霽山光清發碧照枕簟夏之時景風飄飄不挹自來冬之時正抱太陽倰爍倰或從凌寒慘客有紆餘閒散無所用于世得終日俯仰于其間往往襟抱軒豁神氣浩然若外天地而獨立夫古之達觀者孰不貴得所適事苟可以正思慮使吉凶悔吝不害於道雖茅茨土階不為陋也陶淵明云嘯傲東軒下聊復過此生豈非得所適邪南軒豫客舍之後楹也威師不以不肖館之于此㑹事欲引去念南軒資之全愚似得所適雖主人以事役之猶且趨命况辱其以德義接之又豈可與南軒輕離銘曰顧南軒伊何偃仰躊躇我發彼美彼適我愚我與南軒相須舊研銘并敘余在故鄉時亡友道士馬知章出端溪硯為贈及遊四方硯且俱行于今十有四年矣知章不幸早死嗚呼知章為人有信義好學問耿潔務持高莭未果其志而天奪之夀視硯往往想見其人或無想字故持之而未嘗棄置是嵗康定記元之冬季也為之銘曰若人云亡道交巳矣金石而心視此寶此題錢唐西湖詮上人荷香亭壁西湖氣象不並他處朝暉夕靄黯淡清瑩無時不好山嶂樓閣金翠交眯荷花戰風芳香四散薰然乍眠恍若異境然人心清濁感物乃爾而為道者安得不擇其所居詮上人諷經詠詩習草聖書敞荷香亭資湖景而助清心慕道之興可見矣熙寧乙酉季冬二十五潜子題鐔津集卷十四
