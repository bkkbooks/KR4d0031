body:
  text: 鐔津集巻八宋釋契嵩撰雜著紀復古章君表民以官來錢塘居未幾出歐陽永叔蔡君謨尹師魯文示予學者且曰今四方之士以古文進于京師嶄然出頭角争與三君子相髙下者不可勝數視其文仁義之言炳如也予前相與表民賀曰本朝用文已來孰有如今日之盛者也此聖君之徳而天下之幸也退且思之原古文之作也所以發仁義而辨政教也堯舜文武其仁義至其政教正孔子以其文奮而揚之後世得其法焉故為君臣者有禮為國家者不亂方周道衰諸侯強暴相欺上下失理孔子無位於時不得行事故以之用褒貶正賞罰故後世雖有姦臣賊子懼而不敢輙作及戰國時合從連衡之説以傾天下獨孟軻荀况以文持仁義而辨政教當時雖不甚振而學者仰而知有所趨漢興賈誼董仲舒司馬遷揚雄輩以其文倡之而天下和者響應故漢徳所以大而其世所以久也隋世王通亦以其文繼孔子之作唐興太宗取其徒發而試之故唐有天下大治而韓愈柳宗元復以其文從而廣之故聖人之道益尊今諸儒争以其文奮則我宋祖宗之盛徳鴻業益揚天子之仁義益著朝廷之政教益辨然而卿士大夫内觀其文知所以脩仁義而奉上正政教而涖百姓萬邦百姓外觀其文知所以懐仁義而附國家聽教令而罔敢不從四夷八蠻觀其文以信我祖宗之徳業知可大而可久也使其望而畏之曰宋多君子用其文以行古道中國之禮樂將大脩理不可不服也易曰文明以正人文也又曰觀乎人文以化成天下彼戎狄叛命兇慝之邊鄙今朝廷當行征伐以誅其不廷而文之興也郁郁乎如此是亦止亂不專在於威武明文徳而懐之也君子觀之謂其化成天下也宜與堯舜文武較其道徳也哉夫社稷之靈長久厯數之無窮雖漢唐之盛美而奚足以比並文說章表民始至自京師謂京師士人髙歐陽永叔之文翕然皆慕而為之坐客恱聴客有一生遽曰文興則天下治也潜子謂客曰歐陽氏之文言文耳天下治在乎人文之興人文資言文發揮而言文藉人文為其根本仁義禮智信人文也章句文字言文也文章得本則其所出自正猶孟子曰取之左右逢其原歐陽氏之文大率在仁信禮義之本也諸子當慕永叔之根本可也胡屑屑徒模擬詞章體勢而已矣周末列國嬴秦時孰不工文而聖人之道廢人文不足觀也盖其文不敦本乃爾孔子無位其道不行病此不得已徒以六經春秋之文或云春秋六經載之以遺後世故曰我欲載之空言不如見扵行事之深切著明也聖人豈特事其空文乎君臣父子師徒朋友其文詞有本仁義禮信藹然天下不治未之有也易曰觀乎人文則天下化成豈不然哉坐客聞吾說皆愕然不辯本或從辨議旱對歲旱論者有來訪予曰今兹五月不雨及餘七月吴疆赤地千里稼穡槁矣農夫忙忙無所奈何百穀湧貴乃倍其價道路餓莩相望為政者禱于山川趨其急猶捄之水火而雨終不至民未免皇皇如也請於吾子則曰何如為之所耶余時應曰此官人者謀之非吾野人之事也無已則與子竊語之吾甞聞諸長者當荒旱時謂之凶年為國憂民者莫如發倉廪以救其饑而後教之惜井泉謹隄防命吏與之相水道引民并力擁江河注之陂池以洽灌溉察市道平物價乘時射利欺于貧弱者以法誅之勸有餘者貸不足約不足者以樂歲酬之闗譏無重征以通商旅細民鬻販者容之察刑獄明民之寃枉斯則亦救旱之一道問者復曰禱於山川之神宜之乎曰於禮亦有之然有水旱疫癘之災以禜山川之神者舉古法以順民心耳或作人心如風雨時至水旱不為沴非由乎山川也問者憮然曰我鄙人也未識乎旱潦之所由子復為我言之曰極陽之謂旱洪範咎徴曰僣恒暘若又曰王省惟歲卿士惟月師尹惟日嵗月日時無易百穀用成乂用明俊民用章家用平康日月嵗時既易百穀用不成乂用昏不明俊民用㣲家用不寧説者云夫僣也者何過且差也曰政之差而民無教也民無教則肆暴刑也肆暴刑則罰不當也罰不當則民怨之與肆暴所感故旱順之夫嵗月日時無易百穀用成乂用明俊民用章家用平康也者何王由王道而不任喜怒妄黜陟卿士師尹卿士師尹守厥職無僣妄以侮王權也如此則國事脩國事脩則其氣和洽氣和洽故百穀成而治道明也俊良得志以行其道是上有仁義而下無怨咨故國家安也夫日月嵗時既易百穀用不成乂用昏不明俊民用㣲家用不寧也者何君奪臣職而臣冒君政也如此則國事不脩國事不脩則人不和人不和故百穀不成而治道昧也俊良之道不顯是上非仁義而下民胥怨故國家不安也今天子聖明而俊傑在位所謂刑政禮樂豈聞過差也然宋有天下鷄鳴犬吠徹于四海其為廣且逺矣殊方逺俗政教豈悉至而刑罰能無誤也惟刑政禮樂正則風雨以時來旱潦無由作也惡用禱邪問者韙之再拜而去夷恵辨或從辯孟子曰伯夷隘柳下恵不恭隘與不恭君子不由也又曰伯夷聖之清者也柳下惠聖之和者也又曰聖人百世之師伯夷柳下恵是也故聞伯夷之風者頑夫㢘懦夫有立志聞栁下恵之風者鄙夫寛薄夫敦始曰君子不由也者孟子拒之之詞也次曰清與和也者稱之之詞也又次曰聖人百世之師也者慕之之詞也既拒而又稱慕之學者多惑有以其言為不詳吾故不然謂孟子之說厥㫖逺乎夫君子與人適義而已矣故其去就無固無必如其人始惡而一日翻然以道求我君子必接之接之得其誠則就之如其人始不惡而一日翻然以無道從我君子必直之直之不得已則去之君子就之非苟從也義可從也君子去之非苟去也義可去也故君子之去就非苟也專在其義也彼伯夷者恥立惡人之朝恥與惡人言推惡惡之心思與鄉人立其衣冠不正望望然去之若將凂焉以諸侯為不㓗雖有善其辭命而不受也以其終為不㓗果不就已彼柳下恵者爾為爾我為我雖袒裼祼䄇於我側爾焉能凂我哉但其自治不顧治人混然苟與之處果不去已柳下恵與不脩之人處而不能正之既不能正之又不能去之是侮人者也伯夷得人善辭命以至誠相求而不肯酌其誠既不能恤其誠又不能就之是棄人者也棄人也者是不與人為善也侮人也者是與人無禮也與人無禮孰為恭乎不與人為善孰為容乎以君子之道較之則二子之去就不亦非義而宜乎孟子曰君子不由也若伯夷目不視惡色耳不聴惡聲横政之所之不忍居也清㢘其身更治亂而不渝非得聖人之清者孰能守之如柳下恵進不隱賢必以其道遺佚而不怨阨窮而不憫非得聖人之和者孰能忍乎孟子當戰國時無道也而姦臣賊子眦睚恣作頑懦鄙薄争勢冒利雖死不顧其有節義孟子以羞堯舜之道不行思以清㢘寛和之風矯激其時故必尊伯夷柳下恵為百世之師者也其始曰隘與不恭者辨其不以義而為人也盖欲使人慎去就故有拒之之辭也又曰清與和者是明其各有聖人之一徳也欲人知賢其人故有稱之之辭也又曰聖人百世之師者有以警於世也欲人聞其風而自化故有慕之之辭也伯夷柳下惠特立自任者也不顧教人故其所為亦不顧世之是非也孟子行道者也其務教人故指其所為是者取之非者正之所以夷恵之事雖得失而兩存於其書唐太宗述太宗始視文静於繫獄何憂天下之急也隋大業間劉文静坐與李宻連姻繫獄太宗入視乃謂曰今看卿非兒女情與卿圖大事也諫班師於霍邑號哭以感何忠孝之義合也髙祖初起義師西圖中國隋將宋老生據霍邑以拒義師㑹久雨糧盡髙祖議還太原太宗欲須入咸陽髙祖不納號泣聲聞帳中誅建成元吉何循大義也武徳九年建成元吉謀害太宗事泄太宗将尉遲敬徳等九人入𤣥武門誅於臨朝殿前與可汗刑白馬而盟之何信行於戎狄也太宗登極初可汗寇涇州總兵百萬至渭水便橋太宗獨上以輕曜軍容可汗見懼而請和故刑白馬盟於便橋上而去拒徳彛之謟何沮天下之佞人也貞觀初奏秦王破陣樂曲封徳彛對曰陛下以聖武戡亂𤣥極奏樂象徳定文容以為比上曰朕雖以武功定天下終以文徳綏海内文武之道各隨其時公謂文容不如蹈厲斯言過矣突厥胥亂以其無罪於我不乘便而討之何賞罰之有禮也貞顴初突厥諸部叛討之而兵叛羣臣請乘便討之上曰豈有新與之和乘其亂而滅之邪縱部落盡叛六畜皆死朕終不討待其有罪而後擒取議不屢赦何賞罰之正也太宗謂羣臣曰赦有罪乃不軌輩古語一歲再赦好人喑啞故朕不頻赦庶得四海安泰也與杜淹論樂何知政也太宗初奏新樂謂侍臣曰禮樂之作聖人緣物設教以為撙節治之隆替皆由於此御史大夫杜淹曰前代存亡實由於樂故陳之亡為玉樹後庭齊之亡為伴侣行路聞之莫不悲泣上曰不然夫音樂之感人心歡者聞之則恱憂者聴之則悲將亡之國其民心苦苦心所感聞樂則悲何有樂聲使人恱者悲乎今玉樹伴侣其音具在今公奏之公則不悲耳與孔頴達論籍田何知經也貞觀初籍田方田給侍中孔頴達曰按禮天子於南郊諸侯於東郊晉武於東南今於城東不合古禮上口禮緣人情亦何有定虞書云平秩東作朕今見少陽之地田扵東郊葢其儀也亦何不合於古禮者哉罷營閣之議何惜民力也羣臣以宫中卑濕請營一閣以居上曰朕徳慚漢文豈可過勞民力竟不許幾致刑厝何天下之有教也居不閉户行不賫糧何天下之㢘讓也貞觀四年冬斷刑四十九人幾致刑厝嶺外之户不閉行旅不賫粮也赴刑者應期而畢至何天下之無欺負也貞顴七年冬親録囚死者三百九十人令明年秋來就刑至是畢集而詔以原之納魏徴之言何與人為善也太宗納魏徴諫争見扵本傳甚衆自古稱禹湯文武所以為禹湯文武者正以其由仁義之道而王天下也如後世以仁義而為王者猶禹湯文武也吾讀唐書得太宗之事如所述者不可勝舉原其所歸皆趨仁義要其與禹湯異者亡也當時論者謂太宗大度類漢髙神武同魏武夫漢髙寡文徳而魏武不及霸道惡可與太宗擬論乎惜哉欲用周禮治而房魏輩不能賛成之如使王通未䘮唐得用之太宗文中子曰如有用我者吾則抱周禮以從之則卜年卜世何翅乎三百一十六也孟子曰五百年必有王者興其間必有名世者太宗之作真王者也而不但文中子可歎也哉易術解子郝子治易平生得聖人作易之大法乃解易以自發其法謂聖人所以作易在治道治道在君臣君臣法隂陽以成爻列爻以成卦立卦以成易是故求治道者必觀乎易求易象者必觀乎卦求卦體者必觀乎爻求爻變者必原乎隂陽隂陽也者作易之本也治道之大範也隂爻者爻或作義臣道也陽爻者君道也隂陽之爻升降得其所則卦吉隂陽之爻失其所則其卦凶是故君臣之道正則其政治也君臣之道繆則政亂也治則三綱五常修也三才順也萬物遂也亂則彛倫萬物斁也夫天下萬世治亂規誡之道易其備矣方絶筆乃出其書示於潜子欲吾亂而明之潜子稽其説條其緒雖累百而無不與聖人之法合者掲然而自立義列精而且至大畧如乾坤小畜大畜卦之類雖古之善治易者不過是也潜子因語其人曰子之書是也然易之始固出於河圖河圖所見唯隂陽之數最為其本也而君臣之法與其神物偕出矣雖然而其吉凶治亂之效未著乃資乎聖人者君天下而發之故包犧氏出焉示與神道適會遂卦之而又爻之爻或作義用其法以王天下然其法非聖人作君不能張之聖人非以是不能王之故易與聖人而相須也孔子聖人也雖知其法而無位歎不得如虙犧行其道於當世徒文而傳之其故曰鳳鳥不至河不出圖吾已矣夫然其傳自孔子之商瞿更九世至漢人楊何而所傳遂絶其後諸儒用已見各為其家紛然騁其異説師弟子相承相勝不復守聖人之道真易之道遂㣲而子當易道支離紛錯漫漶難審之時乃毅然獨推聖人之軌法解其書以遺學者其於聖人之道亦有力焉子郝子益謂潜子曰吾考雜卦其説煩且重殆非聖人之意是盖後世學者括衆卦而歌之之言也預之十翼不亦沗乎吾嘗削之乃離序卦為之上下篇而以禆夫十翼可乎潜子曰揚子雲謂學者審其是而已矣仰聖人而知衆說之小也子非之果是而排其瀆聖人之言者宜之何必疑之逍遥篇天地均乎功萬物均乎生日月均乎明四時均乎行生生之道同然而所以為生奚一謂功不殊謂生不異謂明不兩謂行不各使皆任其自然而然者人其適扵虎狼蛟龍也虎狼蛟龍𢤱悷矯軋乎性又奚全於天淳乎故曰道亦自然非道亦自然道亦自得非道亦自得昔夫黄帝也髙辛也唐堯也虞舜也夏禹也西伯也后稷也孔子也曽參也子路也伯夷也展禽也桀紂也幽厲也惡來也盜跖也是此者不亦生乎而所以為生曷嘗齊邪食息與人同而動静與人别若所謂者繄何以明之黄帝之為生也脩徳振兵治五氣藝五種撫萬民而安乎天下往而登乎雲天髙辛之為生也順天之義知民之急仁而威惠而信其色郁郁其徳嶷嶷其動也時共服也士既執厥中而徧天下帝堯之為生也其仁如天其知如神就之如日望之如雲富而不驕貴而不舒平章百姓恊和萬國帝舜之為生也父頑母嚚順適而不失子道二十而孝聞終踐帝位而明徳於天下夏禹之為生也其徳不違其仁可親亹亹穆穆為綱為紀以治洪水故功至天下西伯之為生也篤仁敬老慈少禮下革苛虐之政斷虞芮之訟禀天明命乃君萬國棄之為生也相地之宜乃為農師天下得其利焉丘之為生也祖述堯舜憲章文武禮樂由之成仁義由之明參之為生也孝道昭由之為生也至義明伯夷之為生也激大㢘柳下惠之為生也懐至和桀之為生也務之㐫徳殘傷百姓特身不保遂放而死紂之為生也拒乎諫飾乎非好酒淫樂嬖於婦人而殫殘無辜至於身厄火死為極大醜幽厲之為生也接慝桀紂惡來之為生也間亂君臣盗跖之為生也眦睚肆賊夫道亦自然者黄帝堯舜之謂也非道亦自然者桀紂幽厲之謂也道亦自得者參由夷惠之謂也非道亦自得者惡來盗跖之謂也刀與劒同銕以謂自然乎劒自得乎利水所以截蛟犀陸所以斷虎兕縱而試之恢恢乎是安知金之性也耗于是哉是故聖人任乎自然之道不任乎自然之生得乎自然之正不得乎自然之邪故静與天地合動與禽獸别喜怒不得攻貪殘不得容離諸有而立于妙故君子不可不知道道也者大妙之謂也至寂也而通乎羣動至無也而含乎萬有舂容在聲而聰者不可以盡其音暐曄在色而明者不可以究其景謂之不可得終天地而未喪謂之可得彌天地而未有有有于無無無于有有無偕遺而返乎不可状故曰非天下之至神孰能與於此乎所以能挈天地運乎日月天地日月雖為巨焉曷嘗不為道之用乎無名天地之始有名萬物之母此之謂也有人于此弗原乎道被髮狂行謂我自然天倪紛于内視聴馳于外物將樊籠其性也又奚得適乎生夫人有二大性大也情大也性大故能神萬物之生情大故能蔽聖人之心金與木相摩則然木不勝固焚矣情與性相制則亂性不勝固滅矣孰知夫性全也輿人不為聖乎情全也聖不為輿人乎或曰明堂辟雍髙門峻宇長者之所慕趨而鳥過之疾飛獸過之急馳小人過之追風而去然則鳥獸生乎林薄小人成乎闒茸其分定而其性不可移此三者相與而去不其然乎於此乃曰性全也輿人可為聖情全也聖可為輿人是世所未有也逍遥曰不待黄帝而論大智者大匠屈於雕蟲之子不須彭祖而言大年者大椿屈於舜英之草必矣夫測孟津者安可以錐視雲天者安可以管觀大道者安可以形骸故神照而心不滯者可與言道也夫干越夷谿之子生而同聲長而異俗昔者太甲肆暴不道湯法而伊尹教之三年則遷善脩徳卒朝諸侯周宣王厲王之子而周公召公輔之脩政故能振成康之遺風齊桓公之滛樂非禮由管仲隰朋也故能一正天下而作長五伯由竪刁易牙也故父子疑忌其國大亂子路彼之勇人也化扵仲尼故能以義揚名䕫之典樂也擊石撫石而百獸率舞狙公之賦芧也朝三暮四而衆狙怒瓠巴鼓瑟而逰魚出聼伯牙絃琴而六馬仰秣太甲齊桓遊方之内者也目視耳聆未必出乎事物之表心情相戰營營不間一旦為人所化禮義勝之猶能舍不肖而庶幾乎賢者其若是焉彼禽獸也由人情動以欲逐物猶能感樂而順養此九者豈異生而别造化乎何則始此而終彼獸居而人隨况大通乎况大全乎漠然唯神死生不化者也又奚人而不為聖乎故荀卿曰神莫大乎化道福莫大乎無禍但適異國者必知途適萬里者必積行往而不知胡越之路則沒身不覿異國去而不動跬歩之舉則終生不離國門故君子患不知理不患其名之不美患不行道不患其心之不神嘗試論曰聖愚者堯桀者其氣有殊而其性常一性非氣而不有氣非性而不生故氣也者待乎性性也者假乎氣氣與性未嘗相違古者既得其母已知其子既知其子復守其母沒身不殆故夫隂陽之交是生五行性乗乎隂陽而遇其交也故為聖人為賢人為仁人為義人為小人為愚人猶禮運曰人者其天地之徳隂陽之交鬼神之會五行之秀氣也夫聖人者得全乎隂陽也賢人者得乎隂陽之㣲五行之先也仁人義人者得乎五行之一也小人愚人者得乎五行之㣲也禽獸又得乎㣲乎㣲者也夫性之與氣猶火之於薪焉火之性其輝一也洎焚於草木則其明未嘗同矣是故古之得道者不以心役氣不以氣擾心心之不動也則人正性命故老耼曰歸根曰静静曰復命復命則妙觀乎色而循至乎非空非空也者常無有也唯色也者有非常也知色雖妄而空未始為空惑者皆為色而格于空也而色也者不亦為可資乎萬物紛異而此何不同然雖知未及聖而所以為聖又奚缺如謂之唯色萬物大域謂之非空萬物太宗所以三乗等觀心空而入道若然者歴大亂而不瀆履至危而不岌不為而自化不操而自正天地有殞而此未始患其有終日月有息而此未始患其有窮此或真道逍遥㳺者之所趣乎西山移文自然子西山之有道者也處仄陋間三十年雜老農老圃以㳺未嘗一日以語􅘅物康定初朝廷求儒於草澤知己者将以道進扵天子自然子引去不顧余於自然子有故也聞且惑之謂自然子賢者不宜不見幾念方當逺别不得與語故文以諭之曰子自然子讀書探堯舜之道豈宜自私得志推諸天下與人共之不得已山林而已昔曽㸃顔淵樂道終扵隱約而不改彼以時命大繆而然也今天下一國君人者有道自然子之時固異矣安得與彼二子同年而語哉吾嘗謂隱者之道有三焉有天隱有名隱有形隱形隱也者宻藏深伏往而不返非世傲人者之所好也長沮桀溺者其人也名隱也者不觀治亂與時浮沈循祿全生者之所好也東方曼倩揚子雲者其人也天隱也者心不凝滯拘絶於事無固無必可行即行可止即止通其變者之所好也太公望孔子顔淵者其人也子自然子志在孔子而所守與長沮桀溺輩類彼長沮桀溺者規規剪剪獨善自養無有憂天下之心未足與也自然子固宜思之與具道在於山林曷若道在於天下與其樂與猿猱麋鹿曷若樂與君臣父子其志逺而其節且大為之名也赫赫掀天地照萬世不亦盛矣哉自然子思之行矣無且容與知言者豈以我為狂言乎哀屠龍文屠龍古有朱評漫者以學所悮而窮於當時評漫不知何許人也其性剛徤以割鷄解牛不足以盡其勇思託非常之屠以適乎智故殫千金資學於師三年學成或作技成而無所用其巧骯髒于世無所信適刲羊屠狗者陽陽其前市井之人見則指笑嗚呼評漫往矣曠千萬年有聞其風而自感且為文以發其事龍也者純陽之精靈於鱗蟲非有定形馮神雲氣而變化不測故於人世罕得而窺焉彼欲絶其精恠祛人江海之暴泯其形生夷其族類非能游刃於無間智與神遇而龍可屠乎嘗聞海中之國其人如雲乗風騎日出入於天地之外而往來無迹彼則䏑龍肉而資所贍是屠龍者彼人之事也然屠龍之事在古則用扵其國今也評漫之時或亡幾乎息矣評漫身世則與彼人異而為屠龍豈其宜乎然評漫者非不知其非己任邪盖性與其道合而形迹外忘又何暇計乎世俗之用不用哉夫龍之為物也其亦神矣為屠之術人之難能評漫於此則毅然作之窮且不止止或作沮是評漫之性也神武妙得於聖人之勇者也嗚呼屠龍聞之于古今幾世而不有一見於評漫之性所謂聖賢人者故能盡人之性盡萬物之性聖賢也尚未聞異評漫之心而正其所託况區區之俗其能識評漫乎屠龍之道不為窮乎悠悠六合之間古兮復今往者其可哀來者其可憫記龍鳴吾年十九時往吾邑之寧風鄉至于姚道姑之舎道姑異婦人也其舎在山中留且數日遂聞其舎之山脅有聲發于陂池之間舂然若振大鐘如此數聲吾初恠之顧此非有鐘可聲頃之遂以問道姑道姑肅然作而曰異乎此龍吟也聞此者大瑞子後必好道姑處子時嘗取水溪中身感龍漦及人禮之夕龍光發于房女子即亡亡而還不復樂其家居鄉人神之遂為結精廬處之山中然姚女自少獨守精潔齋戒初頗逆道人間吉凶其事輙驗及吾見時已老年六十餘氣貎泠然不復道人吉凶楮冠布服栖髙樓專誦佛經雖數萬言日夜必數帙妙法華經遇物慈善故其鄉人靡然相化吾嘗問其何所以授經曰嫗少時每有神僧乗虗而來教嫗耳吾故以其所謂龍吟者不妄也吾讀書視古人如是者多矣有若房琯薛令之賤時栖山皆謂曽聞龍吟其後房果為宰相薛至太子侍讀此其所聞之驗也嗟乎余雖不埓於二公然而遵道行已豈負於聖賢而卒以𢎞法為庸人誣䧟遂示醜於天下何其所聞末異而所驗不同邪姚氏之謂可疑也吾意夫龍者君之象也豈今天下治平盛乎聲明文物以遭其時得以而歌之此其驗也不然神龍亦有妄以聞乎有本云龍亦有妄鳴乎寂子解盖師少時所稱而後更號寂子寂子者學佛者也以其所得之道寂静奥妙故命曰寂子寂子既治其學又喜習儒習儒之書甚而樂為文詞故為學者所辯學佛者謂寂子固多心耶不能專純其道何為之駮也學儒者謂寂子非實為佛者也彼寄迹於釋氏法中耳寂子竊謂此二者不知言者也不可不告之也因謂二客曰吾之喜儒也盖取其於吾道有所合而為之耳儒所謂仁義禮智信者與吾佛曰慈悲曰布施曰恭敬曰無我慢曰智慧曰不妄言綺語其為目雖不同而其所以立誠脩行善世教人豈異乎哉聖人之為心者欲人皆善使其必去罪惡也苟同有以其道致人為善豈曰彼雖善非由我教而所以為善吾不善之也如此焉得謂聖人耶故吾喜儒亦欲晞聖人之志而與人為善也又吾佛有以萬行而為人也今儒之仁義禮智信豈非吾佛所施之萬行乎為吾萬行又何駁哉又謂之曰客無以吾喜儒為寄迹苟容於佛氏法中耳寂子雖無大過人豈不能為抱關擊柝魚鹽版築之事以苟容其身耶甘落髮忍所愛口不敢嘗於葷血以奉佛者誠以其教廣大其道真奥以之脩身則清浄齋戒以之脩心則正静無妄以之推於人則悛惡為善善者為誠以之死生終始則通於鬼神變化雖飢羸枯槁委扵草莽而不忍移者正以其所存如此也夫市井小人以市道相師有一言利其所為尚能終身戴其師之徳寂子雖陋寧不賢於市井輩邪得人之道而僥倖以負其教而奴𨽻之人不忍為也寂子豈為乎仰天俯地吾不欺於聖人也客幸無以此為説也二客者嘗以其教相辯寂子亦從而諭之曰客無諍也儒佛者聖人之教也其所出雖不同而同歸乎治儒者聖人之大有為者也佛者聖人之大無為者也有為者以治世無為者以治心治心者不接於事不接於事則善善惡惡之志不可得而用也治世者宜接於事宜接於事則賞善罰惡之禮不可不舉也其心既治謂之情性真正情性真正則與夫禮義所導而至之者不亦會乎儒者欲人因教以正其生佛者欲人由教以正其心或云欲人正心以行其教心也者徹乎神明神明也者世不得聞見故語神明者必諭以出世今牽扵世而議其出世也是亦不思之甚也故治世者非儒不可也治出世非佛亦不可也二客復相辯其教之末者云云寂子又諭之曰君子扵事宜揣其本以齊其末則志常得而言不失也今也各不詳其所以為教而辯其所奉教吾未見其得之者也苟辯其末孰不可辯也二客且止然寂子與人㳺也不接其勢不奉其豪不要其譽唯其達道與已合者與之視其嘐嘐相訾者悠然不樂從之或問寂子子似善於佛曷掲子之道以示於世寂子曰吾道難言也言乎邇則常不可極言乎逺則常自得存乎人通乎神達乎聖厯乎死生變化而不失未易一一與俗人語也誠欲求之當探寂子所著之内書寂子解傲寂子為郝氏之隱者也其性簡静不齷齪事苛禮故為俗所謗憎終以傲誕譏之寂子初以流俗之説宜不足顧雖朋儕規之亦未始奉教及壮道業且脩而其謗益甚來相規者愈勤寂子憮然歎曰世真無知我者也乃坐規者與之語曰俗謂我傲豈非以吾特立獨行與世不相雜乎又豈非以吾不能甘言柔顔而與世順俯仰乎規者曰不出是也寂子曰言道徳禮樂者大要在誠非直飾容貌而事俯仰言語也吾惡世俗之為禮者但貌恭而身僶俛考其誠則萬一無有内則自欺外實欺人故吾扵人欲其誠信不專在言語容貌俯仰耳所謂人者孰不可以誠信接之誠信之通雖容貌揖讓不亦末乎昔嚴子陵扵漢乃卧見盧鴻扵唐輙不拜正謂以誠信待天下也子謂二子其非乎是耶必以為傲則吾無如之何也今俗謂之恭敬而不問仁鄙義與不義權利所存則籧篨僶俛馳走於其下甘役身而不殆苟為權與利不在雖賢與義與坐必倨與視必瞪施施然驕氣凌人書曰傲狠明徳正此之謂也嗚呼俗之所為如是且不自引其過而反譏我亦猶䝉塗汙而笑不㓗子往矣無更規我鐔津集巻八
