body:
  text: 鐔津集卷六宋釋契嵩撰論原次前十篇問兵客以論兵問而叟愀然曰何是問之相屬也叟野人也安知兵乎客曰謂子其學兼儒儒之道具于文武兵也者武之效也不知兵孰謂之道曰道也者何真兵亦仁義而已矣客不達且引去叟介然謂席人曰兵者刑也發於仁而主於義也發於仁以仁而憫亂也主於義以義而止暴也以義而止暴故相正而不相亂以仁而憫亂故圖生而不圖殺是故五帝之兵謂之正刑三王之兵謂之義征義征舉而天下莫不懷也正刑行而天下莫不順也炎帝之後不逞而軒轅氏陳于涿鹿兵未接而其人已服共工氏封豕其民而顓帝伐之亦未戰而遂服湯東面而征西夷怨南面而征北狄怨曰奚為後我民望之若大旱之望雲霓也紂為無道而武王征之至于孟津不誥而諸侯㑹紂有億兆夷人不用於商而用於周周衰而兵道一變所謂仁義者遂妄矣乃發於暴而至於詐強國以兵橫大國以兵驕忿國以兵亂貪國以兵侵齊始勝於楚而齊後負於晉晉始勝齊而晉復負於秦迭興迭亡類乎博塞之為玩夫兵逆事也無已則君子用之是故聖人尚德而不尚兵所以明兵者不可專造天下也穀梁子曰被甲嬰胄非所以興國也則以誅暴亂也文中子曰亡國戰兵霸國戰智王國戰仁義帝國戰德皇國戰無為聖王無以尚可以仁義為故曰仁義而已矣孤虛詐力之兵而君子不與吾其與乎席人咨嗟曰未之聞也羅拜而罷評讓世所謂讓者宜有輕重而學者混一而論之於禮無别則後世何以取法乎若夫天子以其天下讓諸侯以其國讓卿大夫以爵位讓士庶以名利讓是皆有所以而讓之者也其所以讓之得其正則其禮可取也所以讓之不得其正則其禮何所取乎夫讓也有以時而讓者有以義而讓者有以名而讓者有以勢而讓者有以苟而讓者以時讓者仁以義讓者勸以名讓者矯以勢讓者窮以苟讓者亂魯之隱公其苟讓者也漢之孝平其勢讓者也吳季札曹子臧其名讓者也太伯伯夷其義讓者也堯舜其時讓者也堯之時大同其時可讓故遜于賢而天下戴其仁也故曰以時讓者仁禹之世浸異其時不可讓于人故其子承之而天下亦戴其仁也太伯伯夷以賢相推而其義可讓也讓之足以勸百世故曰以義讓者勸季札子臧當列國相爭而父子交殘乃以讓名奮所以矯激其時也故曰以名讓者矯漢之孝平迫于强臣之勢而其身窮困殆不能振遂以其天下讓故曰以勢讓者窮魯之隱公不以正讓非其人而苟去之卒至乎淫亂故曰以苟讓者亂孟子曰天與賢則與賢天與子則與子荀子曰堯舜禪讓或作擅字依荀子文也此乃專擅意也在理當作擅與禪契是不然也天子勢位至尊無敵於天下者夫有誰與讓矣揚子曰允哲堯擅舜之重則不輕於由矣韓子曰堯舜之傳賢也欲天下得所也然四子皆不達乎聖賢之時也其言孰為詳乎如堯非其時則豈肯以天下讓于他人乎使禹得堯之時而天下豈及其子乎所謂堯舜禹其奮於萬世之上者正以其時而為之者也堯舜禹其聖之時者也嗚呼後世者其人自私甚乎禹之時也而傳授者不能本禹曰吾慕堯舜為之禪讓是亦妄矣其知時乎問霸問者曰君子稱王或不稱霸謂霸執權謂王修信也而霸孰謂無信邪固疑其道也幸吾子辨之使桓文之事皆悉也曰王尚德霸尚功夫王有權王者以權而行德也霸有權霸者以權而取功也取功故其權未必不私也行德故其權未必不公也故公者為權而私者為詐也王有信誠信也霸有信假信也假信故愈久而愈渝誠信故愈久而愈信齊桓公方㑹諸侯自北杏底幽十一主盟而諸侯皆順其信存也及城緣陵而諸侯皆散其信渝也晉文公其戰克楚踐土之盟以功自髙遂召天王其章詐也是故君子稱之稱其當時之功也不稱者或無者字惡其詐且不誠也詩稱投我以木瓜報之以瓊琚匪報也永以為好也善罰之功也子曰管仲之器小哉卑霸之道也中古之霸有異禮而無異道後古之霸有異道而無異禮守職命而不擅征不亦有異禮乎信征伐而尚詐力不亦有異道乎故曰霸非古也亂王政自桓文始也今俗曰霸道適變治者不可不用也仲尼曰管仲相桓公霸諸侯一匡天下民到于今受其賜微管仲吾其被髮左衽矣我其舍諸噫致合天下之猖狂詭譎傳㑹于孫子吳起之說淫溺而不反者也此誠愚者之言烏足與知聖人之意邪所謂適變者蓋君子因事而正之以義者也豈曰以智詐而變正道者也春秋之譏變古正以諸侯用私而變公者也夫至道之世不顯權至德之世不懷功懷功恐其人因功而競利也顯權恐其人因權而生詐也是故堯舜之化淳而文王之化讓漢氏曰吾家雜以王霸而治天下暫厚而終薄少讓而多諍巽說易曰巽以行權何謂也曰君子乘大順而舉其事者也時不順雖堯舜未始為也重巽順之至也陽得位而中正當位也剛正以用巽用之當也故君子為之也乘其順履其中效其用其道莫不行也其物莫不與也然則時之順必大權然後帥其正也權之作必大人然後理其變也權也者適變之謂也夫大人其變也公小人其變也私權也者治亂安危之所繫也故權也不可以假人也孔子曰可與學未可與適道可與適道未可與立可與立未可與權蓋慎之至也至順者大有為之時也位中正者君之位也剛正則用巽天下之大權也唯天子居其位行其權以順其時也用巽則以制其物也用巽不可以示其民而使知之也制莫之制則亂也慎密則民不知其所以而姦不生也故文言曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物睹本乎天者親上本乎地者親下則各從其類也九二曰巽在床下蓋言卑而失其正也不可以用巽也用巽則物不與而且亂也上九曰巽在床下喪其資斧其貞凶蓋言過其時則用斷不可是失其權也九五曰先庚三日後庚三日蓋言慎其出號令也故號令不可輕發而屢改也是故用巽不宜在九二也上九用巽固不可也用或作則或無固字九五其用巽者也宜專乎號令者也人文辨者曰是世文隆天下其將成乎其隆者文言也而文言烏足以驗乎天下成邪何文其可驗乎曰必也人文也易曰觀乎人文而天下化成斯之謂也曰何謂人文乎曰文武王之道也文武相濟以賁人道故曰人文也文者德也武者刑也德以致大業刑以扶盛德德其至也刑其次也會文武者所以以文總之故曰人文也夫聖人以盛德教天下而天下保其德也示大刑所以約之也既正則停刑而達德也德也者待刑而輔之也刑也者待德而忘之也忘或司字是故文武皆得則其政和而其民安刑德皆敝則其政失而其民散此君子所以見天下之成敗也吾觀周文文武至之也宣其甚刑而平其德衰也吾觀漢文髙文僅至也惠其減德武其多兵也吾觀唐文文皇大正而小繆也曰三代之道有質焉有文焉曰文而亡質王道其可盡乎故曰質文者聖人之所以適變而救敝也質文本正而末敝也質如不敝何以文為文如不正何以質為故吾所謂文者蓋言文治之正也孔子曰虞夏之質殷周之文至矣曰言文將無用乎曰孰不用也人文至焉言文次焉以言文而驗其人人其廋哉以人文而驗其世世其廋哉故人文者天下之道之所存也言文者聖賢之志之所寓也先天下而後聖賢者聖賢發已也天下至公也故公者至而已者次也孰曰言文其無用乎性德性生人者之自得者也命生人者之得於天者也德能正其生人者也藝能資其生人者也然性命有厚薄而德藝有大小也性命者生所雖得而未嘗全得其厚薄者也德藝者人所宜能而未必全能其大小者也古之人厚其性而薄其命有也而古人不惑古之人達於藝而窮於德有也而古人不亂故曰聖賢無全德君子無全能有其內而無其外聖賢之所以無全德也能於德而不能於藝君子之所以無全能也德上也藝下也君子修其上而正其下也故其不必工於百工而尊于百工也性內也命外也聖賢正其性而任其命故其窮之不憂而通之不疑也伊尹古之賢人也方耕于莘田田之耕夫以其能尚之而伊尹不敢與之校吕望古之賢人也方漁于棘津津之漁人以其能尚之而吕望不敢與之校逮乎二子德顯于商周也而天下百姓由之正矣孔子古之聖人也方力聘之秋猶一旅人而不暇息也方時命大謬而亂物物焉不失其道也顔子子思原憲孟軻古之賢人也窮於幽閻委巷樂然將終其身而衆子也不易其樂夫德也者總仁義忠孝之謂也性也者原道德思慮之謂也仁義忠孝修而足以推于人矣君子之學學其正也何必多乎道德思慮明而足以安其生矣聖賢之盡盡其生也何必皆乎是故聖賢之世而占相卜祝者無所張其巧也君子之前而孫吳申商者無所夸其法也夏人之學曰教殷人之學曰序周人之學曰庠夫三代之學皆所以詔人而學于德也德義者學之本也文藝者學之末也三代之盛其教天下所以學其本也三代之敝其教天下所以學其末也學末故天下皆僞也學本故天下皆厚也是故君子貴其敦本也聖賢貴其盡理也古人有言曰晉楚之富不可及也彼以其富我以吾仁彼以其爵我以吾義吾何慊哉古人有言樂天知命吾何憂乎窮理盡性吾何疑乎存心教人者正其所存能教也存心者省其所感能存也存心乎善則善類應之存心乎惡則惡類應之心其非定象也在其所存者也應之非定名也在其所感者也其所感苟存而應之豈不速乎而感應之數未始失也吾嘗驗之其人聞其為心始善而人鮮不愛之也聞其為心始惡而人鮮不惡之也雖喜怒未出其已而彼之愛惡已來故存心者必慎其所以感之者也而辨人者必觀其所以應之者也是以聖人感人心而天下和平故曰觀其所感而天地萬物之情可見矣有人于此曰人莫之知以惡心而欺人逮惡積而禍至孰曰心不可知乎有人于此曰心不可欺以善心而待人逮善積而福至孰曰人可欺乎故曰禍福與善惡相交也嗚呼人之不信久矣哉信其所心而不信其所感也夫天地至逺而誠感之通性理至神而物感之滅堯舜不家勸而天下厚厚之感也桀紂不人誘而天下僞僞感之也感應之謂其可忽乎休徴者所以應其善政之所感也咎徴者所以應其惡政之所感也五福者善人所存吉之驗也六極者惡人所存凶之驗也天人相與未嘗暌也吁豈天為之人實召之夫政者示天下之同之者也萬民之所由也政之善惡民所以而從之者也故驗之雨暘燠寒風五者示天下之同之者也人者一身之自也人之善惡身所以而振之者也驗之福極者示一身之自之者也方諸感月而水焉陽燧感日而火焉雲從龍也風從虎也南人發歌而此脫地名二字草舞銅山始崩而景陽鍾響此物之相感然也人道以情感故生生不窮聖人以神感故幽明一通是故存心于賢而賢至存心于不肖而不肖來存心于親則其子孝存心于學則其徒勸所謂出乎爾反乎爾者斯言近之福解世之曰福專利而言之者也吾之曰福專道而言之者也利道故而判福為兩端焉利福者嘗多有也道福者嘗寡有也多謂衆人也寡謂聖賢也故曰聖賢之福聖賢之所得也衆人之福衆人之所得也聖賢所得而聖賢樂之衆人所得而衆人欲之欲之故天下競利也樂之故天下安性也是故世之人無樂之者不為樂也有欲之者非為安也得聖賢之得謂之重也得衆人之得謂之輕也重所重所以率天下敦道也輕所輕所以教天下薄利也齊侯楚子其富貴天下不逮也及其以之與侯相爭相殺也雖曰福之其實禍之顔回原憲其貧賤天下之至也及其樂道全德而後世慕其美名也雖曰極之其實福之今世俗視君子之樂然其身不振曰福奚為聖賢邪視髙明之家恣勢充欲曰唯福也將跋意而圖其富貴是安福之謂乎使天下之相率背道而趨利斯言者之罪也夫聖賢之福福之本也衆人之福福之末也修本以來末者古人有之舜其是也以末而行本者古人有之周公其是也猶吾先聖人曰道為福基可以修行也矣故君子有道而無富貴曰時也而君子不慊有富貴而無道曰忝也君子恥之富貴而有道君子廣之也後世舍聖賢而從衆人不亦輕本而重末乎本末顛倒則天孰與厚也哉評隱文王太伯其同道者哉文王始之事紂其隱德焉泰伯終之遜吳其隱名焉君子之出處語默也皆所以訓也文王太伯之同道同其作訓也故曰世亂隱德世治隱名隱名者所以警其爭名者也隱德者所以逺其害德者也逺害者聖人之時也警爭者聖人之化也化以感人其聖人之至德也時以教人其聖人之大義也微大義則後世之君臣安得以其道全也微至德則後世之昭穆安得以其禮序也天地之道逺也其生可見而其所以生不可見也聖賢之道亦逺也其為可見而其所以為不可見也辨生曰有許由者輕天下而遁去其義髙而其事疑也苟事誠而義博亦可以愧其盜國者之心乎曰若由者苟不為也未若聖人之為不苟也可為則為之也不可為則不為之也是故舜依乎中庸而隱也可則行之否則巳之舜哉至矣不失其道也一鄉之賢隱則其鄉之禮可知也一書之道隱則其書之文可知也故謂文必工文不工則失其道也謂禮必修也禮不修則失其賢也是故一天下之治亂由賢人之隱見而所以章也可不重乎一賢人之動靜將天下之教化而所以勸也可不慎乎吕望東海之隱稱隱也伯夷西山之隱憤隱也顔回之隱不須時不怨世樂隱也原憲之隱不卑論以儕俗驕隱也四皓之隱去以避亂來以補政達隱也谷口鄭子真修隱也成都嚴君平和隱也曼倩隱於朝玩隱也子雲隱於官苟隱也孫思邈盧鴻一處不汙道出不屈節髙隱也張果之隱詭隱也李泌者身朝而名野接祿而尚君假隱也李脫名者身伏而達言釣隱也喻用水固勝火而善固勝惡也苟用之不得其道雖水火善惡亦不可得其勝矣水之制火必於火之方然而水可勝矣善之制惡必於惡之未形而善可勝矣及其惡至乎不可掩而欲推善以救惡火至乎不可熄而欲激水以沃火其勢可勝之乎君子小人者其善惡之所出者也是故君子用則其政善小人用則其政惡也斯欲政善而專用小人暨其惡熾至乎暴戾上下欲君子而拯之也是奚異乎激水而沃者邪雖有彥聖之人如彼堯舜禹吾知其無如之何也故古之善用人者用君子必先而小人必後君子先用善得以而制惡也小人後使惡得以而遷善也禮不容小人加乎君子不使不肖髙於其賢所以隆善而沮惡也詩云我心匪石不可轉也我心匪席不可卷也威儀棣棣不可選也憂心悄悄愠于羣小覯閔既多受侮不少靜言思之寤辟有摽我心匪石不可轉也者君子有志可以與守也威儀棣棣不可選也者君子有法可以與為也憂心悄悄愠于羣小者惡小人之加乎君子也覯閔既多受侮不少者疾小人之玩政也靜言思之寤辟有摽者怨不用君子也雖小人之道不能不加於盛德之家雖君子之道不能不沮於已破之國用舍之政然也一小人壞之于其前雖百君子莫能修之于其後一君子治之于其上雖百小人莫能亂之于其下邪正之勢然也越之漁者使其子漁于夷溪鄙者專之能者散之散疑筆悮宜作助兼及鄙負其所使也網則隳其紀綱而命能者治之能者終不能也鐔津集卷六
