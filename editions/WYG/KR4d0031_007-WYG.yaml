body:
  text: 鐔津集巻七宋釋契嵩撰論原文勢稍短於前總㑹二十篇成巻也物宜君子發身以道不以財庶人謀生以力不以詐大夫趨事以義不以利是三者正然後天下可以觀王道也夫王道也者正宜也小大之物正其宜則何有乎亂世也夫道義固君子大夫之所宜也利力固庶人之所宜也曰君子而專財曰大夫而專利曰庶人而玩智詐是䘮其宜也矣大夫處上猶衣也庶人䖏下猶裳也上宜衣而下宜裳必也苟上而下之下而上之不亦倒且亂乎道其何效哉冉求甞為季氏宰為季氏而聚歛孔子惡之曰求非吾徒也小子鳴鼓而攻之若求者以人而利之尚不容於君子而如此也矧以已而利之孰可容乎孟子曰上下交征利而國危矣亮乎安國家天下者在義不在利也善惡有形之惡小也不形之惡大也有名之善次也無名之善至也有名之善教而後仁者也無名之善非教而仁者也有形之惡殺人者也不形之惡讒人者也讒人之惡存其心殺人之惡存其事事可辨而心不可見也教者情也非教者性也情可移而性不可變也玩隣人之子也好語誘之可以喜惡語激之可以怒及其趨於父母也雖美惡之言而不能親踈之也其盗跖饍人肉而人皆能惡之少正卯顯於朝而衆不能辨之是故君子善善也必審其名同惡惡也必辨其情異夫賞罰者所以正善惡也聰明不能盡其善惡則不足與議賞罰也故察讒在㣲誅讒在持刑殺宜議性善者宜任情善者宜使察讒不微則不能觀其心之所之也誅讒不持則不能遏其大惡也刑殺不議則不能究其誠也任性善則安危不振也使情善則威福不專也善善得其宜也則大賢盡其徳而小賢盡其才也惡惡得其所也則讒人悛其心而殺人伏其罪也孰有正善惡而治道不至乎哉性情性貴乎静故性變而不可太易情患乎煩故情發而不可太早太早則傷和太易則傷中反中和則隂陽繆損民壽而物多疵癘是故聖人之隆治也仁以厚人性義以節人情是所以隂陽和而遂生物者也禮教二十而冠者盖以其神盛而可以用思慮也教三十而娶者盖以其氣充而可以勝配耦也故古之君子觀隂陽而所以知其性情之得失觀情性所以知聖人之道行否然後以其得失究其本末相與人主起天下之病癖雖伊尹匹夫之賤而猶曰匹夫匹婦有不被堯舜之澤若已推而納諸溝中嘗五就桀五干湯而不沮其以天下自任如此之勤也今天下之民方髫鬌未剪而以利害相欺父母則􅋏之唯其姦巧之不早也僅童而男已室女已家過之則滛奔是不亦性變之太易乎情發之太早乎將不有所傷乎欲世蹈中和則何異乎適胡而南轅其安能至之也吾觀隂陽繆則寒暑風雨庸有及時百穀種植未始不疾其人則斃夭者世嘗多有而仁壽者寡焉適見情性失之之效也人失情性既如此也而聖人之道行也豈曰至乎謨者尚曰天下甚寧是亦䛕也而嚚嚚不肯知其失操其本為人主起天下之病則又奚貴其當時者古語云日中則熭操刀則害言適用於當時也若伊尹始窮賤之不暇彼欲適用豈當用耶而伊尹為之今乘適用之時攝當用之柄而不肯為之不亦為伊尹媿乎九流儒家者流其道尚備老氏者流其道尚簡隂陽家者流其道尚時墨家者流其道尚節法家者流其道尚嚴名家者流其道尚察縱横家者流其道尚變雜家者流其道尚通農家者流其道尚足然皆有所短長也苟拂短而會長亦足以資治道也班固本其所出尊儒也司馬遷會其所歸尊始也尊始者其心𢎞也尊儒者其心專也固嘗非馬氏以其先黄老為甚繆是亦固不見其尊儒之至者也若黄帝之道其在易矣易也者萬物之本六藝之原也其先之不亦宜乎豈班氏之智亦有所不及乎伯夷之所長者清而所短者隘柳下惠之所長者和而所短者不恭孟子尊二子之所長則曰聖人百世之師也伯夷柳下惠是也遷之心抑亦與孟氏合矣故君子善之四端司馬長卿揚子雲其人其文皆世之稱也及揚子為劇秦美新長卿為封禪書也封禪之言恠乎滛徒加其夸大之心者也美新之言苟言也記曰國無道其黙足以容賢而不黙孰與黙邪是皆不宜為而為之也晁錯論五帝三王之道諧其極也宜賢于管子仲晏子嬰及其請削諸侯之封舌未巻而􅄯氏以赤其族盖時未可言而言之也東方朔枚乘其才俊坌涌飛書走檄不足其奮筆然皆不能效一官就一政盖徒才而不得其實能也劉向劉歆皆漢室之賢儒暨治傳也父子各專師說而家自是非盖得道而不得其極也道而不極非道也才而不效徒才也發而不時逆理也為而不宜失義也是故事貴合宜智貴識時器貴適用法貴折中中也者道義之端也用也者器效之端也時也者動静之端也宜也者事制之端也四端者君子之道之至者也善學者不得其端不盡也善為者不得其端不舉也是故古之聖賢學道而有道興事而濟事存其端而已漢世之二三子雖激昂而無所成其徳抑亦未得端而然也中正物理得所謂之中天下不欺謂之正適中則天下無過事也履正則天下無亂人也中正也者王道之本也仁義道徳之紀也人以强弱愛惡亂其倫而聖人作之教道以致人於中正者也教者效也道者導也示之以仁義使人所以效之也示之以禮樂名器導人所以趨之也洪範曰會其有極歸其有極此君子所以自行其道者也時人斯其唯皇之極此君子所以進人趨其道者也詩云士也罔極二三其徳此君子所以惡人不由是而適其道者也是故治人者非以中正存其誠則不足以與議仁義禮法也教人者不以中正脩其誠則亦不可以與議仁義禮法也夫聖人之法猶衡也斗也而持之在人者也持之不得其人器雖中正而人得以欺之也金石之音中正則其所響也震而其所應也和人之誠中正則其所作也至而其所感也詳是故古之君子也謹其所守行其所得雖貧賤也處其窮閭幽室而不渝也雖富貴也乘崇髙之勢當天下之尊而不變也及其感物也不威而人畏不語而人信不勞心不役力而其教化行者鬼神助之天地祐之曷其然也盖天地之理與人同也何以同乎其中正者也明分萬物有數大小有分以數知變化之故以分見天地之理是故君子於天道無所惑焉於人道無所疑焉氣凝而生生則有飲食氣散而死死則與土靡是人道之分也穹窿無窮日月星辰而已餘物不容是天道之分也載山振水資生金石草木或無草木二字是地道之分也人數極雖天地或無地字不能重之天地變雖人不能與之是又天地之定分也今曰天可昇海可入黄金可以巧成噏雲氣與神遇而不死是焉知變化之故而見天地之理乎雖庸人亦謂其不然也而齊威燕昭秦王漢武紛綸趨之留連而忘返亂廵狩之制繆祭祀之禮孰謂是四人主者聰明聖智度越於庸人乎天道大公也人道大同也同者同其死生也公者公其與人相絶也苟其公衆人而私一人孰謂天乎苟其同形生而獨不死豈謂人乎是故聖人皆罕語天道盖不以天而惑人者也甞正祭祀盖不以人而瀆神道者也察勢兼金百鎰借盗而監守雖未亡金其隣人固以疑矣臨赤子于不測之淵雖未溺子其父母固以憂矣然其勢既當憂且疑也而人不得不憂疑也夫威權者天下之利器也其重豈直乎百鎰之金乎而委之于佞倖不肖之人佞倖豈直盗乎而昔君子不疑百萬師旅其性命之衆豈直乎一赤子之生乎而暴之于戎狄之鄙戎狄豈直乎不測之淵乎而昔君子不憂然往古其國亂且亡者曷嘗不因乎可疑而不疑者耶可憂而不憂者邪往古能存其國者亦曷嘗不因乎疑可疑憂可憂者邪或曰疑如之何曰疑之不如歛其柄而正之曰憂如之何曰憂之不如保民推恩而布信曰曩豈無恩信邪而戎狄不懐曰曩之恩信者聲而未實也必得仁人而後恩加必得義人而後信行彼守鄙者孰誠仁乎孰誠義乎刑勢勢以刑張其亡也速刑以勢行其濫也甚堯舜非無刑於天下也而天下不怨盖用其刑以徳不以勢也桀紂非無勢於天下也而天下忽亡盖張其勢不以徳而以刑也夫物莫不有勢也而國家朝廷之勢勢之大也世莫不有刑也而堯舜之刑刑之正也駕大勢以刑民民雖苟而不服秦氏以刑懼天下而道路無敢偶言方二世而秦亡武王奮其威以誅紂有天下不啻三十世然其用刑一也而延促之數不鈞者盖其所以用之者異也故古之君子其在人之上者崇徳而不崇勢其在人之下者不務其勢而務其徳也所以為刑正而為政治也後世則反于是矣為人上者以刑而鼓勢為人下者乘勢而侮刑欲人無怨其可得乎君子有客問曰君子之學有所欲乎曰有而客笑曰君子亦有欲邪曰然君子學欲至而道欲正正則於事無繆至則於心無惑是故君子安安終其身而無競小人則不爾小人學欲利而道欲售售則不能無繆於事利則不能無惑於心是故小人忽忽終其身而自役此堯舜與人同而聖賢所以與人異者也客拜而去知人知其人而不能育之非智也愛其人而不能教之非義也善其人而不能試之非信也任其人而不能全之非仁也育賢者智之實也教賢者愛之正也用賢者善之效也全賢者任之功也任而無功孰為仁乎善而無效孰為信乎愛而不正孰為義乎育而無實孰為智乎君子之與人也不失智不虧義不愆信不歉仁所以道脩而徳備身名尊而天下稱之故曰知賢不如養賢養賢不如教賢教賢不如用賢用賢不如成賢成賢者終也知賢者始也終始者天地四時存而不忒也人其不慎乎與其失始寧與其得終又不若終始之為休也齊桓公初以讐視管仲逮取以為相遂同霸天下桓公所謂不能始而能終也漢文帝喜得賈生慨得之之晩也及其以絳灌之惡出而踈之卒無大用文帝可謂能始而不能終乎殷之髙宗起傅說於刑人資以治天下天下至今以聖相稽之髙宗可謂能始而能終也品論唐史以房杜方蕭曺然房杜文雅有餘蕭曹王佐不足徳則房杜至之矣觀房則半才視杜則純道君子曰杜益賢也姚崇宋璟其不逮丙魏乎姚宋道不勝才而魏則猒兵丙則知相燕公文過始興而公正不及大將軍光不若狄梁公之終無私也袁安之寛厚則婁相近之正與仁則異施房琯顔真卿方之李固陳蕃其世道雖異而守忠持正一也汾陽王省武而尚信仁人也叚太尉忠勇相顧義人也晉公終始不伐仁人也荀子之言近辯也盡善而未盡美當性惡禪讓過其言也揚子之言能言也自謂窮理而盡性洎其遇亂而投閣則與乎子路曽子之所處死異矣哉太史公言雖慱而道有歸班氏則未至也宜乎世所謂固不如遷之良史也賈傅抗王制而正漢法美夫宜無有加者焉三表五餌之術班固論其踈矣誠踈也董膠西之對䇿美哉得正而合極所謂王者之佐非為過也繁露之言則有可取也有可舎也相如之文麗義寡而詞繁詞人之文也王充之言立異也桓寛之言趨公也韓吏部之文文之傑也其為原鬼讀墨何為也栁子厚之文文之豪也剔其繁則至矣正符詩尤至也李習之之文平考其復命之說宜有所疑也疑有作發陳子昻之文不若李華華之文不若梁肅肅之文君子或有所取也李元賔之文詞人之文也皇甫湜之文文詞之簡者也或無詞上文字郭泰黄憲之為人也賢人也訥言而敏行顔子之徒歟徐穉之為人哲人也識時變而慎動静焉袁奉髙之遁世也不忘孝不傷和中庸之士也論曰引其器所以稽其範之工拙辨其人所以示其道之至否然範工資世之所用道至正世之所師所師得則聖賢之事隆而異端之說息也是故君子區之别之是之非之俟有所補也豈徒爾哉記曰文理宻察或作察察足以有别也孟子曰是非之心智之端也斯亦辨道之謂也解譏為人雖同而同趨於亂可以拒也而不拒傷容也為道雖異而同趨於治可以與也而不與傷拘也君子以義則無所傷也適吾郝子本至心天下正情性者也推至仁天下全性命者也資之治抑亦極矣世儒援其末而固排之豈不傷歟謂君子可乎哉仲尼曰吾道一以貫之聖人之㣲言也吾甞盡之矣安得中庸之士與之語風俗秦人用進取之法而其俗人人欲自富至有婦不假姑以箕箒而詬病漢人用鹽鐵代農而其俗趨利至有民與利肆之吏利有作市以直相給仁義詘而貨利興禮讓㢘節之風亡矣故秦俗日以亂漢俗日以敝夫秦漢其基勢豈不大且固也而卒亡亂盖傷其風壞其俗而致然也風俗者膚腠也國家者人體也膚腠既敝而其體能不亡乎是故先王不舉不法之物慎習俗也詩曰無以太康職思其居好樂無荒良士瞿瞿盖言動以禮義以正其風俗也今流俗之人苟效自託之功以利而削民使閭里翕然肖之以利而相髙不亦傷風乎不亦敗俗乎君子不亦憂乎仁孝父子不以道雖禽獸亦能親則君子何以别乎是故聖人愛子以義謂之仁事父以禮謂之孝舜之為子文王之為父可謂仁孝者也天下宜法問經問曰史謂易與春秋天道也然則春秋易尤至於詩書禮經乎予欲尊而專之子謂之何如曰豈然乎五經皆至也奚止乎易春秋邪夫五經之治猶五行之成隂陽也苟一失則乾坤之道繆矣乃今尊二經而舍乎詩書禮則治道不亦缺如禮者皇極之形容也詩者教化之效也書者事業之存也易者天人之極也春秋者賞罰之衡也故善言春秋者必根乎賞罰善言易者必本乎天人善言書者必稽乎事業善言詩者必推於教化善言禮者必宗其皇極夫知皇極可與舉帝王之制度也知教化可與語移風易俗知事業可與議聖賢之所為知天人可與畢萬物之始終知賞罰可與辨善惡之故也是故君子舍禮則偏舎詩則滛舎書則妄舎易則惑舎春秋則亂五者之於君子之如此也詩書禮其可遺乎孟子言春秋之所以作見作之之權也文中子言春秋之所以起見作之之心也范寗折中於聖人睹春秋之理也文中子見易之所存故振之也揚子雲見易之所設故廣之也王輔嗣言天而不滛於神言人而必正於事其見作易者之心乎子夏序關雎之詩知詩之政或無政字為教也孟子之言詩見詩之所為意也毛萇之言詩詩之深也鄭𤣥之言詩詩之淺也說詩不若從毛公之為簡也五行傳作書道之始亂也皇極義行書道之將正也孔安國釋訓而已矣聖賢之事業則無所發焉戴氏於禮未得禮之實者也實或作真鄭氏釋禮又不若子太叔之知禮也問者再拜曰若發矇爾忻然而退問交客問曰子欲擇交恐傷乎介予欲汎交恐傷乎雜中庸曰天下國家有九經而朋友之交在其一詩曰相彼鳥矣猶求友聲矧伊人兮不求友生然則予欲無交其可得乎將交則猶豫於二者不决吾子為我必何以處之曰以人從道則君子擇交以道從人則君子汛交以道汎交廣其道也以人擇交審其道也傳曰汎愛衆而親仁言汎交而推其道也繫辭曰定其交而後求言詳道而從其交也必有道而後汎交道不充已而為汎交交必混也故君子不為混交必正道而後擇交道不正已而為擇交交必徒也君子不為徒交郭泰古之賢人也與屠酤農傭而交之而泰也不猒其交盖有道而推其道者也伯夷又古之賢人也與鄉人處如以朝之衣冠坐諸塗炭望望逺之而不與接盖無所質道而自篤其道者也曰世之以其宜相交者豈一端也兹曷以正而求其所交之道者也曰然交之道亂久也吾嘗懐而未暇辨之因子今所以盡之也夫古今人有以勢交者有以利交者有以氣交者有以名交者以名交則無誠以氣交則或同惡以利交利散則絶以勢交勢去則解列國之時王公將相求交於布衣馳騁車馬趨乎抱關屠肆而不暇匹夫上交至有朝雜鬻販之人而暮極富貴懐金佩玉聲振敵國終不免家破國亡而所交者反為仇讐此以名利氣勢相交之敝而不稽其交道之故也後世猶以是而相尚故閭里之人平時遇於酌酒慷慨皆欲死生以之也一朝利散勢去則故抵忤仇讐之隙而生於朋友之好張耳陳餘蕭育朱博此其效也是故君子慎交乎此也孟子曰友者友其徳也君子之交相與以義相正以徳故君子之交久而益善小人之交久而益欺君子寧語市道而不言小人之交者也客忻然而去師道君子不以非師而師人不以非師而師於人故君子教尊而道正也師者標道也標者表方也標不正則使人失其嚮師不正則使人失其志堯師扵君疇舜師於務成昭禹師於西王國湯師於成子伯文王師於時子思武王師於郭叔而孔子師七十二子子夏師諸侯子思師孟軻孟子荀卿皆師其徒堯舜禹湯文武善師於人而後世嗣帝王者稽之也孔子子夏子思諸子善師人而後世踐聖賢者稽之也天下者教為其本也教者道為其主也道者師為其端也正其端所以為道也正其主所以為教也正其本所以為天下也故古之君子不苟尊而師人不苟從而師於人其存心扵天下乎今天下其教未至不亦苟為人師者之罪乎不亦不擇師於人者之罪乎道徳尊莫尊乎道美莫美乎徳道德之所存雖匹夫非窮也道徳之所不存雖王天下非通也伯夷叔齊昔之餓夫也今以其人而方之而人樂桀紂幽厲昔之人主也今以其人而比之而人怒是故大人患道徳之不充其身不患勢位或作利字之不在己治心客以見余扵巖谷恬無所營而問曰子黙黙必何為耶應曰無為也吾治其其或作吾心耳曰治心何為乎曰治心以全理曰全理何為乎曰全理以正人道夫心即理也物感乃紛不治則汩理而役物物勝理則人其殆哉理至也心至也氣次也氣乘心心乘氣故心動而氣以之趨今滛者暴者失理而茫然不返者不治心之過也曰心則我知之矣理則若未之達焉子思之言與子之言同之歟曰同老子之言與子之言同之歟曰大較同而窮神極化異也曰子異二子則何所驗乎曰吾正之於吾師古聖人之說者也曰然則子之正幸得聞乎曰是未易語也吾之所正通死生之變超天地之故張之則俗必大恠而相訾也必欲求之子當探吾所為之内書者客拜而去鐔津集巻七
