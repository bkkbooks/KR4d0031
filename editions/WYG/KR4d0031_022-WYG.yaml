body:
  text: 鐔津集巻二十二序詩讃題序昔賢首菩薩於華嚴㑹中以偈荅文殊大士讃菩薩能示同世間云雅思淵才文中王歌舞談説衆所欣信乎文之能顯道濟物也豈獨今之然乎自往古他方佛世無不然耳始余年少時走四方叢林尋訪師友務道專學有效古髙世僧萬里求師之志於稠人中沈沈自䇿其氣志若上將軍負所欲建立邦家之意前邁敵國而且戰且行不遑食息也聞所謂東山明教禪師之髙文卓行道邁識逺凡獲見其所著文畫莫不録叙而秘蔵之及於錢唐靈隠山得嘉禾陳令舉所撰師之行業記石刻末云師自定祖圖而下謂之治平集又有嘉祐集緫六十萬餘言而其甥沙門法澄克奉藏之以信後世繼聞其廣本除已入藏正宗記輔教編外餘皆在姑蘓吳山諸僧室藏之余固累遣人至彼山諸僧居歴訪之而寂然無知其所在者往往所委不得其人失於護藏而為好事者竊移他所也大觀初余居儀真長蘆之慈杭室於廣衆中得湖南僧景純上人者入予室一日投一大集於席間曰此老嵩之全集也秘之久矣聞師切慕其遺文願以獻師余獲之且驚且喜念兹或天所相而授我耶若獲至珍重寳自皇極中庸而下緫五十餘論及書啓叙記辯述銘賛武林山志與諸雜著䓁約一十六萬餘言皆舊所聞名而未及見者雖文理少有差悞皆比較選練詮次幾始成集庶可觀焉更冀善本較詳莫由得也後又遇周格非出守䖍州回得其非韓文三十萹三萬餘言又縁兵火失之遂未能就其集近又得本於語溪東藍彦上人乃與余昔於匡山所得别本較之文字亦甚踈謬乃以韓文條理而正之然師之著述不得其傳而散落多矣如天竺慈雲法師行狀曲記長水暹勤二師碑誌行道舎利述匡山暹道者碑定祖圖序皆余自獲石刻而模傳之今揔以入藏正宗記定祖圖與今文集䓁㑹計之纔得三十有餘萬其餘則蔑然無聞矣如令舉所記謂有六十萬餘言者今則失其半矣吁嗟惜哉今以令舉所撰行業記標之為巻首貴在見乎師之世系嗣祖出世去留之迹竒莭偉行髙才勝德邁世之風焉乃以輔教編上中下為前三巻以師所著之文志在通㑹儒釋以誘士夫鏡本識心窮理見性而寂其妬謗是非之聲也又以真諦無聖論綴于輔教編内壇經賛後以顯師之志在乎𢎞賛吾佛大聖人無上勝妙幽逺淵曠之道不存乎文字語言其所謂教外别傳之㫖殆見乎斯作矣故其賛末云示法非文字故至人之宗尚乎黙傳也又曰聖人如春陶陶而發之也至人如秋濯濯而成之也此謂終歸乎静黙焉故真諦無聖論結云凡聖知覺者真諦之影響妄心之攀縁耳然有志於外文字之學者覧此二説豈不少警於中乎其輔教集舊本以累經鏤板故雖盛傳于世而文義脫謬約六十有餘處今皆以經書考正使覧者可以古本參讀之則其踈謬可審矣今自論原而下至于賛辭約為十二巻次前成一十五巻昔題名嘉祐集者是也其非韓文昔自分三十章今約為三巻次前成一十八巻又得古律及山逰倡和詩共一百二十四首分之為二緫成二十巻題曰鐔津文集示不忘其本也然師常自謂人生世間閒為苐一盖其自得閒中之趣故其所為之詩雖不甚豊濃華麗而其風調髙古雅淡至其寫志舒懐有邁世凌雲之風亦可想見其人也觀師與月公晦書自言余志在原教而行在孝論余詳考其書則功在於原教非韓行在於書僧即僧也者孝論徳在於志尚逺公而題其影堂文道在於壇經贊真諦無聖論其文之髙㧞勝邁絶出古今則見於武林山志故後叙謂因風俗山川之勝欲抛擲其思力以收其景趣也乃作武林山志然求世之知言審音者不亦難其人哉師自攜書上謁天子卿相而下凡所見則止以正宗記輔教編而投之至於文忠公則特獻之新撰武林山志焉嗚呼文忠公謂文章如精金美玉市有定價非人輕可以口舌輕重之也其重讀徂徠集云待彼謗􅆋熄放此光芒懸人生一世中長短無百年無窮在其後萬世在其前得長多幾何得短未足憐惟彼不可為名聲文行然讒誣不湏辯亦止百年間百年後生者憎愛不相縁公議然後出自然見􅎀妍故師之於慶歴間始以文鳴道於天下然當是時也宗儒束教輩是非之鋒謗罵之熖紛然而師終以是道發而著之為髙文至論乘風而殄之蔑如也故後世學者有聞其風務其道而矚其文者若脫㝠逰望北辰仰昭回也然兹姑以師之經世文章恢𢎞輔賛吾如來至聖之教之道渉人間世而然也若其自所履藴操守則瑩然若珠光玉采日精月華而不足以方其温潤髙潔明浄也故令舉記其行業云師之所以自得而樂諸已者盖不與於此中間雖以護法遭難然其所謂珠光玉采日精月華者世雖見其有烟雲水火焚溺蔽虧之患而其光采精華固瑩如也故師之自擕書西上獻之於天子事畢將東歸山林而大覺璉禪師賦白雲謡以將師之行云白雲人間來不染飛埃色遥爍大陽輝萬態情何極嗟嗟輕肥子見擬垂天翼圖南誠有機去當六月息寧知絪緼采無心任吾適天宇一何遼舒巻非留迹然則師之風貌聲容其所以出處斷可見也矣紹興改元之四年甲寅重陽後一日書于禦溪東郊草堂之北軒沙門懐悟又序師自東來始居處無常晩居餘杭之佛曰山退老于靈峯永安精舎然眎其迹雖或出處不定然其所履之道髙妙幽逺而末路學者器近不能曉悟而師終亦不肯少係其韻以撫循其機因而嘆曰吾安能圓鑿以就方柄哉聞聖賢所謂得志則行其道否則行其言而已言之行猶足為萬世法使天下後世學者識度脩明逺邪見而游正途則奚必目擊而授之謂從已出耶因却闗著書以考正其祖宗所以來之之迹為十二巻輔教編三巻又列定祖圖一面書成攜之京師因内翰王公素獻之於仁宗皇帝又為書以先之上讀其書至臣固為道不為名為法不為身歎愛乆之旌以明教大師之號賜其書入藏書既送中書時魏國韓公琦覧之以示歐陽文忠公修公以文章自任以師表天下又以護宗不喜吾教及見其文乃謂魏公曰不意僧中有此郎也黎明當一識之師聞因往見之文忠與語終日遂大稱賞其學贍道明由是師之聲德益振寰宇事竟遂買舟東下終老于山林師雖古今内外之書無所不讀至於所著書乃廣明外教皇極中庸之道安危治亂之略王覇刑名賞罰之權而終導之歸於無為寂黙之道當世聞人少見其比肩焉而痛以内教自律其身端以儉素誠徳為宿歸之地而慕梁恵約之為人也其所藴至道淵密然以其所學較其所為而未見少差焉所著書觀當世士大夫不顧名實而是己非他也謂以儒而嫉佛乃作輔教編學者亡孝背義循養其所欲也乃作孝論尚綺飾辭者而不知道本也乃作壇經賛苟合自輕而不自上以徳也乃題逺公影堂文志其所慕以風末世之華侈也乃作山茨堂序因風俗山川之勝欲抛擲才力以收其景趣也乃作武林山志其明聖賢出處之際性命道徳之原典雅詳正汪洋浩渺尤為博贍總號之為論原其如詩書序賛記傳表啓銘誌題述評辯是是非非所謂太山之毫芒耳及後終於湖山而火化不壞者六物天下聞其風莫不東首而長想嗚呼師雲行鳥飛於天地之間視萬乘之尊其勢霄壤之遼也顧王公貴人雲泥之異也一旦以其所為之書獻之天子為之動容天下靡然嚮風而使其乃宗乃祖吾佛無上妙道明白於萬世而卒酬其抱道輔教之志非其自信修誠之效歟後之學者讀其書必有掩巻而三歎者也嗚呼師之道譽聲徳旣甚超邁故後世學者或當在位道賛人主師表於天下後世者皆仰而慕之若天雲日星焉故有尋遺風想遐迹瞻頌稱讃不已有若前所紀淨因大覺璉禪師將師之白雲謡若江西洪覺範之禮師之骨塔詩若南海楞伽山端介然吊師之古詩凡百韻者西蜀住龍舒天柱山靜禪師遥慕師之道譽聲徳而序賛者若靈源惟清禪師之跋師二手帖而伸賛之者今皆筆之于此或詳或略以備研覽而發季世佛學者之志操焉其淨因大覺璉禪師送師之白雲謡者已見前之後序中此不煩録矣今旣以陳令舉所著之記為前叙舊得一叙不書名不知何人所作或云瑩道温觀其文藻美麗或近似之他輩不能為也而中間叙其為文之所以而不及流類不免隨為葺正之仍舊綴于集末云禮嵩禪師塔詩三十一韻吾道比孔子譬如掌與拳展握故有異要之手則然晩世苦陵夷講習失淵源君㸔投迹者紛紛䓁狂顚韓子亦儒衣倔强稱時賢慿陵作詬語到死不少悛後世師韓輩冗長猶可憐趨名不自信泛逐工詞言譁然皇祐初飛聲閙喧闐田衣動成羣怒癭空自懸縮首不暇息兀坐如蹲猿堂堂東山公才大德亦全齒牙生風雷筆陣森戈鋋隠然湖海上長庚横曉天作書肆豪猛揮斥莫敢前羣兒雖貎敬臆論已不專書成謁天子一日萬口傳坐令天下士欲見嗟無縁功成還山中笑語荅雲烟我來不及見山水自明鮮入門寂無聲修竹空滿軒永懐翛然姿骨目聳清堅僮奴豈知此住兹亦彌年指余以石塔草棘北峯巔再拜不忍去聽此遶澗泉吁嗟末運中那復斯人焉文章亦細事清苦非所便但愛公所守逺拍諸祖肩遲遲哦公詩落日滿晴川願持折脚鐺結茅西澗邉嵗時邏松檜來此掃頽磚石門惠洪作吊明教嵩禪師詩凡一百韻并引建中靖國改元辛已冬十一月既望余抱逺公文集自廬嶽而東圖入木錢唐布流天下乃特詣師故居永安精舎之後嶺端䝉雪霜排榛莽於所藏闍維不壊之五相舎利小石塔前恭備香羞茗燭䓁作禮以供焉因抽鄙思爲五言古詩凡一百韻長跪端想誠百其心粲若有對遂作南音稽然以諷之庶不忘其本而聊爲攀慕悼之之誠也禪師平日有詩云異鄉風俗客不惡但欲南音來耳邊余連與藤東西交徼最爲宻邇禪師遷寂在於熈寧五年之夏余纔八嵗其實忝師里中之晩生所作南音不得不爾苟不離正受庶其裁擇焉覺城否復隍慧日書有食苟無明哲士曷以救顚仄緬惟東山師降靈自天德申甫寧加諸奮身若匍匐吾法傾不綱蒼黄莫之測詵詵排佛徒岩岩侍君側適操權衡者兼領辭翰職率意務品藻庶形在􅀈埴唐書預之修韓語例増飾竊自比孔孟拒我過楊墨惜彼迷至言曽之通皇極廢道專以人訐惡肆其力坑焚必有待伐削豈容刻愚俗初易欺聖主終難惑當時禪講輩動類百千億獨誰敢枝梧縮手俟徽纆唯師奮然作感憤形諸色一言塗腦肝萬巻羅胷臆人爵猶唾遺𡨕鴻詎籠得蠢蠢嗟東人遲遲别南國歴楚仍騁吳百城慕知識義龍雲之天禪虎角而翼誅茒靈峰西殺簡仙源北著書俲龍猛護法掌司直正宗序昭穆原教辯離即謂儒釋二教雖殊皆相資而化物也筆峰逈􅒞崒詞海彌湢㳁紛葩若輝散宏麗尚典實匠媧補穹旻効禹導溝洫動成幾百巻經世爲模則斯文千古雄斯義萬夫特㩀理從所征處戰無弗克吾皇遇唐虞吾相遭禹稷抱書乃西獻乗時闢㐫塞喜覧明光殿撫念加歎息賞其繫表才欝為天下式謂嘗獵英雋忽此遺彀弋小避三公位髙慿四依軾慧日昏復明禪經亂還緎智林久宜茂福田廣須植大信過豚魚至仁周動植良可班諸藏尋即遵所敕略去五韻飛章類席巻横議同鏡拭舂喉那補㸑樹口拑拱黙始知猛陵翁即師里名彼多稱猛陵男子故原筮無遺㥾金湯義存存涇渭情湜湜略去二韻既而謂東歸湖山夢還憶列户翠可染當窓秀堪織風尚清散為僧年白駒逼孰貴秉燭逰鼓缶歌日昃林逺争追隨宗雷苦凄惻禪誦心稍隙騷雅興仍亟道行愈峻卓德聲轉輝赩略去七韻宴坐居無塵遺偈見敦飭大梅鼯䑕聲匪我相囚福師臨終偈云不似大梅老貪隨鼯䑕聲云奄然遂長往休徴難具仂明發鷲峰下闍維火初熄五相堅不化鮮柔光耀翌精如金出冶瑩如玉分切式旌無妄犯奉法剛而㥶靈山衆咸覩望塵加渇醷尅竒冠前修景仰動殊域王公發嘆嗟士庶増悃愊略去一韻共收鶴林骨合葬鷲山側略去三韻澗猿徒自號書魚蠹誰蝕僧史半十科工歌全九罭略去六韻憶我來吳楚募師自岐嶷獲記楞伽逰誦味喻鱠職師有逰吾湟川燕嘉亭及楞伽山寺記也哲人既云殂至道亦將踣已乎三十年臨弔徒深尅妙峰髙為塔梵天廣成國國或作廙萬物備蒸嘗五雲爭輔翊乾坤或幾息海山有時泐師其道與名勃然長觺觺南海楞伽山守端拜題余研味其詩雖風調氣韻髙爽酋勁而中間凡用事綴韻過於迂僻今略取其辭意簡雅超邁之句次成七十三韻亦可見其才志向慕之誠至焉賛明教大師并叙始余讀嵩禪師輔教編愛其文落落有竒偉氣而能發揮釋氏之道以諭夫當世名儒釋子之不知教本者俾之逹性命之奥見聖賢所以施教敷化之心而不淪於是非相戰之地中問叙繁處皆略之若夫統之有宗而窮深及微則尚恐二家之學者或未易曉其邊徼况能究其道而見其全乎及其示寂後闍維而五物不灰然此雖師之糠粃而以殁故已方見信於其徒則其所藴精粹要妙而不獲見知於人者多矣嗚呼道之難傳也若是乎予甚悲之其道雖能化當世名儒而不能盡化其徒故師殁後其眞風勝䡄不甚章章絢爛於世兹或希世之才黄鍾之音不投於里耳小器哉予晩路末學不遑洒掃于庭宇而覘望餘光徒臨風揮涕有胡不萬年之歎也今採其遺芳稽首長想系之以賛云藤山之東紫雲浮空爰有僧龍名配維嵩自脫襁褓居仁由孝氷雪其躬律儀是傚逺覧髙翔逰吳暨梁道繼佛祖欲隠彌彰適丁祗園謗燄四起縱筆成書盖不得已既而擈滅曇花重榮嘉祐之間獨飛英聲帝澤屢霑公卿折莭咄嗟吾徒反肆鴃舌遂賦歸歟安於覆盂少林食毒異䡄同途小智自賢所在成市頎然誰儔理固宜爾太阿出匣斬蛟戮螭用之補履曽不如錐嗒焉云逝遺迹莫繼凛乎真風永蠲氛翳嗟乎鯫生不克祗承毎一念至氣填于膺竟何能為只益慚怍聊筆清芬式告來學龍舒天柱山比丘修静拜賛題明教禪師手帖後二首吾佛大法盖世出世間千聖萬靈道德性命之本源源深本妙非思議可及其應縁揚化也當必資開士因王臣之力啓物信而潔外魔開士出盖視法運之通塞决與世致益不苟然也藤州明教大師嵩和尚其人歟妙達𤣥宗博極世解出皇祐至和間見外黨有致吾法之瘡疣者則曰予竊菩薩權為如來使辨而明之以度彼惑俾歸正趣實所任職矣於是著為書奏聞於天子䝉仁宗皇帝嘉賞勑入經藏班行天下於是魔雲廓而佛日輝也和尚既建功德於教門其英聲茂實壯飾其曺稍藴知識舉知欽慕而比年法俯下衰人根鄙劣喜剃染之便爭變形服竊入吾家紛情世塵濫厠僧倫者皆是見聞思慮不脫里俗何髙德勝義之能講慕哉寳因擇言上人當此時能竦所聞而矜所慕其賢於濫厠之流者故可稱也雖久㳺禪林服業祖道而於𢎞教大士知開導耳目起希冀之志也故在京師聞律僧有上世與明教相厚善者乃訪問之彼為道前事且出此帖示之擇言苦求得之珎收南來以示余若有異獲因語之曰汝企其人而重其遺跡以彼名耶實耶以名則於彼外矣徒可資於談柄無益乎已以實則明教之至論可考以發覆致逺者甚多汝宜尋而䆒之且想彼標致以自勉激則終有益也矣年月日又帖明教大師嵩和尚自稱藤州東山沙門乗夙悲誓出于皇朝始以天下搢紳先生或未䆒我法大道之源而域守所習跡佛教為夷狄之法而蔑視之至加毁滅謂無使混害中國周孔之道和尚惜彼循枝而遺根背源而向派非徒謂暗乎此其學周孔之道也可得謂能自其明而極其誠由其誠而盡其道以成天下大本大公包博無外純全之妙神者耶由乎不自知所以不知人矣和尚博極古今儒釋教道之本㑹通聖賢理事論議之跡若振綱張網舉領提毬目分毛歛見者皆明義貫理融感㑹神府乃知凡聖人所出之方所示之言特其教之跡矣使知識之明者由此自返所以跡所以言者以内照之則靈宇廓然無内外無彼此豈華夷儒釋之可辨耶乃著之書號輔教編以開諭搢紳先生之徒奏之於天子上嘉歎之勑與班行而名卿鉅儒至如歐陽文忠公諸豪覽其書莫不歎服敬而禮之復縁淺識講解輩毁其宗門故撰正宗記定祖圖以辯其說亦奏上行之既而還東吳示滅靈迹甚異具如傳記其墻岸法門啓迪信路雖古髙僧之雄者不過爾耳禪人寳智得其遺帖求䟦故援毫信手愧不能述其萬一也靈源叟書至聖至言回偏樹正皇天皇覺决淺賾深大哉善哉福霑諸後重刋所䟽續繼斯云拾遺宋明教大師鐔津集重刋䟽夫明教大師乃是大乘菩薩知佛法有難於是乘大願輪復生世間著書輔教者也昔宋之鉅儒搢紳先生嘗評其文曰不惟空宗通亦乃文格髙斯言是矣歐陽子云不意僧中有此郎耶當時排佛之心已廓然熄滅而無餘矣古今僧中之為文者多而未嘗有出其右者所謂北斗以南一人而已自昔兵變已來書板磨滅後之學者無所見聞為可憂也兹欲重刻吳中所費繁夥於是綴䟽仰謁羣賢同道學者覩兹勝事得無慨然賛助者乎為因縁而出現世間咸宗鷲嶺發文章而黼黻聖諦惟尚鐔津深窮萬法之原同入三乘之藏讀之可以開人天之眼目統之可以掃儒釋之藩籬好書而不好此書孰謂好學明道而不明斯道豈曰明心欲重刻雲間益廣傳于天下致永叔黎明之見名重一時遭仁宗天縱之資功垂萬古羣賢既遇勝事當成洪武甲子春天台松雨齋沙門原旭撰右松雨老和尚為琦首座製䟽重刋宋明教大師文集於雲間既已化行開至二十餘版矣適琦公疾作不克成其事兹以天全叡首座愍邪法増盛發堅固志繼其芳猷一日持此巻過余堅宻精舎命題于後余雖不敏覩此勝因不覺踴躍而喜此集湮没久矣若使竭力成就大行于世正所謂掲慧日於中天耀昏衢於叔世者也天全其勉之永樂三年冬嘉興府僧綱司都綱天寧𢎞宗書重刋鐔津文集後序學有及物之功文為載道之器學而不能利乎物徒學也文而不能衍乎道空文也若夫推其道發於文章肆其學以援斯人宋明教嵩禪師其人歟嗟夫吾佛之教法心法也生靈同而有焉但為虛妄所蔽不能顯現汩四生淪六趣何由得已哉而吾佛愍之以此心法隨器而諭俾各得乎本有或者不仰恩懐德反生譏毁是則自毁其心非毀其教法也教中所謂世智辨聦八難之一且不信而毀又非虛妄所蔽若虛妄所蔽或能了妄即真不信而毁則自昧其心自昧其心猶種之敗芽之焦不復有發生之日矣得不尤可愍哉而明教性禀生知能體佛意學則必欲援世非徒學也文則必在明道非空文也况是時天下學士宗韓氏以拒我故勸書原教諸文不得不作焉學者総稡號鐔津文集斯文行世眞救世明道之要術也可一日而無哉舊版湮没人皆痛惜嘉禾天寧首座天全叡公乃東海慧眼𢎞辯禪師之弟子施衣資重梓流行其亦明教之心也歟板既成請叙其後䝉晩生讀其文集有不得執筆從㳺之歎今獲厠名于後不亦大幸乎不亦大幸乎永樂八年嵗在庚寅夏四月初吉浙江杭州府徑山禪寺住持沙門文琇鐔津集巻二十二
