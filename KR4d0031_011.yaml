body:
  text: 鐔津集巻十一宋釋契嵩撰書啓狀共四十四封與闗彦長祕書書月日沙門某謹奉書於彦長祕校前辱彦長闗侯得潜子輔教之說喜與巳合遺書論大公之道百餘言迺相稱太多而潜子因彦長西行方致書丞相盛推此道惟恐書不盡其意復叙彦長見丞相為益言之夫大公之道者聖人之道之至者也大公之道行則不以天下苟親踈不以忠孝要勢利葢臣合忠子合孝可親者親之可疎者疎之是皆堯舜嘗之者也故大公之道其本在乎誠與明也聖人存誠所以與天地通聖人發明所以與皇極合猶中庸曰喜怒哀樂未發謂之中發而皆中節謂之和中也者天下之大本也和也者天下之逹道也堯舜所以至其道者葢能誠明而持其本也夫誠明之道而聖人猶難之孔予曰大道之行也丘未之逮也而有志焉後世忠孝以勸慕致則以忠孝矜之逞之而勢利忠孝者競作紛綸漫漶交於天下誠忠誠孝不苟不黨者柰何與其混淆一世又豈能自白彼矜者逞者亦以自謂人之為心而與巳相類不復信有誠之之謂也故誠明之道蕩然不復見矣大公之道之本亦不復知之矣況復能守而持之者也彦長當是獨能毅然推誠與明而持論大公之道豈天資自得其髙逺非習之炙之而然乎始潜子之書既出而搢紳先生之徒苐稱之其文善吾粗能讀百氏之書耳獨彦長謂我存心於大公其書勤且至矣非篤好其道相知之深安能若此耶方今大聖大賢相㑹於朝適以至公之道而治天下宜彦長振其本原力以誠明之道駕說資其所以為教化則功徳勝業效白益又大矣勉之哉勉之哉不宣某謹白荅茹祕校書月日沙門某謹奉書祕校茹君足下近辱示手筆稱美甚盛謙謙以未相識為恨愚何人也當此大惠幸甚幸甚愚本庸陋自度無以處心因求聖人之說以之為善既治吾道復探儒術兩有所得則竊用文詞發之而當世賢豪不以其僣竊狂斐相拒尚以為可語引之與㳺雖然接其㳺處綢繆至如朋友者而未嘗軒豁以盡乎心葢以人黨於教罕不齟齬雖欲道之自顧其言豈能必信於世故常嗟咨悒怏頗不自得及觀祕校送瑩上人序亦謂佛教教人為善有益於世不隨時軰訩訩以相詆訶此非踈達知逺窺見聖人之深心則何能如是之至論耶不待相識固信祕校識度卓卓逺出時軰而宜吾傾懐盡心相與語之況又辱書推道與文屈節肯相愛慕雖盛有道徳如古髙世之僧亦宜大進其説以廣祕書之志況吾區區當此寧可黙黙自祕耶夫佛道大至推而行之無所不可以之窮理盡性則能使人全神乎死生變化之外雖三皇五帝之道未始及之此誠非經營世間者所可擬議也以之治世導俗則能使人慈心潔身遷善逺罪止諍不殺乎國家天下其五戒十善之教與夫五常仁義者一體而異名此又有為者之所宜守也古今之儒辯之者多矣皆不揣其本以齊其末徒以佛為者謂過與不及而因之云云其相訾百端嗟乎舜樂取於人以為善禹聞善言則拜孔子擇其善者而從之顔子得一善言則拳拳服膺而不敢失之古聖賢人如此以帥於後世而後之人尚不能從之至有悖亂喪性滅身破家亡國者也況復妄斥善道沮人為之如此則何以勸於後世邪嗚呼使後世之人不盡為善亦妄辯者之罪也祕校方為國家為政果能推之以廣堯舜之道則為之政為之治不亦愈大愈逺乎臨風且布所懐為荅以謝厚意不宣某謹白與章表民祕書書月日沙門某謹奉書於祕校表民足下某讀所示書䆒其意義所歸凡三數日方窺見其㣲浩乎若瞰河海而莫知其源邈乎如望星辰而未得其故猶弸彪而令人驚愕疑今世之無有也始未相識表民來吾廬問文以取不肖忘其家勢貴盛肯與枯槁沈潜者用道義而相徃來適見其識度智見逺矣及他日從之㳺觀其行已誠與人信卓卓與時流不同益見表民之賢也今得其文又見其所以用心以聖賢事業為己任詞理淵而淳意義約以正誠可信而可行也雖古之人能文者宜無以異於此也將拳拳服膺之不暇曷止賢其賢乎哉某山林者也固宜黙黙自守安可論是與非而可言而不言亦有志者之不忍也吾聞君子之學欲深探其道深探欲其自得之也於道苟自得之則其所發無不至也所謂道者仁義之謂也仁義出乎性者也人生紛然莫不有性其所不至於仁義者不學故也學之而不自得者其學淺而習不正故也夫聖之與賢其推稱雖殊而其所以為聖賢者豈異乎哉其聖者得之於誠明而賢者得之於明誠誠也者生而知之也明也者學而知之也及其至於仁義一也表民其學切深於道有所自得故其文詞之發也懋焉韓子所謂仁義之人其言藹如也十篇之文皆善而議禹辯命解尤善視乎世之謂為文者蔑如也苟發之未已將大發之掀天地揭日月則韓也孟也不謂無其徒矣且謬進狂言以回盛編不宣某謹白與章潘二祕書書具位某致書於二名儒足下近辱以詩見招而叔治繼之其風調相髙皆宜其服人矣某雖欲為之報若視喬木而髙不可攀且書此以張其相感之意也然表民謂余以文而叔治謂余以才而相與云爾夫文與才皆聖賢之事而野人豈宜與焉如貧道始之甚愚因以佛之聖道治之而其識慮僅正逮探儒之所以為葢務通二教聖人之心亦欲以文輔之吾道以從乎世俗之宜非苟虚名於世而然也大凡恩於人而有誠者雖窮達不敢忘其始今得聖人之道而誠之至其可忘乎貧道常病夫庸僧輩寡識吾道不修迨乎名作徳空紛然以其末事求儒文字欲為其飾及其致譏也並教道而辱之不能曉了然復刋之石刻之板誇於世俗終日洋洋然以為其徳若此軰尤宜擯於吾佛貧道也益不得於人此豈宜舎吾道而自欲以區區之文之才而竊譽於賢者雖死不敢也故受所惠時幾捐書而泣曰方今天子大明踈通知逺適閲意於南宗正法某固而自棄於草莽終不能以其道稍進以上資於吾君之明聖烏可又以其不肖而累於教道乎諸君亦嘗視我以佛教修之其為誠不欺於天地不怍於神明苟謂其未至也宜以僧徳勉之不然則已若謂之寄迹專以文字見教則不敢聞命弊名恐汙盛集幸為削之其嘉章一一奉納不宣與馬著作書具位某奉書於著作馬侯執事辱貺獨秀石銘叙詞甚俊放意義髙簡若不勞思慮一舉筆以成其文然此宜發揮聖人之盛徳大業豈山石㳺物可當其美也執翫終日愛慕而顧無所能之人何以醻酢降服降服始此石與山俱溺於莽蒼中不知其幾千百年近世㑹好事者出之然南屏巖石大都皆竒而此石尤竒其山見於世數十年矣獨秀石混然與衆石不分豈其怪特古秀非俗軰之所識疑待其真賞精鑒以辨乎一旦執事果以其文發之傳聞於人未數日遊觀者求其石而來徃徃有之此獨秀石遭遇執事不隠而顯也某由此乃感慨古今人有懐竒挾異終沈棄草莽不如其石者何限其人雖抱希世之才識而無知已止與庸俗相上下假如一遇學者䝉其不妬且謗亦其幸矣況敢望其以重語相推耶嗟乎世不樂道人之善者衆矣若執事視一物不棄其美尚以文詞稱揚於世信執事心量倜儻過於人百千輩使執事得位於朝廷推此心於人則天下沈洽混俗之士孰不得奮其才業而執事之為徳又盛於今也聞古者有舜與顔子最能與人之善故後代歌頌其聖賢雖萬世不休執事果如是決進不已吾將見其世歌頌執事之賢之徳洋洋乎盈四海而不已也仍裁獨秀石古詩一首塵奉髙意詞句凡下極負慚靦不宣某謹白與周感之員外書具位某謹奉書於感之員外足下前日欲過所居語其新園其地甚佳將置先父墳於其間既與天休公論之其人亦喜當時倉卒而未悉所談伺晩復見也㑹事偶不暇接見先時雖聞此言而疑感之等閒語耳既聞於尊官始信感之果然為之驚怪數日來不能自處嗟乎感之忠孝之有稱者也何故忽然離其所守之如此也始感之與吾說其先父漸時教以骸骨歸故里與賢妣並葬初時感之拳拳然造次懼違遺訓謂感之奉父之道雖終身不改也然賢考意豈不以其身長於封又生感之軰為南人質直可愛其於封為故地亦其志耳歸葬之志是欲子孫懐故舊而不忘本也嗚呼賢父之志亦甚逺矣苟如他邦之地神靈清淑能使人今日葬之明日子孫便乃將相若孝子孫豈肯違父母之訓而為子孫計邪況萬萬無此效也感之讀書不忘道義寜不思易之謂葬者止取其過厚之義也孟子謂孝子掩其親但不忍視其形之暴露也至於三代惟恐貴賤僣偪奢儉失所故為禮經欲人喪葬有節不聞求山川土地葬其親以為富貴之資為此説者葢隂陽家妄張禍福以鼔動世俗而世俗汲汲於富貴不顧修徳紛紛然樂從其説望如其志不亦惑乎若感之賢而有識宜亦出㧞追古之聖賢為法惡得與俗浮沉此吾為感之之不取也聞古有周公者其為人子孫也有聖徳大業相天下萬世無比實由其祖宗累代積徳而致之今感之為子孫計者當念忠孝仁義苟有所未至則勉力至之彼隂陽家區區之說奚足留意某心素竒感之好節操慷慨有古人之風及此大懼有所虧損故不敢黙黙可否益宜更酌之若自謂有異見我果行其志非䝉所敢知也餘竢相見更論不宣荅王正仲祕書書巳上七書先自為巻具位某奉書祕校正仲足下近有客自藥肆中傳到七月所惠書一通發讀若與正仲風度相接甚慰所懐也然以我常為徃來者之稱道所以特相推髙此似未嘗有也吾佛氏者又其徳不足聞達黙於山林而時所不齒固其宜矣何足云云而正仲之賢足以大自樹立而尚孜孜以不得志劘切為憂如此則何慮其道徳不至耶昔樂正子為政而孟子喜之謂其人好善將有輕千里而以其善來告之者也正仲好善之意比於樂正子豈直千里來告乎宜資於天下善人可矣此雖屈彼邑幸且勉之其道將有所張之也所謂文集此雖近成一書僅五千言葢發明吾道以正仲方專儒恐未遑於此不敢輙通秋杪如成嘉祐集當首請於下執事者未相見間幸倍保衛不宣受佛日山請先狀上蔡君謨侍郎右某今者伏䝉知府端明侍郎台造特差衙前徐新䓁逺賫牋䟽并帖四道就潤州請召某徃淨惠禪院住持今月二十日於登雲禪寺已恭受鈞命訖伏念某道徳虚薄器識浮淺當預大賜實為忝竊然而教法衰弊緇仵隳怠斯葢侍郎念西聖付託之意特欲振起頽風曲采庸聲授以師位詞䟽婉雅𢎞奬勤重惟恐不勝所舉塵累髙明且媿且幸卑情無任皇恐感激之至謹具狀上謝與通判而下衆官某近者伏䝉特自大府逺貺移文召蒞名山授以師位既省巳之虚薄及聞命以驚惶顧遜讓之靡遑媿忝竊而無狀伏惟某官道極一貫識該九流總羣言以為公咨衆善而致治樂從西聖之教廣其勝縁榮貳東侯之藩重其明命辭意斯美惠愛亦深既被徳而有由卜趨風而匪邈謹先差僧馳状上聞披露下悃伏惟尊慈俯賜照察與在山尊宿僧官右某兹者猥以虚聲謬當盛命預侯府之𢎞奬冠禪林之住持循分撫心誠謂忝竊此葢某人念聖法之無量推風義以相先曲采㣲才容參大職擇善徳之未積為道力之斯充雖汲引以有由媿陞座而無狀趨覲非逺叙賛罔周謹先差僧馳狀披露下懇仍伸上謝與諸檀越書某状兹者猥以虚聲擢當嘉命預府侯之奬譽冠禪林而住持自審愚𠂻誠為忝竊此葢某人曲推道義篤信善縁奉外䕶之清修廣難思之勝事將趨雅㑹當卜良辰欽仰下忱諸容面叙不宣赴佛日山請起離申狀右某今者伏䝉知府端明侍郎台命俾就淨慧禪院住持祗荷恩輝豈任感悚於今月初五日巳起離潤州參見在即謹具狀申聞接杭州知府觀文胡侍郎先狀某此者伏審得請北闕拜命東藩重雨露之殊恩輟樞機之宻任來蘇之頌已作坐鎮之風聿揚伏惟知府觀文侍郎藝苑碩儒生靈上哲蹈聖人之閫奥擅文章之師宗灑麗藻於詞林發揮帝詔儲鴻勲於樞府増大聖功倚注方濃請陳逾恪惠全呉之美俗聳故國之榮觀民望傾城待瞻父母壺迎滿道願覩旌幢某忝主祗園濫當師仵顧惟昔日幸接清塵豈謂暮年獲栖貴部念衰憊之斯甚媿參迓之未前伏惟台慈俯賜念察卑情無任瞻望欽頌之至接錢塘知縣先狀某啓伏審榮奉詔命光臨縣封敷百里父母之仁副一時雲霓之望人樂利見頌起來蘇伏惟知縣司門才識髙明器量逺大襲奕世之軒冕揭名家之規模美聲溢於盛朝東侯企慕髙迹著於惠政西浙欽風鄉原預不敢欺壺漿已爭先接某濫綱禪席塵與華疆共白日以傾心仰青雲而垂䕃謹先狀迎伏惟鍳念云云接大覺禪師先書某啓近者竊聆俯從衆命臨鎮弊山祖席増光吾道復振伏惟比日法候休粹某僑寓龍山北趨尤為不便不及逺迎法御甚媿畏也謹先奉啓咨聞不宣謝王侍讀侍郎某再啓切以知府侍讀侍郎偉器淳誠實乃聖世名臣薦陞顯位奕葉貴重而又愽通知逺𢎞奬佛乗天下緇流仰為城壍某昨者愚不自度輙奉私書詣闕以扶至教侍郎念其㣲效特與薦諭天子允從遂成就其素志是葢侍郎全成其美鉅力賛䕶乃致若斯當與天下緇徒勵力行道以報其大恩盛惠而不敢忘也卑情無任懐風詠徳祝頌知歸之至謝沈司封提刑某啓昨日伏䝉降重獲揖風素殊慰乆違之思然而幸聞鐔津風俗之差美是乃太守仁賢風化致然葢斯民之大幸也某嘗慨彼逺方異俗佛乘不備雖甚衰老尚欲以能仁氏之遺衆勸𨗳邑子以為上善猶頼公儀遺愛資助使其一二載得遂鄙志又猛陵人俗之幸甚而勝縁有在也仙舟首程顧不能出闗相送徒益黯悒乍逺千萬乞惟善視尊履謹令僧馳啓參謝謝王宻諌知府惠詩某啓今月十四日杭州送到所賜佳什一封開發披讀且驚且喜仰戴恩輝無任感媿伏惟知府宻諌位尊望重聖宋名臣才識髙逺臺閣師範乃特俯念物外幽陋之人以其荒蕪鄙俚之言和而發之格律雅重風韻髙邁是謂假日月餘輝於爝火借韶頀大音於土鼓賁其㣲善勸爾小學忝此大賜實為甚幸方屬居山訓領少衆不遑躬趍下執事者謹先附啓上謝伏乞台慈俯賜念察與瀛州李給事某惶恐啓去嵗因使者北還甞得上狀諒必已呈髙明即辰伏惟台候嘉勝髙陽政治簡靜安衛道氣必益得妙理某山栖幽陋且此潜宻苐媿違逺風儀兹為眷然秘校告徃榮侍輙此少申卑素之萬一惟兾鑒念不宣與廣西王提刑某啓無狀之人輙䝉其黨相嫉且訩訩不已以此故不敢徃來實為彰於鄉邑之棄昨日幸光臨慰沃多矣此得預大賢按部弊屬將製䞇於路隅先沐賜教豈勝感媿某獨立無繫言多忤物或云以言忤物將逺匿羅浮藤守沈公儀賢儒相與有期冬杪春初決浩然南還當首候使車違逺尊明萬乞為國重愛謹上啓少布區區不宣與陳令舉賢良某啓自湖旁冒雪相適已數月矣别後但眷眷然仲秋時接所示書乃知令舉至官甚善不以遷謫介意公餘揭牕對雲而坐道情清勝乃下視塵俗超然自樂雖白樂天九江之時何以過之風聞人但景服不暇令舉當世賢豪更以外物自如此其清規素徳益絶人逺矣老􅉵浮雲落葉飄泊尚若不定雖有陪三峽五老之興安得遂之猶逺髙論萬乞善保尊履不宣與潤州王給事某惶恐啓上知府給事几下某山棲荒僻不便行李乆闕馳狀不勝瞻系伏審旌珮已鎮南徐況彼比比數萬之家不亦復荷大賜乎無任欽頌景服之至大熱伏乞上為國朝自重䖍祝謹附啓上覆不宣與王提刑學士某啓伏自京師罷奉貴逰還山雖聞廣按江外終無以奉書適知軒從已届此郡伏惟尊履休美某近自蘇挈書欲圖奏納以疾未暇前趍容稍平復當以㣲意上扣謹此先布區區伏惟念察不宣與陸推官某啓自曠清談驟更良節林木幽隠圜堵寂寥了亡世紛足以自得其餘追復舊好睇想清才懸揺之心狀貌難盡猶聆蒞事明敏越於時輩萬舌一詞所共稱賞況在顧盻之頃寜不欣愉暑中萬希善保不宣與張國博知縣某啓孟夏漸熱伏惟知縣國愽尊候起居萬福某即日䝉廕如宜比者伏審榮奉明命臨鎮縣封敦惠斯民雅副物望某未遑叅賀卑情無任忻慶瞻依激切之至謹奉啓不宣謝錢塘方少府具銜右某此者伏䝉仙尉秘校特枉軒葢臨賞岩扄衡宇増輝緇屬稱慶限以夏制尚緩趨風媿畏良深景服徒切謹上狀咨謝伏惟尊慈俯賜念察不宣與仁和趙少府某啓前日伏承臨訪山舍無以為待不勝媿畏繼以佳什見寵稠重風調髙雅豈幽陋之可攀續不揆荒唐勉强和之但以取笑大手名匠暑濕惟自重不宣與沈少卿見訪某惶恐啓昨日奉䝉降訪客舎仰荷尊賜不任感媿但以老􅉵弗堪人事未果即趍几下謹令弟子馳啓上謝伏惟少垂鍳念不宣與祖龍圖罷任杭州某啓此者伏審知府龍圖罷鎮名藩即日趨詔歸闕行舟首路某山林逋病不能逺郊馳送徒増黯戀仁徳慺慺奉此咨露伏惟台慈念察送詩與楊公濟某啓不披晤來倐越旬日春氣尚淺景色猶寒惟體中無恙否近縁禪闗不固習氣寜忘因得斯謬妄葢適性而已豈敢風雅可與哉然拙人用鎪不若智人揮钁況足下才力有餘可能為我一鋤勿使傍觀揜口胡盧而笑也還章監簿門狀某啓昔日伏䝉特墜清名榮賁旅寄不任感荷容宿恙稍痊當走左右以謝盛刺謹具狀上納伏惟垂察不宣與石門月禪師自此元各為巻某啓昨三月得公晦書并所制悲風謡後序慰諭勤至非深交至友何肯如此於感佩萬一也然序文殊佳但其徳薄不任稱奬也此為忝耳公晦乆别所諭何老而益賢如是喜且非常我但白首偃蹇不能自振況暇於教道也視此得不媿乎栖居石壁殆二年矣雖然自適頗樂顧人生如夢何足堪恃紙衾瓦鉢外惟圖書雜然於室中耳流俗所尚一無留也近著孝論十二章擬儒孝經發明佛意亦似可觀吾雖不賢其為僧為人亦可謂志在原教而行在孝論也今以相寄葢以公晦善於親也所栖雖牢落於佛法其意亦不敢怠徐當為教門著一大典但慮其功浩大若果就先當相聞公晦道已振一方吾復何云但善將身世此為至祝專人還特此上聞與黄龍南禪師别幅某再啓和尚有大勝縁所止則學者雲從景附實末代之盛事萬幸益勉尊用某濫主禪席徳薄言㣲不為時之所信徒勞耳目自近有匿羅浮之意果行必道出江南當拜求髙㑹公晦和尚平生心交今老在一涯二年化僧不至不聞其音或因遣書乞為呼名黄龍古之名寺應稱清棲法澄每談及積翠風景聽之使人神動心飛今何人得其居也愚甥孫早辱教誨亦僅似人顧小子何以報重恩路逺不及以麤物輙陳左右惟拳拳欽詠耳荅黄龍山南禪師次幅某稽首雖聞祖圖宗記已辱采覽而未奉評品鄙心得無慊然辱賜教墨乃過形奬飾豈大善知識為法欲有所激勸爾且感且媿某平生雖猥懦無大樹立然亦勇聞清逺髙識之士三十餘載徒景服道素不得一與勝㑹此為眷眷知復領大衆於龍山其欽尚好善之誠何書可盡春煦幸千萬為法自重僧還謹布區區與圓通禪師某啓去年夏首聞移錫崇勝喜慰喜慰廬阜天下勝壤宗教所出得大知識鎮嚴乃學者之大幸也珠上人至果聆清規益舉又喜之也惟乆之可矣乞罔起他方之念尤佳某衰老翛然客寄𢎞法無力徒欽羡於能迹耳逾逺風論千萬善保因介謹此咨露不宣又與圓通禪師某啓東林莊僕至辱手筆知退法席專育髙趣欽羡欽羡但廬阜不得鎮嚴亦禪林之不幸見邀虎溪之居足仭風義盛重但某濡滯不能即拜雅㑹殊為慊然餘具别幅未披覲間千萬善愛荅圓通禪師讓院某啓前日專人傳到華緘承已得美罷潜道於此縁徳方盛年臘相然何遽爾驚衆耳目又聆黒白復請留此千萬且從輿論某老弊徳薄不能為之綱紀天下共知潜道何悞以此人為代在潜道推讓之義雖自髙冠而鄙劣之人終何以當克萬萬須自回雅意為衆少留老弊東西南北人也固無定迹奉見未期千萬留意荅萬壽長老某啓專人至辱手教慰諭足仭乆要之不忘也萬感萬感法印和尚不可救療遂至如此愴感無已索文志其塔雖腆忝相知至於厚善當此豈可飾讓耶且以拙直之筆聊奉佳命亦表生平交契之誠耳用舎更在裁之益熱千萬為法自重謹此咨荅不宣與萬壽長老某啓音信雖不相通而欽服道素徒此懃切或云懃懃某無狀老更彌篤春季問罷去佛日深匿龍山蕭然人不堪其憂而余之未嘗自厭比欲致奉問聆道葢淮南未還故不果然適㑹曹君乃知起居清勝善慰孤迹不肖見謀徃廬山治行當首拜道塲冬寒未見間萬乞善愛謹此布區區不宣謝杭州寶月僧正某啓比者以衰恙告免住持特䝉垂訪過形存恤仰荷道眷豈勝感媿尚以夏制未遑前禮謹奉啓上謝退金山茶筵回荅某啓適早監寺至辱牋命就所栖以預精饌意愛之勤豈可言諭乃盡誠素某雖不善與人交豈敢以今日之事自虧節義無煩相外清集方當大暑告且為罷之書謹令人回納伏冀慈照與東林知事某啓今者伏承逺馳价使特贈書問以昔賢勝集之所假無狀自匿之便嘉命逺至光賁殊多某人曲采虚聲更推髙誼循省其愚何以當克媿以老憊復牽事縁趨赴未遑但深媿忸乆滯來人益憎慊悚价還奉狀布謝伏惟慈念與楚上人今月十六日人來獲贈筆語所喜道意清淨不事他縁人生世間閒為苐一此事勿使俗眼見之一二年来甚不喜聞也思慮消盡無事可堪古云千里同風斯之謂矣所問賢弟不獨愚迷兼亦倒置予為劇言來諭如風過樹秪益嘈嘈耳病在膜内無由除之足下雖有弟兄之情奈何柰何發供養主與檀那某啓萃兹勝侣允頼檀賢雖素欽於令猷尚未披於粹表企慕徒切揖晤未期秋氣稍清珍育是禱化人行專此奉啓不宣鐔津集巻十一
