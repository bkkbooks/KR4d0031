body:
  text: 鐔津集卷二十一宋釋契嵩撰此與楊公濟晤冲䀲山游唱和詩自有序見前序録中今總編于此貴後賢披覽以見一時文㑹之清勝焉嵗暮值雪山齊焚香獨坐命童取雪烹茗因思栁絮隨風起之句遂取謝道藴傳讀之見其神情散朗故有林下風氣益發幽興乃為詩兼簡居士公濟彼上人冲晦東山沙門契嵩上簷外驚風幽鳥歸窗間獨坐事還稀初看厯日新年近喜見山林驟雪飛但憶故人能有詠寧懷久客此無衣鮑昭湯老能乘興城郭何如在翠微章安楊蟠次韻零落東山老佛師古來獨往似君稀雪邊氣候春將破林下神情句欲飛後日當尋慧逺社何人更贈大顛衣一萹感發渾閒事須脫青衫動少微錢湖草堂沙門惟晤次韻上雪滿西山春未歸泉聲凍咽鳥聲稀靜觀眼境人間渺驅逐詩魔天外飛一飽每將松作飯大寒重換紙為衣我憐詩是君家事更約論心極細微約冲晦宿東山禪寺精舍先寄蟠上人合動林間興吾恨衰遲學謝安納屐操笻那有限吹雲落雨漫無端先憑報信春枝破預想分題雪屋寒林下不諳人世苦笑將雙鬢與君看次韻和酬契嵩襄陽習子不貪官欲友幽人擬道安冒雪履霜臨嵗杪攀蘿挽翠到雲端初論浮世慚年老久對清規苦夜寒空感知音何以報但誇山水富君看將訪永安東山禪師先寄惟晤庵在千株松桂下更無塵事到夫君髙蹤罕過呼猿澗靜思唯看抱石雲日暮坐間禽影集雪晴岸畔路形分揚雄約我須投宿月裏禪餘怯論文次韻和酬契嵩嵗晚隂沈天宇昏宗雷訪我更㩦君相期石屋宜投宿獨憩山茨學卧雲雪映窗櫺人已靜風吟燈影夜初分自憐惠永多閒散强接清言愧不文宿永安方丈書呈東山禪師蟠千年道在髙僧傳未論詩人更有評曽著文章原大道獨推性命濟羣生白雲已鎖山間寺流水空傳世上名林逺不聞鐘磬作五更幽鳥轉春聲次韻和酬契嵩詩豪何遜宿嵒扄品格髙卑徹曉評未省窗前無月到唯驚席上有風生郤超年少偏髙隱莊子才雄不近名明日君歸草堂去莫將平叔擬虗聲次韻奉和惟晤道安獨繼襄陽踵詩好慵窺霅晝評竹屋數間經幾載草衣三事傲平生縱陪林下收孤迹難學人間走大名燈火已殘談未倦曉風斜雨打窗聲嘉公濟冲晦見訪契嵩數曲青溪山數重山深日暮已鳴鐘忽聞行客門前語來覔幽人林下蹤初接風流殊歷落更張燈火倍迎逢不須便去疑無待已有黃糧在宿舂次韻和酬蟠數百招提隱亂峰蒼茫豈復辨君鐘春含未得黃鸝報路轉唯尋白鹿蹤庵在月邉長不鎖興來天外忽相逢山人莫笑衣冠客亦有鴻來待賃舂次韻和酬惟晤白雲蒼海一重重傍舍遙聞隔塢鐘月上更無人語閙雪深空認虎行踪詩書共喜燈前論茗果翻疑夢裡逢脫麈髙談無限樂煴爐寒擁日髙舂遊靈隱遇雨呈普慈及二詩翁蟠山老未容山客去故將雲陳鎖山門雨催晚色凝諸嶺雷送春聲落後村今夜青林妨月上故人白首把詩論來朝山水終瀰泛策杖相隨討澗源次韻和酬契嵩暮雲將雨苦紛紛看雨攜君倚寺門飛鳥驚雷歸後塢落梅流水出前村名山當爾何須去勝事而今更好論况有禪翁通妙理徘徊重欵扣真源次韻和酬惟晤雨洗羣山秀色分一笻雙屐到松門天邉雲散爭歸洞島外樵還各占村久著青袍心巳厭相看白首事休論請君細問黃梅老當信禪河别有源同公濟冲晦宿靈隱夜晴契嵩不睡還烹北苑茶寒風落盡適來花夜深雨過山形出天靜雲空月色佳且喜僧窗晴似晝莫論人世事如麻况陪支許皆能賦豈厭留詩在碧紗次韻和酬蟠山風亦㑹山人意卷盡天紛掃雪花明月當樓情已興碧雲落紙句還佳霜威忽霽應通物仙侣相便合姓麻羣動已消林木響卧看星斗隔窗紗次韻和酬惟晤戰退睡魔重酌茗再披文卷眩生花喜逢長夜身雖健勉和新詩興未佳風細猿聲清似梵月明杉影密如麻臘寒燈炷飛蛾滅何必殷勤護薄紗早過天竺呈明智及同逰二老蟠雨夜靈峰卧竹床平明屐齒到雲堂門前雨過新溪滿石上風回舊草香山抱鐘聲圓不散雪鋪瓦面冷無光理公莫怪詩相惱今日偕行總姓湯次韻和酬契嵩澗北夜依禪舍宿峰南今訪講師堂初行松路愛清曉及過石橋聞異香日色暖烘諸壑淨晴嵐翠潑幾峰光道標尚客何髙趣更飲吾曺柏葉湯次韻和酬惟晤曉過翻經臺下寺與君同謁祖師堂庭前紫桂葉頻脫石上紅梅花正香出洞隂雲分逺影挂松寒日漏清光謝公勸飯須無讓不許非時薦茗湯南澗傍逰戲呈公濟冲晦契嵩相引朝來碧澗傍山林雪盡水流長未應驚鳥下苔岸先共觀魚跨石梁日淡沙寒鷗自聚嵗䦨春入草含芳鮑昭湯老須同詠何必人間萬事忙次韻和酬蟠澗南一嘯清風發林下重來白日長雲逺石深連鷲嶺水寒沙淺似魚梁漫因野老詢前事閒伴幽人擷衆芳更欲窮源情未已知君嗔我索歸忙次韻和酬惟晤撥雲過得南隴去流水激濺一澗長磐石誰堆補缺岸老松自倒成危梁沙禽呼雌頻呌噪山藥吐色常芬芳臘去春歸山愈好喜君共無塵事忙逰天竺上寺呈東山仲靈冲晦蟠入林巳欣猿鳥樂共傲浮生勝大還身外是非雲不繫社中留戀雨相關籃輿寂寞愧彭澤拄杖風流肖德山寄語葛洪嵒下水莫流清夢落人間次韻和酬契嵩共訪迢遙深塢寺仍隨野老賣樵還鳥栖已定人方到暮色雖濃門未關今宿嵒房休問法來朝臘屐重登山平生勝友殊難㑹莫厭相㩦寂寞間次韻和酬惟晤天寒雨細日將暮泥滑誰禁䇿馬還砂穴吐泉鳴决决竹叢歸鳥語關關聊睎謝客須穿屐莫羡支公獨買山方外論交情未淺願陪投老白雲間同公濟冲晦逰天竺兼簡呈伯周禪老契嵩愛此蕭然松塢深詩流邀我此相尋蒼茫寒日才開霧靉靆濃雲又結隂安石放懷還劇賞皎然乘興合清吟主人勤駐禪扉宿况值梅香正滿林次韻和酬蟠不問猿崖鳥道深擕笻著屐伴君尋山中桂子驚寒夜雪後梅花逼嵗隂欲住更逢青眼顧相看須盡白頭吟他年若讀髙僧傳未放湯休與道林次韻和酬惟晤平昔詩禪友契深更來人外事幽尋雨餘澗壑流寒響嵗晏柳杉老翠隂袒跣不妨陶令醉風流多效洛生吟山翁解榻延清賞未放前賢勝竹林宿天竺再贈東山禪師與冲晦蟠仲靈述作慙知已冲晦萹章竊賞音勝侣俱恬山水樂神交已過雪霜深燈前自笑平生事雨後重論一夜心相檢莫教詩間斷更䦨同聽夜猿吟次韻奉和契嵩沈侯才雋冠儒林詩語驚人金玉音學海平生慙我淺詞源今日羡君深强睎老格須張膽喜聽清言更洗心賡唱苟能容纍句漫陪梁甫續髙吟次韻奉和惟晤燈火青熒雲塢寺清猿呌斷有餘音檻梅雪白春風近山雨盆傾澗水深背世迹憐髙鳥迹結交心契老松心酬君秀句無新語徒攪詩腸徹曙吟宿天竺寺賦聞泉呈二老蟠我有泉中興平生愛水經山空時决决夜靜轉泠泠暗脉來湍急清聲出混冥月寒風不響髙枕與君聽同賦聞泉契嵩嵗晏林間宿初聞况夜晴漱寒醒客夢飛響應山鳴深澗松風靜幽人石室清誰人能為我寫此入琴聲同賦聞泉惟晤澗泉吾所好山舍寂無喧春脉生雲底夜聲來枕前風休不動竹月上未啼猿石上鳴逾急冷然清夢魂送公濟冲晦出山兼簡駐泊所諸公索和奉寄李思文契嵩幾日山逰霰雪稀相隨野老亦忘機始憐洞裏雲堪臥又憶人間嵗杪歸夜落梅花應滿路風含春色自吹衣憑君為語王孫道音信終須寄鳥飛次韻奉酬蟠臘後東風掃翠微同看芳桞破鋒機三宵聼水都無夢四日登山未肯歸野老且憑雲送客家人應笑雨霑衣君詩兼簡佳公子只恐囊傾一夜飛次韻奉和惟晤招擕緑野村邊去纍日青山曠世機惜向永安蘭若别還經靈隱渡頭歸雲峰積雪迷樵徑石罅新泉濺客衣詩㑹末由陪帝戚心隨雲鳥入城飛遊山歸遇雨呈仲靈冲晦蟠九里松門雪過時籃輿裊裊礙松枝雨留宿客還斜落風送行人亦倒吹華表忽驚黃鶴反耳中猶帶白猿悲來朝弗著登山屐可避君呼謝客兒次韻和酬契嵩嚴維靈徹出山時避雨曽聞礙木枝嵗杪霜寒何足畏管中春色已堪吹風含鐘韻凝還散水結溪聲咽又悲鬪草野逰君莫笑初平元是牧羊兒次韻奉和酬惟晤興髙未肯輟清詩捨轎重扶櫛栗枝松柏青肥春雨洗烟雲輕健澗風吹樵歸後塢連聲唱鹿過前溪失隊悲莫道還家甘寂默陶潜自有五男兒山中回憶東山老蟠山遊興發特尋君屐齒笻枝繞四鄰峰北看雲忘世務澗南聽水得天真名髙寂寞存僧史林下風流似晉人何日枇杷苦笋熟却逰未减去年春君去年有苦笋上枇杷熟之句次韻奉酬契嵩君事逍遙入亂雲與君躡屐遍溪鄰林間聽鳥聞偏好烟際觀山見匪真澗水只能忙送客岩花不解久留人樂天更有龍門約勝㑹應須趂早春連得公濟出山道中見示二篇鄙思枯涸奉和不暇且乞罷唱契嵩詩萹留落野人窗又得虞卿璧一雙怪似蛟龍出古水清如日月浸秋江𢋫吟何止夸山澤變雅終須繫國邦為報詩家驍將道雪闌休唱已心降次韻奉酬蟠幾夕論詩坐石窗憐君百首妙無雙勾牽野興侵孤月惱亂詞源湧大江數紙忽然來竺嶺千年猶可照吳邦相思未免還相挑莫竪旗幡却詐降出山至中塗寄永安禪師惟晤松行未盡却回頭寒雨雱𩃱巳漸收望海閣邊雲繚繞行春橋下水奔流山庵驟别髙談逺城寺將歸滿面羞須效著書同說法悠悠人事漫拘囚次韻和酬契嵩忽憶山中人白頭嵗䦨喜看雪初收詩萹見賞皆髙興謝客相隨非俗流却有嵓雲供夜卧況無土食備晨羞愛君吟詠殊堪聼金玉聲音勝楚囚公濟冲晦出山次日奉寄契嵩孫綽曽陪支遁逰千年人謂兩風流羡君慕此乘雙屐結侣還來共一丘衣冷雪霜猶未去興髙雲月肯甘收耽詩重道皆無比應敵當時萬户侯次韻奉酬蟠猿聲未落鳥聲愁笱發花開澗水流還對春風驚莭物漫思野老傍林丘古人得道多深隱賢守知名貴早收林下頻過君莫怪自看骨相匪封侯次韻奉酬惟晤今日追懷昨日逰二君乘興似奔流逺尋幽壑行拖屐纍到深雲卧枕丘崖竹蕭踈晴影亂塢梅零落晚香收㑹須重訪藤州老更約髙才沈隱侯次韻奉和契嵩樂天已與廣宣逰更出風塵外俗流酒聖盡能非畢卓詩仙皆欲接浮丘聞公濟與冲晦逰斷此葷酒多隨其奉戒萹章逸處江山動筆硯閒時雲雨收况有聲名俱籍甚並飛南北動王侯嵗暮還西塢寄公濟無𧦬契嵩乘興溪邊去仍從林下歸梅香帶春信日色暖人衣白髮思還逺清流遇更稀野禽寧㑹意相顧向柴扉日色暖人衣或云日暮入人衣次韻奉和蟠聞說西庵好藤州恐不歸延年松可食避世草堪衣山塢雪應壞林端梅亦稀猶憐二禪老佳句及城扉次韻奉酬𧦬元野步溪流靜源深興未歸晚禽栖雪竹殘霰灑禪衣放意天涯逺狂吟人落稀詩成寄吾侣清氣動林扉次韻奉和惟晤白髮東山老青林西塢歸聼猿時駐錫厲水自褰衣髙論才難敵孤蹤行亦稀慚君寄樵採佳句出嵓扉寄東山禪師蟠髙卧西林月孤閒獨見君杖藜探澗水欹枕看山雲鹿過何人見猿啼只自聞篇章知幾首寄我莫辭勤次韻奉酬契嵩翛然林下隱吾道異夫君習忍如幽草觀身類片雲人情無意染鶴唳有時聞謝客詩懷寄憐君此興勤蟠雪夜登湧金樓逺望西山憶仲靈灑然有邁世之風因思山隂王徽之雪夜獨酌四望皎然徘徊詠左太冲招隱詩忽憶戴逵扁舟乘興余恨未能遂往聊寄此詩家占西湖島上雲雪光月色更氷魂興來爛漫投空老投或作心詩罷蒼茫眼正昏晉國衣冠何處覔梁朝殿閣儼猶存思君不及山隂夜遙望青松聼雪猿次韻奉酬契嵩瞑色隂森雪和雲故人當此動吟魂烟凝火冷萬家靜水色山光竟夜昏興發晉賢前古逺詩傳蕭寺邇今存春歸嵓壑多芳樹漫欲邀君同聼猿寄勉冲晦速和拙什蟠冲晦僧儒詩者豪尤憐賴汝壯方袍一千萹興時無敵三十年功格最髙白髮逢春今更勇清吟徹老莫辭勞何朝始肯將珠玉却報仙人換木桃次韻奉酬惟晤杜門誰復念吾曹老畏春寒擁毳袍懶慢從來徒自笑唱酬今更怯君髙曽無道譽喧喧播厭把肝脾苦苦勞佳句忽來催野句譬將凡果逼仙桃新嵗連雨不止因寄公濟兼簡維晦禪丈暨賢令强公契嵩寒郊才喜嵗華新景物隂隂又一旬雲帶天低垂壓野雨藏春晝暗迷人寧愁燈火妨明月却嘆詩家惜令辰陶令而今臥江國倚樓吟望更誰親次韻和酬蟠林扉厭聽雨聲頻為惜春風只九旬裛擈山花將放杏侵尋嵗月已過人何時好去逰南澗每夜空來望北辰愁坐更無車馬客獨憐詩筆謾相親竊觀仲靈久雨詩且道余與公濟吟從之意輒次韻奉和至詩興勾牽日日新年光初破雨彌旬舊逰已得新工部佳句今逢休上人仲靈文章大手非特休比此比以詩言耳雲外馳心關水石江邊搔首望星辰泥深未愛尋山屐誰與西庵杖屨親重次元韻至吟思那知嵗月新初鶯啼雨早經旬姢姢野竹通寒水洗洗江梅冷照人鷲嶺並逰勞夢寐虎溪一笑尚參辰千金褒字形篇尾迹未相同意已親又次韻奉寄强令契嵩冉冉流年年厯新仲春春日未盈旬何為萬里青雲士來問雙峰白髮人詩思雅驚含老格風神清爽惜芳辰况聞傲令陶元亮臘屐須來與我親重次韻奉酬至千年支許事如新欲寄前逰漫歷旬雨帶黑雲遮俗客猿呼飛鳥伴幽人從容劇論知何日感激佳篇慰此辰四海聲光非鑿齒道安名重若為親鐔津集卷二十一
