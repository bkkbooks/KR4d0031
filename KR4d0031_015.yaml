body:
  text: 鐔津集卷十五宋釋契嵩撰碑記銘表辭文中子碑原天下之善者存乎聖人之道又天下之理者存乎聖人之才有其才而不有其道教不及化也有其道而不有其才化不及教也堯舜得聖人之道者也禹湯文武周公得聖人之才者也兼斯二者得於聖人孔子仲尼者也故曰夫子賢於堯舜逺矣仲尼沒百餘年而有孟軻氏作雖不及仲尼而啓乎仲尼者也孟軻沒而有荀卿子作荀卿歿而楊子雲繼之荀與楊贊乎仲尼者也教專而道不一孟氏為次焉去仲尼千餘年而生於陳隋之間號文中子者初以十二䇿探時主志視不可與為乃卷而懷之歸於汾北大振其教雷一動而四海尋其聲來者三千之徒肖乎仲尼者也時天下失道諸侯卿大夫不能修之獨文中子動率以禮務正人拯物嘗曰天下有道聖人藏焉天下無道聖人章焉返一無迹庸非藏乎因二以濟能無章乎昔二帝三王之政正而未記諸侯五伯之政失而未辨仲尼文之為六經備教化于後世也後兩漢有天下雜用王霸治至其政之正者幾希矣魏三國抵南北朝紛紛乎而人道失極或作拯字往者不可追來者猶可規先王之道膴膴將明夷于地文中子憂後世無法且曰千載以下有治仲尼之業者吾不得而讓矣因採漢魏與六代之政文之為續經廣教化于後世也非有聖人之道聖人之才而孰能與于此乎文中之于仲尼猶日而月之也唐興得其弟子輩發文中之經以治天下天下遂至乎正禮樂制度炳然四百年比隆于三代噫仲尼之往也幾百年其教禍于秦弟子之行其教而仕者不過為列國陪臣文中子之弟子為天子相將其教也播及于今何其盛哉高示逺邁之如此也天其以仲尼之德假乎文中子耶吾不得而知之讀王氏世家愛文中之所得大矣哉故碑云六經後兮治道不精大倫厖兮權譎興行文中作兮頽波澄清六經續兮天下化成孔子如日兮文中兩明彌萬世兮莫之與京杭州武林天竺寺故大法師慈雲式公行業曲記石刻夲見天竺山法師諱遵式字知白本姓葉氏臨海郡寧海人也初其母王媪乞靈于古觀音氏求男一夕夢其舍灑然有美女子以明珠授使咽之及生法師方七月巳能從母稱乎觀音稍長不樂與其兄為賈遂潜往東掖師義全出家先一夕義全夢有童子處其寺佛像之左者翌日法師至其夢適驗十八落髮二十納戒于禪林寺明年習律于律師守初當時台之郡校方盛諸生以法師俊爽屢以詩要之業儒法師即賦而答之其詩略曰真空是選場大覺為官位已而入國清普賢像前燼其指誓習乎天台教法徐鼓笈趨寶雲義通大師講席道中夢一老僧自謂吾文殊和尚也及見通乃其所夢之僧也即服膺北面受學未幾凡天台宗之所傳者其微言奧㫖而法師皆得智解嶄然出其流輩㑹其祖師智者入滅之日遂自燃頂終日誓力行其四禪三昧因說偈以效其誠凡其詩偈並見于文集此皆略不書通師既逝而法師即還天台以苦學嘗感疾嘔血自謂必死毅然入靈墟佛室用消伏咒法而詛曰若四教興行在我則其病有療不爾願畢命于此方三七之夕忽聞空中呼曰遵式不久將死法師益不懈至五七之日遽見死尸盈室法師不惑踐之以行道其尸即隱七七之日懴訖復聞空中聲謂曰十方諸佛增汝福夀其夕殊寐恍惚見一巨人持金剛杵擬其口驚且覺而其病遂愈俊辨益發聲貌形神美於平日法師大感益欲從事于此遂著書曰觀音禮文方題筆遽有竒僧遺之書名自意趣與已著本略同淳化初法師年方二十有八衆命續居其師之寶雲講席講四大經積年法華維摩涅槃金光明經一旦有施氏胎驢馳來伏其座下若有聽意其後以時而至者凡四十日産而乃已驢果有人之意不亦異乎至道丙申之嵗法師結乎黑白之衆信者按經習夫淨土之業著書曰誓生西方記復擬普賢益為念佛三昧師處寶雲更十有二載未嘗持謁與俗人往還自幸得觀音幽贊命匠氏以栴檀為大悲之像刻已像而載之益撰十四大願之文其後工有誤折像所執之楊枝者法師敬且恐即自以接之不資膠膠而吻合如故咸平三載四明郡大旱郡人資以祈雨法師用請觀音三昧冥約若三日不雨當自焚也期果雨其郡蘇太守以為異乃即碑其事咸平五年法師復歸于台欲東入屏居而徒屬愈繁乃即其西陽益宏精舍據經造無量夀佛大像相率修念佛三昧著淨土行法之說其邑先有淫祠者皆為考古法正之濫饗者徹去其所謂白鶴廟者民尤神之競以牲作祀法師則諭其人使變血食為之齊及其與衆舟往白鶴而風濤暴作衆意謂神所為法師即向其廟說佛戒殺之緣而其浪即平尋命其神受佛之戒此後以牲祀者遂絶即著野廟志乃與神約而民至于今依之也祥符四年㑹章郇公適以郎官領郡丁僧夏制乃命僧正延法師入其郡之景德精舍講大止觀其夏坐畢有三沙門被衲無因而至請與盂蘭盆􅊰席方揖坐而忽不見法師嘗以勝事他適道出黃巖有一豕奔來繞師所乘已而伏前意若有所求衆嗟咨不測其然徐推之乃豕避屠而來也遂償其直教屠者釋之命豢于妙喜寺名之曰遇善夫豕之果饗德邪人其何哉台有赤山寺高爽而瀕海法師嘗謂人曰此宜建塔其衆鄉人樂聞皆曰是山之巔每有異光照耀海上其光之間益見七層浮圖之影然其所照之至處四十里皆捕魚者簄梁周之法師知其法光欲有所警益勵衆必塔之及其事址發土果得石函之效塔成亦以七級應其先兆而斯民不復漁也法師方百日修懴于東掖山也㑹其時大旱水不給用乃出舍相之俄以其錫杖卓之石泉從而發激今東掖所謂石眼泉是也初杭之人欲命法師西渡講法雖使者往還歷七嵗而未嘗相從及昭慶齊一者率衆更請乃來至是已十有二嵗矣先此法師嘗夢在母之胎十二年校其出台而入杭乃其夢之效也至杭始止乎昭慶寺講說大揚義學者嚮慕沛然如水趨澤杭之風俗習以酒肴㑹葬法師特以勝緣諭之其俗皆化率變葷為齊因著文曰誡酒肉慈慧法門以正其事其人至今尚之明年蘇人以其州符迓法師就開元精藍晝夜專講法㑹盛集黑白之聽者謂日萬夕千其人不飲酒噉肉者殆頃郭邑酒官屠肆頗不得其售也遂謂其徒曰吾祖智者遺晉王之書六恨其一適以法集動衆妨官為之患余今德薄安可久當此㑹去之乃翻然復杭方祥符乙闕之嵗也刺史薛公顔即以靈山精廬命居法師昔樂其勝槩已有棲遁之意及是適其素願也其地乃隋高僧真觀所營之天竺寺也歷唐而道標承之然隋唐來逾四百載而觀公遺迹湮沒殆不可睹法師按舊志探于莽蒼之間果得其兆即賦詩作碑記之此始謀復乎天竺也初其寺之西有隋世所植之檜枯枿僅存至此而復榮蓋其寺再造之證也因名之曰重榮檜益以其香林洞口之石上梅其山之本腹內竹石面竹者與檜為天竺四瑞作四詩紀其勝異居無幾而來學益盛乃即其寺之東建日觀庵撰天竺高僧傳補智者三昧行法之說以正學者祥符之九年天台僧正慧思至都以其名奏之遂賜紫服尋復請講於夀昌寺罷講過舊東掖謂其徒曰靈山乃吾卜終焉之所也治行吾當返彼尋援筆題壁為長謡以别東掖還天竺凡夏禁則勵其徒共行金光明懴法嵗以七晝夜為程宫保馬公既老益更奉佛尤慕法師之言遂為著净土决疑論馬公鏤板傳之逮王文穆公罷相撫杭聞其高風因李明州夷庾要見于府舍既見王公竒之不數日率其僚屬訪法師于山中即命之講乃說法華三法妙義其才辨清發衣冠屬目王公曰此未始聞也即引天台教之本末欲其揄揚王公唯然尋奏復其寺得賜天竺之名王公書其榜尊君命也王公始以西湖奏為放生之池者亦法師以智者護生之意諷而動耳其王公出尹應天方微疾夢與相見而其疾即瘳乃遺之書盛道其事以謂相遇平生有勝緣移江寧更迓于府舍問法留且三月王公始欲為僧伽像疑而未果法師乃為其推觀音應化遍知無方者示之先此法師嘗夢與王公在佛塔中有老僧者擘金鈴而分之二人益說此以驗適論王公曰實金陵之謂也既造像卒持與法師因撰泗州大聖禮文以尊其事王公益與其秦國夫人施錢六百餘萬為其寺之大殿者法師以復寺乃自皇家與王公也特有所感遂重集天台四時禮佛之文勉其徒行之欲以報德㑹乾元莭王公以其道上聞遂錫號慈雲自是相與為方外之遊益親形于詩書者多矣若其所著圎頓十法界觀心圖注南嶽思師心要偈之類皆為王公之所為也天聖中公終以天台教部奏預大藏天台宗北傳蓋法師文穆公有力焉始章獻太后以法師熏修精志乾興中特遣使齎金帛而兩命于山中為國修懴遂著護國道場之儀上之請與其本教入藏天聖改元內臣楊懷吉東使又賜之乳香臨别楊以法師善書求其筆迹即書詩一闋與之楊遂奏之明年又賜銀一百兩飯山中千僧然其時之卿大夫聞其風而樂其勝緣者若錢文僖楊文公章郇公他公卿益多恐斥名不悉書法師間雅詞筆篇章有詩人之風其文有曰金園集者天竺别集者曰靈苑集然修潔精苦數自燼其指而存者一二耳逮其持筆書翰精美得鍾王之體靈山秋霽嘗天雨桂子法師乃作桂子種桂之詩尚書胡公見而盛賞之乃與錢文僖公賡之胡公領郡錢唐益施金而為其寺之三正門者法師領寺既久嘗欲罷去史君李公咨即㑹郡人苦留之又二載當天聖九祀之孟春方講净名經未幾顧謂其徒曰我昔在東掖亦講是經嘗夢荆溪尊者室中授其經卷及出視日已沒矣今者吾殆終于此講也一日果與衆决曰我住台杭二寺垂四十年長用十方意時務私傳今付講席宜從吾之志即命其高苐弟子祖韶曰汝當紹吾道我持此爐拂勿為最後斷佛種人汝宜勉之遂作謝三緣詩謂謝絶徒屬賔友筆硯也命學者刻石示之秋八月二十有八日孑然入其寺之東嶺草堂自晦也明年十月之八日示微疾不復用醫藥命取嘗和晉人劉遺民晦迹詩改其結句云翔空迹自絶不在青青山使磨崕刻之翌日之晚復曰吾報緣必盡敢忘遺訓乎爾曺耶益說法以朂其屬及後日之晚使請彌陀像以正其終其徒尚欲有所禱且以觀音像應命法師即炷香瞻像而祝之曰我觀世音前際不來後際不去十方諸佛同住實際願住此實際受我一炷香云云或問其所歸者猶以寂光淨土對之至其夕之三鼓奄然坐終先此法師自製其櫬曰遐榻而銘之學者務奉其師之前志必卧其靈體于遐榻更七日其形貌完潔如平昔其夀六十有九臘五十當其化之夕山中見大星隕乎鷲峰爀然有紅光發于其寺之前度弟子若虛輩垂百人授講禀法者如文昌諸上人者僅二十人登門而學者其人不啻千數明年仲春之四日奉遐榻歸葬于其寺之東月桂峰下與隋高僧真觀之塔鄰也䝉識韶公幾三十年晚山中與其游益親韶公耆年淳重亦名德之法師也嘗以大法師實録命余筆削始以敝文不敢當及䝉奏書為法以微效還而韶公已物故方感慨今辨師益以録見託願成就其師之意辨師端審善繼又明智之賢弟子也㑹余避言適去山中囑之愈勤顧重違其先師之命姑按韶公實録而論次之命曰曲記蓋曲細而記其事也然慈雲聰哲志識堅明故其以佛法大自植立卓然始終不衰雖古高名僧不過也世以方之真觀不其然乎天台之風教益甚于吳越者蓋亦資夫慈雲之德也吾恨不及見其人是嵗嘉祐癸卯之八年季秋已亥朔適在京口龍游之東圃記之也秀州資聖禪院故和尚勤公塔銘并敘嘉祐壬寅之仲秋秀人以故大和尚勤公骨身歸塔餘杭之安樂山從始也其禀法弟子省文儒者聞人安逺乃命契嵩書且銘之和尚諱盛勤本姓謝氏不書其得姓之本末從釋氏也象郡之夀陽人也童真出家北面事象之白容山惟齊禪師祥符中以誦經中試遂得落䰂其年納戒于桂管之延齡寺還白容㑹其師適滅葬巳遂浩然西出更訪其師宗者和尚天資淳深懿厚夙有道識童之時以自發明遍學衡湘鄢郢老禪碩師而獨大盡𤣥㫖于德山逺和尚初以雲門語句請决于逺師雖叩問勤至垂三月逺未嘗稍辨盡欲其自契耳一旦悟已詣逺質之逺師一見即謂之曰汝已徹矣當此和尚頓覺身超虛空不覺屋廬為閡復其立處即遍體雨汗其悟道靈驗如此也先此和尚嘗師他僧傳習乎安般定法始授其法乃席地然頂于其師前遽有異光上發圎赫如日光熄而元略無所損其師曰汝最上乘法器也勉之無以此自盡焉其感通又若此也其後禪之學者乃蔚然嚮慕來浙西混迹于餘杭之安樂山皇祐初嘉禾太守聶公厚載聞其風率郡人遂命領徒于此更十有二年而秀之人無賢愚男女風德大化法侣趨其㑹者日不下數百精廬完葺僧儲充備而秀有禪居自和尚興起也以嘉祐庚子之五載仲夏壬寅示微疾正坐說偈而盡世夀六十八臘四十二以嘉祐庚子五月已酉遵教火之得五色舍利絢如不可勝數度弟子者宗益嗣其法而領衆一方曰省文曰有昌和尚平昔嘗綴右之語要目其書曰原宗集而其徒方傳之然其所得之法實諸佛之祕要羣生之所宗諸祖之所傳者也非語默可到然非語默又不能稍發故和尚蒞衆接人雖勤教誨而其語嘗簡其機緣不煩大較其要道慈德入人最深故其亡也秀人傾城號慟若喪所親諸君以契嵩于和尚道交相知尤深詳得其出處乃以文見托雖固亦不得讓焉銘曰惟骨殊圎惟道亦然非生非滅無陂無偏惟小夷石泐而此法常傳秀州資聖禪院故暹禪師影堂記禪師疾病豫自杭往問醫藥嘗顧謂曰我老且病是必已矣死且纍子坎而掩之為我志其嗣法遂授其所以然余還杭未幾果溘然而化學者不悉即焚其喪卒不得而塔之故列其名迹于影堂命今長老勤師勒石以傳之禪師諱慶暹其先建陽人也姓范氏范氏世為士族其父大父皆仕不復書也始禪師因父宦生于㑹稽及其父官死海鹽縣即與母治産居秀至是禪師方五嵗而秀氣藹然其母異之命從淨行子昭出家于今資聖精舍踰十嵗落髮納戒于靈光寺習楞嚴圎覺於講師居素又十嵗經明明年即廣游方外遍參禪要又十歲且還初秀郡未始有禪居待來者亦有所缺然禪師既歸乃一更其院務與衆處諭其屬即如十方禪規主之院稍治遂結廬獨處于園林篤為杜多之行不出不寢更十九年雖惡衣惡食自視晏如也居無何㑹故雪竇清禪師至其廬曰善乎仁者乃至是哉因盡示其所證之法而清禪師大韙之卒亦承于清師至天聖中郡太守張公幾聖高之命復方文使舉行禪者故事逮故翰林學士葉公道卿以中允領郡見而益喜遂尊為長老命傳其法垂二十年竟以此物故嗚呼其世夀已七十六而僧臘六十二禪師治兹院自壯及耄凡四十六載于人甚莊處已至約飲食資用必務素儉與時俗不合以故其徒稱難而少親附唯士大夫重其修潔不忍以葷酒溷其室先時吳中僧之坐法失序輒以勢高下不復以戒德論禪師慨然嘗數以書求理于官世人雖皆不顧其說而禪師未始自沮及葉公道卿轉運吳越而禪師復致其書而葉公然之遂正其事于所部既而秀衆果推禪師于高座方再㑹即謝絶踵不入俗殆十五年然亦天性公正切于護法耳昔嘗與余語曰吾不能以道大惠于物德行復不足觀以愧于先聖人矣苟忍視其亂法是益愧也豫即應之曰不必謙也曺溪宗門天下之道妙也而學者罕至十二頭陀出世之至行也吾徒之所難能為法而奮不顧身亦人之所難也是三者師皆得而行之又何愧乎師曰此吾豈敢也雖然豫庸以是而稱之于吾人蓋欲其有所勸也禪師之遷化也至是皇祐之已亥實五載矣悲夫故靈隱普慈大師塔銘并敘師法諱幼旻信陽玉山人也本姓葉氏童時即有出俗之志告父母得命遂入其邑之興教蘭若師僧省覃出家既納戒乃訪道四方來虎林見惠明禪師頽然有道器即服膺執弟子禮盡學其法法務無難易者偹嘗之矣久之惠明命師監其寺事未幾㑹其寺大火蕩盡方根其所失其同事者危之皆憂及禍師謂之曰我總寺事罪盡在我吾獨當之爾曺不必懼也吏果不入寺問師弟坐其爨者耳此豈古所謂臨難毋苟免者耶其後惠明告終畢其喪師即帥衆曰本府請大長老惠照聰公鎮其寺以繼惠明所統仍以監寺輔之戮力相與復其寺不十年而葺屋廬嶷然千餘間益偉于舊慶厯中朝廷用其薦而錫之章服其後又賜號普慈及惠照謝世師方大疾亦力病治其喪事始惠照垂終遺書舉師自代官疑其事不與以靈隱更命僧主之師事其僧愈恭無毫髮鄙吝心見于聲彩而人益德之當此知府龍圖季公知之乃以上天竺精舍命師以長老居之及觀文孫公初以資政大學士涖杭特遷之主靈隱始其演法之日孫公大師衣冠貴游不翅百人預㑹爇香聽其所說而道俗老少貴賤摩肩而趨來者萬計是日人聲馬跡溢滿山谷法席之盛其如此者鮮矣師天性寬平慈恕與人周而多容而人亦頗美之故居其寺方六年寺益修衆益靖度弟子二十三人嘉祐乙亥仲冬初忽感微疾而卧先終一日與䝉語將授寺與今知禪德語氣詳正如平昔不衰十三日雞鳴起潄洗問時辰乃安坐而盡世夀六十一僧臘四十一以是月二十九日入塔于呼猿澗之直北寺垣之內塔已知師以其行狀求蒙文而銘之然在古高僧傳其法凡吾人于其教有德有言及其有功者乃得書之若今靈隱最天下名寺固吾佛法倚之弛張也嗚呼普慈於其寺平生如此之效豈不曰于法有功乎余故不讓乃引其事而書之也銘曰惟功在法惟德在法法既不生其勝緣豈有熄耶惟師之盛善常然不泯不墜斷可見矣杭州石壁山保勝寺故紹大德塔表石壁寺去杭越三十里走龍山而西窅然入幽谷有溪流岩石之美雖其氣象清淑而世未始知之自紹大德與其兄行靖法師居之而其名方播亦地以人而著也大德諱行紹杭之錢唐人也本姓沈氏初其母夢得異僧舍利吞之因而有娠及生其性淳美不類孺子不喜肉食嗜聞佛事方十二嵗趨智覺禪師延夀求為其徒父母從之及得戒通練律部當是時韶國師居天台山其道大振大德乃攝衣從之國師見且器之即使往學三觀法于螺溪羲寂法師因與其兄行靖皆事寂法師講求大義居未幾而所學已就還杭即葺其舊寺尋亦讓其寺與靖法師以㑹講衆靖法師與大德皆師智覺出家而大德為法兄靖師為俗兄靖法師以素德自發先此六十年雖吳中宿學名僧皆推其高人當時故為學者所歸及靖法師遷講他寺而大德復往居石壁其前後五十年守其山林之操未始苟游于鄉墅閭里處身修潔識者稱其清約一旦示感輕疾至其三日之夕囑纍其徒與衆㑹茶授器已即坐盡至是其夀已八十嵗僧蠟六十八嵗垂二十年余始來石壁㑹其弟子簡長因聞其風長亦介潔能守其先範遂與其同學之弟簡微固以大德塔志見託吾嘗謂之曰教所謂人生難遇者數端而善知識尤難論語曰善人吾不得而見之矣得見有恆者斯可矣賢善誠難其㑹也若師出家于夀公學法于寂公見知于國師韶公韶公不測人也竒節異德道行藹然而夀寂二公亦吾徒之有道者也天下豈可多得若師皆遇而親炙之假全得一見之已甚善也况因人而得法耶若此師之美多矣復兄弟于靖師同其務學親道栖養于山林又平生之美可書也其塔在寺之西圃故筆而表之是嵗皇祐癸巳三月之十一日也致政侍郎中山公哀辭并敘故侍郎中山公其喪下葬日客有感其舊德而為哀辭以見意也然客本佛氏者外遺形質內融情僞不宜有所感而哀之也蓋不忍視其賢人殁而君子之道益寡嗟歎之不已姑托哀而辭之雖然公之功德在人名與迹太史氏播之而其人未必悉知公道德之本至者也公之所本者誠也故其始也修身事親而鄉人效之其中也仕于朝廷守大節不變而天子擢之其老也以禮而退表師乎士大夫而天下儀之然士之行道于世多初鋭而中懈先是而後謬孰如公進退始卒無毫髮之失蓋其修誠厚本而致是爾公既謝去軒冕益以清净養其夀命故蒙忝公之交游亦親識知公之道德所以至者且詳可法也矣嗚呼辱公之顧待異矣不復睹矣辭曰鱗羽穰穰兮龍鳳所尸龍不可隱兮鳳不可衰人倫整整兮聖賢所資聖不可亡賢不可虧老成之人兮已與化移典刑雖在兮奚可邇窺大夜奄夕兮復曉何時神明一去兮寂寥何知道德垂世兮羣心所思清白傳家兮世世可師五福貴全兮公得于斯天分獨好兮誰與等夷人夀百嵗兮公欲及期孝子順孫兮胡必增悲伊我所傷兮賢者寖稀純誠不紹兮君子道微萬類紛綸兮邪正相非特立獨行兮不爾疇依秋風肅肅兮白露霏霏草木零落兮丘隴巍巍靈車獨舉兮丹旐翻飛顧此别離兮杳杳長違李晦叔推官哀辭并序隴西李晦叔死有以相報者豫聞悼之且有所感也晦叔有俊才素以其才之力氣自豪故于文章辨論不甚推讓去年仲春將施生來吾室與吾語終日不能去嘗曰昔謂方袍平叔豫今顧師或師作子不足比也叵自慨相知之晚及䝉移書讓其過稱復曰方今天下賢而有識者幾其人哉在仲靈何讓其後數數以重語推致于交游間期將復來劇論雖然余非其人酌其意愛豈不謂之知我乎别去一年志方壯豈悟其忽然而巳亡邪古人以人生比之浮雲奄忽不可常保如此信之矣辭曰昨别晦叔志氣强今聞晦叔忽已亡始知未信便必爾定聞不覺心自傷心傷君子何所切念君素懷殊未張賢良不遂㴚或召字死從事可惜謫仙才艷長陸機弟兄皆早世芝蘭零落何相望高堂有親髮被領白日悠悠悲未央憶君去年來我室抵掌俉語聲琅琅坐人驚歎幾絶倒是是非非窮否臧當時然諾頗相得聲色慷慨多揄揚乃云平叔不足比齷齪自疑何敢當白雲有期尚相待豈意游魂成渺茫哲人自古寡眉夀天理如何不可量周叔智哀辭并序周叔智名測九江潯陽人也少聰悟讀書能强記自六籍楊孟洎司馬氏史漢老莊列禦冦之說與吾佛經歷目則往往通之商較古今援引故事動有典據嘗駭坐人率皆伏其高論為文學易繫辭竒峭頗工恥于奔競造次不移其守故名不籍甚朋游屢以其家貧親老朂之逾四十始以茂才異等舉尋斥于有司歸鄉曲務以其道訓𨗳後進江州風俗剽輕其人寡能莊整叔智侃然處于鄉黨而後學小生不敢恣放去年孟夏得叔智之子明服書且聞叔智以癸未孟秋死矣嗚呼吾嘗與叔智友凡議論不以道相契未始發其言交道之中正自謂古人不至如是也及來吳越不相見已六七年日夕浩然思歸潯陽慕永逺一作惠逺宗炳劉遺民之風同叔智相與老于林下逮此信吾事不果濟也嗚呼交道之已矣乎哀其人不復見矣故辭之以揚其德也辭曰江之山兮康廬效靈江之水兮九江泚清合其氣兮誕為人英君得之兮既聰且明道德修兮器識恢宏竟不展兮奪化代并公之夀兮令名不朽君之福兮學問富有仁義家傳兮子孫寶守孰謂既往兮不光其後湓江浮天兮緑净漪漪白石青草兮日暮參差若人不歸兮萬古别離相望丘墓兮千里依依鐔津集卷十五
