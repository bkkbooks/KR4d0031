body:
  text: 鐔津集巻十六宋釋契嵩撰述題書賛傳評共十二首秀州精嚴寺行道舍利述梵音舍利此云身骨道必有所驗非驗孰見乎道之至哉不邪佛之舍利盖其道之驗也夫道之大至者固貫乎人神死生而妙之聖人以其妙則在幽而能興在明而能無是故聖人方其生也善世而無善方其死也潜神而用神舍利者亘百世而儼然效其靈則天下莫測豈非其神之為乎今夫九流百子以其道而為之者天下紛然謂之道則與佛未始異也稽其驗則天下無有也競尊其師則謂佛不足與其聖賢校其人之死也不終日而形腐不終年而骨朽其神則漠然烏有乎忽恍豈其道亦有所未臻於佛者乎昔者佛法始傳于漢而漢人不詳始傳於吴而吴人不諒皆專儒老而拒我故摩騰僧㑹命舍利以驗佛世自是翕然而嚮之夫道逺也驗近也觀近也者發之也觀逺也者至之也至之者聖人也以驗觀道則麤妙可審也以道觀聖人而大小可見也人亦有言曰其敎有大不可思議之事益知佛為大聖人不其然乎然舍利之見乎天下者古今多矣有盤空而翔者無端而至者發光而明並日月者不可焚者不可碎者若此行道之舍利晝夜振之而不息者天下未始見也捧其塔敬之則金鐸益轉若與人意而相應異乎美哉至神之物不必大也至道之驗不必多也考其始致則曰得之于吴越故國師韶公盖得乎梁之岳陽王蕭詧之所傳者也既而錢氏之先王内于金鐸以小銅塔而緘之寘諸靈光寺今寺之舊名殆百年矣韶公至人也號其舍利一曰行道一曰入定入定者祕而不可見行道者益塔而張之是豈不以後世僧不軌道而俗薄寡信將亦有所勸而發之者乎故述其意命吾徒以揚之題逺公影堂壁逺公事迹學者雖見而鮮能盡之使世不昭昭見先賢之徳亦後學之過也予讀高僧傳蓮社記及九江新舊録最愛逺公凡六事謂可以勸也乃引而釋之列之其影堂以示來者陸修静異敎學者而送過虎溪是不以人而棄言也陶淵明酖湎于酒而與之交盖簡小節而取其達也䟦陁高僧以顯異被擯而延且譽之盖重有識而矯嫉賢也謝靈運以心雜不取而果歿于刑盖識其氣而慎其終也盧循欲叛而執手求舊盖亦信道也桓𤣥振威而抗對不屈盖有大節也大凡古今人情莫不畏威而苟免忘義而避疑好名而昧實黨勢而忍孤飾行而畏累自是而非人孰有道尊一代為賢者師肯以片言而從其人乎孰有夙禀勝徳為行耿潔肯交醉鄉而高其達乎孰有屈人師之尊禮斥逐之客而伸其賢乎孰有拒盛名之士不與于教而克全終乎孰有義不避禍敦睦故舊而信道乎孰有臨將帥之威在殺罰暴虐之際守道不撓而全節乎此故逺公識量逺大獨出于古今矣若其扶荷至敎廣大聖道垂佑于天人者非蒙乃能盡之其聖欤賢邪偉乎大塊噫氣六合清風逺公之名聞也四海秋色神山中聳逺公之清高也人僧龍鳳高揖巢許逺公風軌也白雲丹嶂玉樹瑶草逺公之栖處也䝉後公而生雖慕且恨也瞻其遺像稽首作禮願以弊文題于屋壁題梅福傳後班固云梅子真嘗為南昌尉不得志遂自引去變姓名為㑹稽監門又曰仙去故後之說者不過謂子真能以仙尉為吏隠善與時浮沉往往引其事為尉者美言亦學者之不詳也小哉言乎子真磊落有大節奮不顧身忠于國家憂天下者也當漢朝失理本末皆顛子真嫉邪臣用事竊弄大權發憤上書論國大體大要興行禮度登用俊良之人雖觝觸讒佞輩而無所避忌詞氣謇諤意欲警動時主雖書屢上而主竟不悟卒土崩瓦解使當時稍用其言而高祖社稷未必䘮亡嗚呼子真處九品之末朝無一介之援毅然奮志忠勇過人吐詞扶國家之危逆龍鱗探虎口不旋踵而禍及其身尚不以為懼真慷慨大丈夫也噫古今讀書為學孰不抱氣自視為英雄於朋游間苟有一語相忤不恊其意也必發憤詬罵恨不能誅之如讐及其立于朝廷也眎有不義雖大至于害敎化傷風俗以其不切于已雖眎如不眎雖聞如不聞往往從而諛之苟其敗也則聚口而笑之此聞子真之風宜如何為心子真沒在先漢之季於今上下千有餘年所論縣尉未有如子真者也将有而未聞見乎予嘗病世不知子真之徳與道徒高其得術僊去故題云書文中子傳後讀東皋子王績集知王氏果有續孔子六經知房𤣥齡杜如晦李靖董常温彦博魏徴薛收杜淹䓁果文中子之弟子也讀劉煦唐書王勃傳知文中子乃勃之祖果曽作元經矣績死于貞觀十八載去其兄之世近能言其事也慨房杜温魏王勃皆不書一字以傳文中子之賢而隋書復失書之後世故以文中子之事不足信及韓子文興天下學士宗韓以韓愈不稱文中子李翶又薄其書比之太公家敎而學者盖不取文中子也然王氏能續孔子六經盖孔子之亞也識者宜以聖人之道較而正之其文中子之道苟與孔氏合乃孔子之嗣也而書傳之有無不足為信隨人愛惡之情或作利字欲蔑其聖賢可乎孟子豈不曰盡信書不若無書吾眎中說其讀詩曰四名五志讀書曰四制七命元經則曰晉宋齊梁陳亡具五以禍其國而善其立法有聖人之道嗟乎不見其六經姑書此以遺學輩書李翰林集後余讀李翰林集見其樂府詩百餘篇其意尊國家正人倫卓然有周詩之風非徒吟咏情性咄嘔苟自適而已白當唐有天下第五世時天子意甚甚或作喜聲色庶政稍解姦邪輩得入竊弄大柄㑹祿山賊兵犯闕而明皇幸蜀白閔天子失守輕棄宗廟故作逺别離以刺之至于作蜀道難以刺諸侯之强横作梁甫吟傷懐忠而不見用作天馬歌哀棄賢才而不録其功作行路難惡讒而不得盡其臣節作猛虎行憤胡虜亂夏而思安王室作陽春歌以誡滛樂不節作烏栖曲以刺好色不好徳作戰城南以刺窮兵不休如此者不可悉說及放去猶作秋浦吟一名東甫吟冀悟人主意不果望終棄於江湖間遂紆餘輕世劇飲大醉寓意于道士法故其游覽贈送諸詩雜以神僊之說夫性之所作志之所之小人則以言君子則以詩由言詩以求其志則君子小人可以盡之若白之詩也如是而其性之與志豈小賢哉脫當時始終其人盡其才而用之使立功業安知其果不能也邇世說李白清才逸氣但謫仙人耳此豈必然耶觀其詩體勢才思如山聳海振巍巍浩浩不可窮極苟當時得預聖人之刪可參二雅宜與國風傳之於無窮而離騷子虛不足相比書諸葛武侯傳後孔明始躬耕於隆中時毎自比於管仲樂毅時人莫有許者惟崔州平徐庶以為然吾考孔明事迹其以天下至公為心欲并强魏而復漢社稷與管仲九合諸侯一匡天下樂毅不屠莒即墨之城欲專以王道一歸天下其道豈異哉昭烈三往乃見孔明方與之畫計何其工也及至軍敗身遁夏口而孔明往說孫權得兵為援破曹操于赤壁此與樂毅說趙楚魏使趙噉秦以伐齊之利而毅并獲楚魏五國之兵伐齊破之濟西而其才略竒偉與樂埒也率諸軍北駐漢中臨發上疏與樂毅報遺燕惠之書其忠義相類但其遇主遭時不如管仲之得志耳使孔明逢盛時天不奪其夀得以始終其事復漢而并一天下興崇王道則管夷吾樂毅殆不及也或本無樂毅字惜其輕用馬謖遂敗于街亭害其能事然諸葛孔明賢豪俊傑猶暗于知人如此况非如孔明者乃輕信乎利口之人而用之不亦易乎戒之哉戒之哉書范睢傳後始范睢變姓名自號張禄先生入秦說秦昭王短秦相穰侯秦昭王遂逐穰侯收其相印即拜范雎為相號為應侯應侯所任用鄭安平以兵降趙應侯憂不知計之所出而蔡澤乃西入秦見昭王使人宣言感怒應侯應侯服其說乃舉蔡澤應侯因謝病請歸相印范雎既免相秦昭王懼拜蔡澤為相蔡澤相秦數月或惡之懼誅尋亦謝病歸其相印莊子云一蟬方得美䕃而忘其身螳蜋執翳而搏之見得而忘其形異鵲從而利之見利而忘其真荘周怵然曰噫物固相累焉此與范雎二三子相傾而相奪何以異乎欲人之欲人亦欲之孰謂能必保其富貴耶唐段太尉傳賛段太尉秀實先為用事者奪去兵權而無怨及是毅然奮笏擊殺朱泚不顧一死圖存王室古所謂社稷之臣也又曰殺身以成仁又曰臨難無苟免惟段氏皆得之矣說者或云段太尉小弱動不迕物頗類儒者及其奮擊反虜罵聲掉厲而氣慴萬夫白刃交前而卒不變色又何壯哉猛如飄風烈如疾雷慷慨雄偉卓出古今太史公疑田侯于畫圗信有之矣嗚呼大凡古今人情得權勢之盛不振主則驕時及失之則怨望不能自存往往謀為不軌如段秀實太尉者得之不為幸失之不為怨成之與敗在未决間而以死循王室擬淮隂侯韓信則其賢逺矣好善賛聖人之善以人為善其人也必好善沮人之善以自善其人也必嫉善好善者其道必廣嫉善者其名必辱好善則天下善人樂以其善告聚天下之善以為行其道不亦廣乎嫉善則天下善人唯恐其聞所善掩天下之善以為言其名不亦辱乎舜古之好善人也顔子亦古之好善人也彼舜者古之聖人也當堯之世克諧以孝烝烝乂不格姦天下不歸乎朱而歸乎舜而天下豈有善于舜者也及其聞一善言見一善行若决江河沛然莫之能禦也顔子古之賢人也當孔子之時抱聖人之道窮處陋巷人不堪其憂而顔子不改其樂庶幾乎聖人所以稱之而天下豈有善于顔子也及其聞人一善則拳拳服膺若今所謂善人者吾未見有如顔舜之聖賢也其善未必善于天下之人及其聞人之善孰肯沛然以行之亦孰肯拳拳而服膺從而掩之者有之辯者必形乎言訥者必形乎色脫少而稱之其人也非情與黨則不為也嗚呼欲其名不辱其可得乎其道之廣也其可得乎今之人不如古之人逺矣故謂好善者非聖賢之人不能好善也窮天地亘萬世唯舜顔子而已矣宜乎其道與名傳之于無窮焉陸蟾傳陸蟾藤州鐔津人也以能詩名于楚越間其瀑布詠則曰靈源人莫測千尺挂雲端嶽色染不得神功裁亦難夏噴猿鶴浴秋濺斗牛寒待到滄溟日為濤更好看此詩人尤稱之客死于攸縣之司空山予少時游衡山㑹隠者高閬謂予曰昔陸先生子之邑人也方國初時廖氏家以詩盛而四方詩人慕廖氏者來衡山頗衆獨先生陸某詩多警句雖慕廖融亦相推高然生不止能詩而巳矣頗知王覇大略亦俟有所遭遇故其言詩見志如前詩後句云待到滄溟日為濤更好看而常幅巾布衣好秉高節所至閉户自處不肯與常人交接或作相接余聞其風且歎之曰陸生逸人也能以詩高出流輩是亦賢矣而負道守節不為阿世苟合而欲自有所遭遇雖孔孟尚不得其志而生也不亦難乎然天下如陸生從死于丘壑者何限韓曠傳韓曠字攝生隠士也或曰即五代韓通之後也宋初其家破曠方嬰兒人竊匿且育之稍知其家世亦遂自匿亡于楊越間歘然長大少年任俠縱酒擊劍一旦感悟即潔身振衣游名山慕道家絶粒𨗳引為人沈毅寡語悠然有逺器甘惡衣食所至輙閉室不交人世雖官尊如刺史者縱求之未嘗有見者或稍見一揖遂自引不復與語予少時識曠于嶽麓其人已老嘿嘿不妄道事然人多恱其高義而自勸始予謂曠木訥少文及游洪井視其屬辭彬彬可觀聞其平生愈詳益信其有徳而有言也竟死于湘潭間評北山清公書評曰唐髙僧神清不喜禪者自尊其宗乃著書而抑之曰其傳法賢聖間以聲聞如迦葉等雖曰囘心尚為小智豈能傳佛心印乎即引付法藏傳曰昔商那和修告優波毱多曰佛之三昧辟支不知辟支三昧聲聞不知諸大聲聞三昧餘聲聞不知阿難三昧我今不知我今三昧汝亦不知如是三昧皆隨吾滅又有七萬七千本生經一萬阿毗曇八萬清净毗尼亦隨我滅固哉清也徒肆已所愛惡而不知大謬先聖吾始視清書見其校論三昧雖文詞不佳盖以其善記經書不别理義端由而不即非之及考其禪宗之說問難凡數畨輒採流俗所尚及援書傳復不得其詳余初謂此非至論固不足注意徐思其所謂迦葉䓁豈能傳佛心印尤為狂言恐其熒惑世俗以増後生末學之相訾不已乃與正之非好辯也大凡萬事理為其本而迹為末也通其本者故多得之束其末者故多失之故或作固若傳法者數十聖賢雖示同聲聞而豈宜以聲聞盡之哉經曰我今所有無上正法等悉以付囑摩訶迦葉竟大般湼槃傳曰我今所有大慈大悲四禪三昧無量功徳而自莊嚴而迦葉比丘亦復如是又謂毱多為無垢相好佛又謂僧伽難提乃過去娑羅王如來降跡為祖如此之類甚衆豈非聖人欲扶其法互相尊敬而示為大小耶楞伽所謂三種阿羅漢者一曰得决定寂滅聲聞阿羅漢一曰増修菩薩行阿羅漢一曰應化佛所化阿羅漢此阿羅漢以本願善根方便力故現諸佛土生大衆中荘嚴諸佛大㑹故若大迦葉傳法數十聖賢者豈非應化佛所化之阿羅漢者也然佛所化者宜其所有四禪三昧無量功徳與如來不異也不異乎如來而傳佛心印孰謂其不然乎若商那和修曰阿難三昧而我不知我今三昧汝亦不知斯恐其有所抑揚耳未可謂其必然經曰入逺行地已得無量三昧夫入逺行地者盖七地菩薩也七地菩薩尚能得無量三昧而化佛豈盡不能也然佛之所傳心印與餘三昧者宜異日而道哉夫心印者盖大聖人種智之妙本也餘三昧者乃妙本所發之智慧也皆以三昧而稱之耳心印即經之謂三昧王之三昧者也如來所傳乃此三昧也清以謂餘三昧邪其所謂七萬七千本生經一萬阿毗曇八萬清净毗尼亦隨我滅此余未始見于他書獨付法藏傳云耳尚或疑之假令其書不謬恐非謂其傳法聖賢不能任持而然也是必以後世羣生機緣福力盖弱而不勝其敎以故滅之方正像末法三者之存滅亦隨世而法汚隆焉曷嘗為其𢎞法聖賢而致正末邪嗚呼學者不求經不窮理動謬聖人之意為其說雖能編連萬世事亦何益乎書曰記問之學不足為人師清之謂也歟評唐續僧傳可禪祖事附評曰唐續高僧傳謂可遭賊斷臂與余書云曷其異乎曰余考法琳碑曰師乃立雪數宵斷臂碎身營求開示亦曰投地碎身顧其開示然為僧傳者與琳同時琳之說與禪書合而宣反之豈非采聴之未至乎抑亦從邪說而妄非之乎故其書不足為評亦云不可憑亦云不在詳評然各有㫖也鐔津集巻十六
